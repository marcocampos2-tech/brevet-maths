<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Examen Blanc — ACADEMIKA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.nav-left { font-size: 18px; font-weight: 600; }
.nav-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.nav-email { font-size: 12px; color: #666; }
.card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; }
.btn:hover { background: #f5f5f0; }
.btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn-green { background: #16a34a; color: white; border-color: #16a34a; font-size: 15px; padding: 14px; }
.btn-green:hover { background: #15803d; }
.btn-red { background: #dc2626; color: white; border-color: #dc2626; font-size: 15px; padding: 14px; animation: pulse-btn 1s infinite; }
.btn-red:hover { background: #b91c1c; }
@keyframes pulse-btn { 0%,100%{opacity:1} 50%{opacity:0.85} }
.btn-outline { background: white; color: #666; border: 1px solid #d0d0c8; font-size: 14px; padding: 12px; }
.btn-outline:hover { background: #f5f5f0; }
.btn-full { width: 100%; }
.option { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1px solid #e8e8e4; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.15s; margin-bottom: 8px; }
.option:hover { border-color: #999; background: #f9f9f7; }
.option.selected { border-color: #3730a3; background: #eef2ff; }
.option.correct { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
.option.wrong { border-color: #dc2626; background: #fef2f2; color: #dc2626; }
.letter { font-size: 12px; font-weight: 600; color: #999; min-width: 18px; }
.option.correct .letter, .option.wrong .letter { color: inherit; }
.explication { margin-top: 10px; padding: 10px 14px; background: #f5f5f0; border-radius: 8px; font-size: 13px; color: #555; border-left: 3px solid #3730a3; line-height: 1.6; }
.badge-theme { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #f5f5f0; color: #666; border: 1px solid #e0e0d8; }
.badge-partie { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #eef2ff; color: #3730a3; border: 1px solid #3730a3; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #eef2ff; color: #3730a3; }
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
.q-num { font-size: 12px; color: #999; }
.q-text { font-size: 15px; line-height: 1.8; margin-bottom: 10px; color: #1a1a1a; }
.loader { text-align: center; padding: 3rem; color: #666; font-size: 14px; }
.chrono { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid #e8e8e4; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 500; color: #1a1a1a; }
.chrono-dot { width: 8px; height: 8px; background: #dc2626; border-radius: 50%; animation: pulse 1s infinite; }
.chrono-warning { border-color: #dc2626 !important; color: #dc2626 !important; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.progress-bar-wrap { background: #e0e0d8; border-radius: 4px; height: 8px; margin-bottom: 1.5rem; }
.progress-bar { background: #3730a3; height: 8px; border-radius: 4px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: #666; margin-bottom: 6px; display: flex; justify-content: space-between; }
.intro-card { background: white; border-radius: 16px; border: 1px solid #e8e8e4; padding: 2rem 1.5rem; margin-bottom: 1rem; text-align: center; }
.intro-icon { font-size: 48px; margin-bottom: 1rem; }
.intro-title { font-size: 22px; font-weight: 700; margin-bottom: 0.5rem; }
.intro-sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
.intro-rules { background: #f5f5f0; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; text-align: left; }
.intro-rules li { font-size: 13px; color: #555; margin-bottom: 6px; list-style: none; padding-left: 4px; }
.intro-deroulement { background: #eef2ff; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; text-align: left; border-left: 3px solid #3730a3; }
.intro-deroulement p { font-size: 13px; color: #3730a3; line-height: 1.7; }
.results-screen { background: white; border-radius: 16px; border: 1px solid #e8e8e4; padding: 2rem 1.5rem; margin-bottom: 1rem; text-align: center; }
.results-score-big { font-size: 72px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.results-pct { font-size: 28px; font-weight: 600; margin: 10px 0 6px; }
.results-mention { font-size: 20px; margin-bottom: 0.5rem; }
.results-temps { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
.results-mention-officielle { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 20px; display: inline-block; margin-bottom: 1.5rem; }
.mention-tb { background: #f0fdf4; color: #16a34a; border: 1px solid #16a34a; }
.mention-b { background: #eef2ff; color: #3730a3; border: 1px solid #3730a3; }
.mention-ab { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
.mention-admis { background: #f5f5f0; color: #555; border: 1px solid #ccc; }
.mention-insuffisant { background: #fef2f2; color: #dc2626; border: 1px solid #dc2626; }
.results-btns { display: flex; flex-direction: column; gap: 10px; }
.themes-recap { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin: 1rem 0; }
.theme-score { background: #f5f5f0; border-radius: 8px; padding: 10px; text-align: center; font-size: 12px; }
.theme-score-num { font-size: 20px; font-weight: 700; }
.theme-score-label { color: #666; margin-top: 2px; font-size: 11px; }
.historique-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0ec; font-size: 13px; }
.alerte-ecoule { background: #fef2f2; border: 1px solid #dc2626; border-radius: 10px; padding: 12px 16px; text-align: center; color: #dc2626; font-weight: 600; font-size: 14px; margin-bottom: 1rem; }
.toast { position: fixed; bottom: 80px; right: 16px; z-index: 1000; padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; color: white; max-width: 280px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); transform: translateX(120%); transition: transform 0.3s ease; }
.toast.show { transform: translateX(0); }
.toast-orange { background: #f59e0b; }
.toast-red { background: #dc2626; }
.sticky-btn { position: sticky; bottom: 1rem; padding: 0.5rem 0; }
</style>
</head>
<body>
<div class="container">
<nav>
  <div class="nav-left">∑ ACADEMIKA</div>
  <div class="nav-right">
    <span class="nav-email" id="user-email"></span>
    <div class="chrono" id="chrono" style="display:none">
      <div class="chrono-dot"></div>
      <span id="chrono-text">40:00</span>
    </div>
    <button class="btn" onclick="retourAccueil()">← Accueil</button>
    <button class="btn" onclick="logout()">Déconnexion</button>
  </div>
</nav>
<div id="main-area"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
let user=null, prenom='', nom='', emailParent=''
let questions=[], answers={}, saved=false
let chronoInterval=null, chronoSecondes=0
let examEnCours=false
let heureFin=null

window.addEventListener('beforeunload', function(e) {
  if(examEnCours&&!saved){e.preventDefault();e.returnValue='⚠️ Examen en cours !'}
})

function retourAccueil() {
  if(examEnCours&&!saved){
    const ok=confirm('⚠️ Examen en cours. Si tu quittes, tu perdras ta progression. Continuer quand même ?')
    if(!ok)return
  }
  window.location.href='quiz.html'
}

async function init() {
  const {data}=await sb.auth.getSession()
  if(!data.session){window.location.href='index.html';return}
  user=data.session.user
  prenom=user.user_metadata?.prenom||''
  nom=user.user_metadata?.nom||''
  emailParent=user.user_metadata?.email_parent||''
  const {data:profil}=await sb.from('profils').select('prenom_affiche,nom_affiche,email_parent').eq('user_id',user.id).limit(1)
  if(profil&&profil.length>0){
    prenom=prenom||profil[0].prenom_affiche||''
    nom=nom||profil[0].nom_affiche||''
    emailParent=emailParent||profil[0].email_parent||''
  }
  document.getElementById('user-email').textContent=prenom||user.email
  await renderIntro()
}

function getMention(pct){
  if(pct>=80)return{label:'🌟 Très Bien',cls:'mention-tb',officiel:'Mention Très Bien'}
  if(pct>=70)return{label:'👍 Bien',cls:'mention-b',officiel:'Mention Bien'}
  if(pct>=60)return{label:'✅ Assez Bien',cls:'mention-ab',officiel:'Mention Assez Bien'}
  if(pct>=50)return{label:'📋 Admis',cls:'mention-admis',officiel:'Admis'}
  return{label:'📚 À retravailler',cls:'mention-insuffisant',officiel:'Non admis'}
}

function formatTemps(s){
  const m=Math.floor(s/60)
  const sec=s%60
  return m+' min '+sec+' sec'
}

let toastTimeout=null
function showToast(message, type) {
  const toast = document.getElementById('toast')
  toast.textContent = message
  toast.className = 'toast show ' + (type === 'rouge' ? 'toast-red' : 'toast-orange')
  if(toastTimeout) clearTimeout(toastTimeout)
  toastTimeout = setTimeout(function() {
    toast.classList.remove('show')
  }, 8000)
}

async function renderIntro() {
  const {data:historique}=await sb.from('examens_blancs')
    .select('*').eq('user_id',user.id).eq('abandonne',false)
    .order('created_at',{ascending:false}).limit(5)
  let historiqueHTML=''
  if(historique&&historique.length>0){
    let items=''
    historique.forEach(function(e){
      const pct=Math.round((e.score/e.total)*100)
      const mention=getMention(pct)
      const date=new Date(e.created_at).toLocaleDateString('fr-FR')
      items+='<div class="historique-item"><span>'+date+'</span><span><strong>'+e.score+'/20</strong> — '+pct+'%</span><span class="results-mention-officielle '+mention.cls+'" style="font-size:11px;padding:2px 8px">'+mention.officiel+'</span></div>'
    })
    historiqueHTML='<div style="margin-bottom:1.5rem;text-align:left"><p style="font-size:13px;font-weight:600;margin-bottom:8px;color:#1a1a1a">📊 Mes derniers examens :</p>'+items+'</div>'
  }
  document.getElementById('main-area').innerHTML=
    '<div class="intro-card">'+
    '<div class="intro-icon">📝</div>'+
    '<div class="intro-title">Examen Blanc Brevet</div>'+
    '<div class="intro-sub">Teste-toi dans les conditions du vrai brevet !<br>20 questions tirées aléatoirement sur tous les thèmes du programme.</div>'+
    '<div class="intro-deroulement"><p>📋 <strong>Déroulement :</strong> Tu vas répondre à 20 questions QCM réparties sur les 4 parties du programme. Tu as <strong>40 minutes</strong> pour tout répondre. La correction complète s\'affiche à la fin. Les questions changent à chaque passage !</p></div>'+
    '<div class="intro-rules">'+
    '<li>⏱️ <strong>40 minutes</strong> — 2 min par question</li>'+
    '<li>📋 <strong>20 questions</strong> sur les 4 parties</li>'+
    '<li>🔀 <strong>Questions différentes</strong> à chaque passage</li>'+
    '<li>🔕 <strong>Pas de correction</strong> pendant l\'examen</li>'+
    '</div>'+
    historiqueHTML+
    '<button class="btn btn-primary btn-full" style="font-size:16px;padding:14px" onclick="demarrerExamen()">🚀 Commencer l\'examen</button>'+
    '</div>'
}

async function demarrerExamen() {
  document.getElementById('main-area').innerHTML='<div class="loader">⏳ Préparation de votre examen…</div>'
  try {
    const parties=[1,2,3,4]
    let toutesLesQuestions=[]
    for(let p=0;p<parties.length;p++){
      const partie=parties[p]
      const res=await sb.from('examen_questions').select('*').eq('partie',partie)
      if(res.error||!res.data||res.data.length===0) throw new Error('Questions partie '+partie+' introuvables')
      const total=res.data.length
      const tiers=Math.floor(total/3)
      const shuffled=res.data.sort(function(){return Math.random()-0.5})
      const acc=shuffled.slice(0,tiers).sort(function(){return Math.random()-0.5}).slice(0,2)
      const std=shuffled.slice(tiers,tiers*2).sort(function(){return Math.random()-0.5}).slice(0,2)
      const exp=shuffled.slice(tiers*2).sort(function(){return Math.random()-0.5}).slice(0,1)
      toutesLesQuestions=toutesLesQuestions.concat(acc).concat(std).concat(exp)
    }
    questions=toutesLesQuestions.sort(function(){return Math.random()-0.5}).map(function(q){
      return {
        q:q.question,
        opts:typeof q.opts==='string'?JSON.parse(q.opts):q.opts,
        answer:q.answer,
        explication:q.explication,
        theme:q.theme,
        chapitre:q.chapitre,
        partie:q.partie
      }
    })
    answers={};saved=false;examEnCours=true
    demarrerChrono()
    renderExamen()
  } catch(e){
    document.getElementById('main-area').innerHTML='<div class="loader">❌ '+e.message+'</div>'
  }
}

function demarrerChrono(){
  heureFin = Date.now() + 40 * 60 * 1000
  document.getElementById('chrono').style.display='flex'
  document.getElementById('chrono').classList.remove('chrono-warning')
  var alerte10=false, alerte5=false, alerte1=false

  chronoInterval=setInterval(function(){
    const restant = Math.max(0, heureFin - Date.now())
    chronoSecondes = Math.floor((40*60*1000 - restant) / 1000)

    const m = Math.floor(restant / 60000).toString().padStart(2,'0')
    const s = Math.floor((restant % 60000) / 1000).toString().padStart(2,'0')

    // Mettre à jour chrono nav
    document.getElementById('chrono-text').textContent = m+':'+s

    // Mettre à jour bouton sticky EN TEMPS RÉEL sans recréer le DOM
    var nbRepondues = Object.keys(answers).length
    var btn = document.getElementById('btn-terminer')
    if(btn) {
      if(restant <= 300000) {
        btn.className = 'btn btn-red btn-full'
        btn.textContent = '✅ Terminer l\'examen ('+nbRepondues+'/20 répondues) — '+m+':'+s+' restantes'
      } else {
        btn.textContent = '✅ Terminer l\'examen ('+nbRepondues+'/20 répondues)'
      }
    }

    // Alerte 10 min
    if(restant <= 600000 && !alerte10){
      alerte10=true
      document.getElementById('chrono').classList.add('chrono-warning')
      showToast('⏰ Plus que 10 minutes !', 'orange')
    }

    // Alerte 5 min
    if(restant <= 300000 && !alerte5){
      alerte5=true
      showToast('⚠️ Plus que 5 minutes ! Vérifie tes réponses.', 'rouge')
      // Changer bouton en rouge
      if(btn) btn.className = 'btn btn-red btn-full'
    }

    // Alerte 1 min
    if(restant <= 60000 && !alerte1){
      alerte1=true
      showToast('🔴 Dernière minute ! L\'examen se termine bientôt.', 'rouge')
    }

    // Temps écoulé
    if(restant <= 0){
      clearInterval(chronoInterval)
      examEnCours=false
      showToast('⏰ Temps écoulé !', 'rouge')
      terminerExamen()
    }
  }, 500)
}

function arreterChrono(){clearInterval(chronoInterval)}

function renderExamen(){
  const nbRepondues=Object.keys(answers).length
  const pct=Math.round((nbRepondues/questions.length)*100)
  const letters=['A','B','C','D']
  let html=''

  if(!examEnCours){
    html+='<div class="alerte-ecoule">⏰ Temps écoulé ! L\'examen est terminé automatiquement.</div>'
  }

  html+='<div class="progress-label"><span>'+nbRepondues+'/20 questions répondues</span><span>'+pct+'%</span></div>'
  html+='<div class="progress-bar-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div>'

  questions.forEach(function(q,i){
    const sel=answers[i]
    html+='<div class="card">'
    html+='<div class="q-meta"><span class="q-num">Question '+(i+1)+'/20</span><span class="badge-partie">Partie '+q.partie+'</span><span class="badge-theme">'+(q.chapitre||q.theme)+'</span></div>'
    html+='<p class="q-text">'+q.q+'</p>'
    q.opts.forEach(function(opt,j){
      const cls=j===sel?'option selected':'option'
      if(examEnCours){
        html+='<div class="'+cls+'" onclick="pick('+i+','+j+')"><span class="letter">'+letters[j]+'</span>'+opt+'</div>'
      } else {
        html+='<div class="'+cls+'" style="cursor:default"><span class="letter">'+letters[j]+'</span>'+opt+'</div>'
      }
    })
    html+='</div>'
  })

  if(examEnCours){
    const restant = heureFin ? Math.max(0, heureFin - Date.now()) : null
    const urgence = restant !== null && restant <= 300000
    const btnCls = urgence ? 'btn btn-red btn-full' : 'btn btn-green btn-full'
    const tempsLabel = urgence && restant !== null
      ? ' — ' + Math.floor(restant/60000) + ':' + Math.floor((restant%60000)/1000).toString().padStart(2,'0') + ' restantes'
      : ''
    html+='<div class="sticky-btn">'
    html+='<button id="btn-terminer" class="'+btnCls+'" onclick="confirmerTerminer()">✅ Terminer l\'examen ('+nbRepondues+'/20 répondues)'+tempsLabel+'</button>'
    if(nbRepondues<20) html+='<p style="text-align:center;font-size:12px;color:#999;margin-top:6px">Tu peux terminer même sans tout répondre</p>'
    html+='</div>'
  }

  document.getElementById('main-area').innerHTML=html
}

function pick(qi,oi){
  if(!examEnCours) return
  answers[qi]=oi
  // Mettre à jour uniquement l'option sélectionnée sans recréer tout le DOM
  const cards = document.querySelectorAll('.card')
  const card = cards[qi]
  if(card) {
    card.querySelectorAll('.option').forEach(function(el, j) {
      el.className = j===oi ? 'option selected' : 'option'
    })
  }
  // Mettre à jour le nb répondu dans le bouton
  var btn = document.getElementById('btn-terminer')
  var nbRepondues = Object.keys(answers).length
  if(btn) {
    const restant = heureFin ? Math.max(0, heureFin - Date.now()) : null
    const urgence = restant !== null && restant <= 300000
    const m = restant ? Math.floor(restant/60000).toString().padStart(2,'0') : '00'
    const s = restant ? Math.floor((restant%60000)/1000).toString().padStart(2,'0') : '00'
    btn.textContent = urgence
      ? '✅ Terminer l\'examen ('+nbRepondues+'/20 répondues) — '+m+':'+s+' restantes'
      : '✅ Terminer l\'examen ('+nbRepondues+'/20 répondues)'
  }
  setTimeout(function(){
    const cards=document.querySelectorAll('.card')
    if(cards[qi+1]) cards[qi+1].scrollIntoView({behavior:'smooth',block:'start'})
  },200)
}

function confirmerTerminer(){
  const nbRepondues=Object.keys(answers).length
  if(nbRepondues<20){
    const ok=confirm('⚠️ Tu n\'as répondu qu\'à '+nbRepondues+'/20 questions.\nLes '+(20-nbRepondues)+' questions sans réponse comptent comme fausses.\nTu es sûr de vouloir terminer ?')
    if(!ok) return
  }
  terminerExamen()
}

function terminerExamen(){
  arreterChrono()
  examEnCours=false
  document.getElementById('chrono').style.display='none'
  sauvegarder()
  renderResultats()
}

async function sauvegarder(){
  if(saved||!user)return
  if(!emailParent){
    const {data:profil}=await sb.from('profils').select('email_parent').eq('user_id',user.id).limit(1)
    if(profil&&profil.length>0) emailParent=profil[0].email_parent
  }
  const nbOk=questions.filter(function(q,i){return answers[i]===q.answer}).length
  const tempsSecondes=heureFin ? Math.floor((40*60*1000 - Math.max(0, heureFin - Date.now())) / 1000) : chronoSecondes
  const themes={}
  questions.forEach(function(q,i){
    const key=q.theme||'Partie '+q.partie
    if(!themes[key])themes[key]={ok:0,total:0}
    themes[key].total++
    if(answers[i]===q.answer)themes[key].ok++
  })
  const questionsRatees=questions
    .filter(function(q,i){return answers[i]!==undefined&&answers[i]!==q.answer})
    .map(function(q){return q.theme+' — '+(q.chapitre||'')})
  try{
    const {error}=await sb.from('examens_blancs').insert({
      user_id:user.id, email:user.email,
      prenom:prenom||'', email_parent:emailParent||'',
      score:nbOk, total:20, temps_secondes:tempsSecondes,
      scores_themes:themes, questions_ratees:questionsRatees, abandonne:false
    })
    if(error){ console.error('Erreur sauvegarde:', error.message); return }
    saved=true
    console.log('✅ Examen sauvegardé')
    if(emailParent){
      try{
        await fetch('/api/email-brevet-blanc',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            emailParent:emailParent, prenom:prenom||'', nom:nom||'',
            score:nbOk, total:20, pct:Math.round((nbOk/20)*100),
            scoresThemes:themes, tempsSecondes:tempsSecondes
          })
        })
        console.log('✅ Email envoyé')
      }catch(emailErr){ console.error('Erreur email:', emailErr.message) }
    }
  }catch(e){ console.log('Erreur:', e.message) }
}

function renderResultats(){
  const nbOk=questions.filter(function(q,i){return answers[i]===q.answer}).length
  const pct=Math.round((nbOk/20)*100)
  const mention=getMention(pct)
  const tempsSecondes=heureFin ? Math.floor((40*60*1000 - Math.max(0, heureFin - Date.now())) / 1000) : chronoSecondes
  const themes={}
  questions.forEach(function(q,i){
    const key=q.theme||'Partie '+q.partie
    if(!themes[key])themes[key]={ok:0,total:0}
    themes[key].total++
    if(answers[i]===q.answer)themes[key].ok++
  })
  let html='<div class="results-screen">'
  html+='<div class="results-score-big">'+nbOk+'/20</div>'
  html+='<div class="results-pct" style="color:'+(pct>=50?'#16a34a':'#dc2626')+'">'+pct+'%</div>'
  html+='<div class="results-mention">'+mention.label+'</div>'
  html+='<div class="results-temps">⏱️ '+formatTemps(tempsSecondes)+'</div>'
  html+='<div class="results-mention-officielle '+mention.cls+'">'+mention.officiel+'</div>'
  html+='<div class="themes-recap">'
  Object.keys(themes).forEach(function(theme){
    const s=themes[theme]
    const tpct=Math.round((s.ok/s.total)*100)
    html+='<div class="theme-score"><div class="theme-score-num" style="color:'+(tpct>=50?'#16a34a':'#dc2626')+'">'+s.ok+'/'+s.total+'</div><div class="theme-score-label">'+theme.split(' ')[0]+'</div></div>'
  })
  html+='</div>'
  html+='<div style="font-size:12px;color:#16a34a;margin-bottom:1.5rem">✅ Résultats enregistrés</div>'
  html+='<div class="results-btns">'
  html+='<button class="btn btn-primary btn-full" onclick="voirCorrection()">📋 Voir la correction complète</button>'
  html+='<button class="btn btn-green btn-full" onclick="demarrerExamen()">🔄 Recommencer un nouvel examen</button>'
  html+='<a href="quiz.html" class="btn btn-outline btn-full">← Retour à l\'accueil</a>'
  html+='</div></div>'
  document.getElementById('main-area').innerHTML=html
  window.scrollTo({top:0,behavior:'smooth'})
}

function voirCorrection(){
  const letters=['A','B','C','D']
  let html='<div style="margin-bottom:1rem"><button class="btn btn-outline" onclick="renderResultats()">← Retour aux résultats</button></div>'
  questions.forEach(function(q,i){
    const sel=answers[i]
    const correct=sel===q.answer
    const couleur=correct?'#16a34a':'#dc2626'
    const titre=correct?'✓ Bravo !':'✗ Pas tout à fait.'
    const bonneRep=!correct?'<br><strong style="color:#16a34a">La bonne réponse est : '+q.opts[q.answer]+'</strong>':''
    html+='<div class="card">'
    html+='<div class="q-meta"><span class="q-num">Question '+(i+1)+'/20</span>'
    html+='<span class="badge" style="'+(correct?'background:#f0fdf4;color:#16a34a':'background:#fef2f2;color:#dc2626')+'">'+(correct?'✅ Correct':'❌ Raté')+'</span>'
    html+='<span class="badge-theme">'+(q.chapitre||q.theme)+'</span></div>'
    html+='<p class="q-text">'+q.q+'</p>'
    q.opts.forEach(function(opt,j){
      let cls='option'
      if(j===q.answer) cls+=' correct'
      else if(j===sel&&sel!==q.answer) cls+=' wrong'
      html+='<div class="'+cls+'" style="cursor:default"><span class="letter">'+letters[j]+'</span>'+opt+'</div>'
    })
    html+='<div class="explication"><strong style="color:'+couleur+'">'+titre+'</strong>'+bonneRep+'<br><br>'+q.explication+'</div>'
    html+='</div>'
  })
  html+='<a href="quiz.html" class="btn btn-outline btn-full" style="margin-bottom:2rem">← Retour à l\'accueil</a>'
  document.getElementById('main-area').innerHTML=html
  window.scrollTo({top:0,behavior:'smooth'})
}

async function logout(){
  if(examEnCours&&!saved){
    const ok=confirm('⚠️ Examen en cours. Tes résultats seront perdus. Continuer ?')
    if(!ok)return
  }
  await sb.auth.signOut()
  window.location.href='index.html'
}

init()
</script>
