<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ACADEMIKA">
<title>Prof — ACADEMIKA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --border: #e4e4df;
  --text: #111111;
  --muted: #888880;
  --accent: #111111;
  --green: #16a34a;
  --blue: #2563eb;
  --amber: #d97706;
  --red: #dc2626;
  --green-bg: #f0fdf4;
  --blue-bg: #eff6ff;
  --amber-bg: #fffbeb;
  --red-bg: #fef2f2;
  --radius: 10px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

.wrap { max-width: 960px; margin: 0 auto; padding: 1.25rem 1rem; }

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
.logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: .08em; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
  text-decoration: none; white-space: nowrap;
}
.btn:hover { background: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-dark { background: var(--text); color: white; border-color: var(--text); }
.btn-dark:hover { opacity: .85; background: var(--text); }
.btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.btn-red:hover { background: var(--red); color: white; }
.btn-blue { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
.btn-blue:hover { background: var(--blue); color: white; }
.btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.btn-green:hover { background: var(--green); color: white; }
.btn:disabled { opacity: .5; cursor: default; pointer-events: none; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 5px; }
.stat-green { border-color: #86efac; background: var(--green-bg); }
.stat-green .stat-val { color: var(--green); }
.stat-blue { border-color: #93c5fd; background: var(--blue-bg); }
.stat-blue .stat-val { color: var(--blue); }
.stat-amber { border-color: #fcd34d; background: var(--amber-bg); }
.stat-amber .stat-val { color: var(--amber); }

.tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab {
  padding: 7px 15px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.tab:hover { background: var(--bg); }
.tab.active { background: var(--text); color: white; border-color: var(--text); }

.section { display: none; }
.section.active { display: block; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }

.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 7px 10px; font-size: 11px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
.tbl td { padding: 9px 10px; border-bottom: 1px solid #f3f3ef; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }

.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-ia { background: var(--green-bg); color: var(--green); }
.badge-banque { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-tb { background: var(--green-bg); color: var(--green); border: 1px solid #86efac; }
.badge-b { background: var(--blue-bg); color: var(--blue); border: 1px solid #93c5fd; }
.badge-ab { background: var(--amber-bg); color: var(--amber); border: 1px solid #fcd34d; }
.badge-admis { background: #f5f5f5; color: #555; border: 1px solid #ccc; }
.badge-insuf { background: var(--red-bg); color: var(--red); border: 1px solid #fca5a5; }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-label { font-size: 12px; color: var(--muted); width: 115px; flex-shrink: 0; }
.bar-track { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.bar-pct { font-size: 12px; font-weight: 600; width: 36px; text-align: right; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
.overlay.active { display: flex; }
.modal { background: white; border-radius: 14px; padding: 1.75rem; max-width: 580px; width: 92%; max-height: 88vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-close:hover { color: var(--text); }

.loader { text-align: center; color: var(--muted); padding: 4rem 1rem; font-size: 13px; }
.denied { text-align: center; color: var(--red); padding: 4rem 1rem; font-size: 14px; }
.empty { color: var(--muted); font-size: 13px; padding: .5rem 0; }

@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .tbl th:nth-child(n+5), .tbl td:nth-child(n+5) { display: none; }
}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="logo">ACADEMIKA — PROF</div>
    <button class="btn" onclick="logout()">Déconnexion</button>
  </nav>
  <div id="root"><div class="loader">Chargement…</div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="fiche-titre"></div>
      <button class="modal-close" onclick="closeFiche()">✕</button>
    </div>
    <div id="fiche-body"></div>
  </div>
</div>

<script>
/* ─── CONFIG ─── */
const SB_URL  = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SB_KEY  = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const PROF    = 'marcocampos2@gmail.com'
const sb      = supabase.createClient(SB_URL, SB_KEY)

/* ─── ÉTAT GLOBAL ─── */
let ROWS = [], EXAMENS = [], PROFILS = {}, ELEVES = []

/* ─── HELPERS ─── */
const pct     = (ok, tot) => tot ? Math.round(ok / tot * 100) : 0
const color   = p => p >= 80 ? '#16a34a' : p >= 60 ? '#2563eb' : p >= 40 ? '#d97706' : '#dc2626'
const fmt     = (m, s) => `${m}min ${s}s`
const fmtTemps = secs => { const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60); return h ? `${h}h ${m}min` : `${m} min` }
const dateStr = d => new Date(d).toLocaleDateString('fr-FR')

function mentionBadge(p) {
  if (p >= 80) return '<span class="badge badge-tb">Très Bien</span>'
  if (p >= 70) return '<span class="badge badge-b">Bien</span>'
  if (p >= 60) return '<span class="badge badge-ab">Assez Bien</span>'
  if (p >= 50) return '<span class="badge badge-admis">Admis</span>'
  return '<span class="badge badge-insuf">Non admis</span>'
}

/* ─── AUTH ─── */
async function logout() { await sb.auth.signOut(); location.href = 'index.html' }

/* ─── TABS ─── */
function setTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id))
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id))
}

/* ─── FICHE ÉLÈVE ─── */
function openFiche(userId) {
  const e = ELEVES.find(x => x.user_id === userId)
  if (!e) return
  const rows = ROWS.filter(r => r.user_id === userId)
  if (!rows.length) { alert('Pas encore de données pour cet élève.'); return }

  const moyPct   = Math.round((rows.reduce((a,r) => a + r.score/r.total, 0)/rows.length)*100)
  const tempsTot = rows.reduce((a,r) => a + (r.temps_secondes||0), 0)

  const themes = {}
  rows.forEach(r => {
    if (!themes[r.theme]) themes[r.theme] = { ok:0, tot:0, n:0 }
    themes[r.theme].ok += r.score
    themes[r.theme].tot += r.total
    themes[r.theme].n++
  })

  const rateeMap = {}
  rows.flatMap(r => r.questions_ratees||[]).forEach(q => rateeMap[q] = (rateeMap[q]||0)+1)
  const topRatees = Object.entries(rateeMap).sort((a,b) => b[1]-a[1]).slice(0,3)

  document.getElementById('fiche-titre').textContent = `${e.prenom} ${e.nom}`
  document.getElementById('fiche-body').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem">
      ${miniStat(moyPct + '%', 'Moyenne', color(moyPct))}
      ${miniStat(rows.length, 'Sessions', '#111')}
      ${miniStat(fmtTemps(tempsTot), 'Temps total', '#111')}
    </div>
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Par thème</div>
    ${Object.entries(themes).map(([t,s]) => {
      const p = pct(s.ok, s.tot)
      return `<div class="bar-row">
        <div class="bar-label">${t.split(' ')[0]}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${color(p)}"></div></div>
        <div class="bar-pct" style="color:${color(p)}">${p}%</div>
        <span style="font-size:11px;color:#999;margin-left:4px">(${s.n})</span>
      </div>`
    }).join('')}
    ${topRatees.length ? `
      <div style="font-size:13px;font-weight:600;margin:1.25rem 0 10px">Questions les plus ratées</div>
      ${topRatees.map(([q,n]) => `
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f3ef;font-size:12px">
          <span style="color:#555">${q.substring(0,65)}${q.length>65?'…':''}</span>
          <span style="color:#dc2626;font-weight:600;margin-left:8px">${n}×</span>
        </div>`).join('')}` : ''}
    <div style="margin-top:1.5rem;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-green" id="btn-bilan" onclick="envoyerBilan('${userId}')">Envoyer bilan parents</button>
      <button class="btn" onclick="closeFiche()">Fermer</button>
    </div>
  `
  document.getElementById('overlay').classList.add('active')
}

function miniStat(val, label, col) {
  return `<div style="background:#f7f7f5;border-radius:10px;padding:12px;text-align:center">
    <div style="font-size:26px;font-weight:700;color:${col}">${val}</div>
    <div style="font-size:11px;color:#888;margin-top:4px">${label}</div>
  </div>`
}

function closeFiche() { document.getElementById('overlay').classList.remove('active') }

/* ─── ENVOYER BILAN ─── */
async function envoyerBilan(userId) {
  const e = ELEVES.find(x => x.user_id === userId)
  if (!e?.email_parent || e.email_parent === '—') { alert("Pas d'email parent pour cet élève."); return }
  const btn = document.getElementById('btn-bilan')
  btn.disabled = true; btn.textContent = 'Envoi…'

  const rows = ROWS.filter(r => r.user_id === userId)
  const moyGlobale = Math.round((rows.reduce((a,r) => a+r.score/r.total,0)/rows.length)*100)
  const themes = {}
  rows.forEach(r => {
    if (!themes[r.theme]) themes[r.theme] = { ok:0, tot:0, n:0 }
    themes[r.theme].ok += r.score; themes[r.theme].tot += r.total; themes[r.theme].n++
  })
  const rateeMap = {}
  rows.flatMap(r => r.questions_ratees||[]).forEach(q => rateeMap[q]=(rateeMap[q]||0)+1)
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)

  try {
    const res = await fetch('/api/email-bilan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        emailParent: e.email_parent, prenom: e.prenom, nom: e.nom,
        moyGlobale, totalSessions: rows.length,
        tempsTotal: rows.reduce((a,r)=>a+(r.temps_secondes||0),0),
        themes, topRatees
      })
    })
    const data = await res.json()
    if (data.success) {
      btn.textContent = 'Envoyé ✓'
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Envoyer bilan parents' }, 3000)
    } else throw new Error(data.error)
  } catch(err) {
    alert('Erreur : ' + err.message)
    btn.disabled = false; btn.textContent = 'Envoyer bilan parents'
  }
}

/* ─── DÉBLOQUER EXAMEN ─── */
async function debloquerExamen(userId) {
  const e = ELEVES.find(x => x.user_id === userId)
  if (!confirm(`Débloquer l'examen pour ${e?.prenom || 'cet élève'} ?`)) return
  const { error } = await sb.from('examens_blancs').delete().eq('user_id', userId)
  if (error) { alert('Erreur : ' + error.message); return }
  alert('Examen débloqué !')
  init()
}

/* ─── RENDER ─── */
function render() {
  const nbEleves  = [...new Set(ROWS.map(r => r.user_id))].length
  const moyGlo    = ROWS.length ? Math.round((ROWS.reduce((a,r)=>a+r.score/r.total,0)/ROWS.length)*100) : 0
  const nbIA      = ROWS.filter(r => !r.source_questions || r.source_questions==='ia').length
  const nbBanque  = ROWS.filter(r => r.source_questions==='banque').length
  const nbExamens = EXAMENS.filter(e => !e.abandonne).length
  const pctIA     = ROWS.length ? Math.round(nbIA/ROWS.length*100) : 0

  const themeStats = {}
  ROWS.forEach(r => {
    if (!themeStats[r.theme]) themeStats[r.theme] = { ok:0, tot:0, n:0 }
    themeStats[r.theme].ok += r.score; themeStats[r.theme].tot += r.total; themeStats[r.theme].n++
  })

  const rateeMap = {}
  ROWS.forEach(r => (r.questions_ratees||[]).forEach(q => rateeMap[q]=(rateeMap[q]||0)+1))
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)

  const examMap = {}
  EXAMENS.filter(e=>!e.abandonne).forEach(e => examMap[e.user_id]=e)

  let h = ''

  /* Stats */
  h += `<div class="stats">
    <div class="stat"><div class="stat-val">${nbEleves}</div><div class="stat-label">Élèves actifs</div></div>
    <div class="stat"><div class="stat-val">${ROWS.length}</div><div class="stat-label">Sessions quiz</div></div>
    <div class="stat"><div class="stat-val">${moyGlo}%</div><div class="stat-label">Moyenne générale</div></div>
    <div class="stat stat-blue"><div class="stat-val">${nbExamens}</div><div class="stat-label">Examens blancs</div></div>
    <div class="stat stat-green"><div class="stat-val">${nbIA}</div><div class="stat-label">Sessions IA (${pctIA}%)</div></div>
    <div class="stat stat-amber"><div class="stat-val">${nbBanque}</div><div class="stat-label">Sessions banque (${100-pctIA}%)</div></div>
  </div>`

  /* Tabs */
  h += `<div class="tabs">
    <button class="tab active" data-tab="eleves"   onclick="setTab('eleves')">Élèves</button>
    <button class="tab"        data-tab="examens"  onclick="setTab('examens')">Examens blancs</button>
    <button class="tab"        data-tab="themes"   onclick="setTab('themes')">Thèmes</button>
    <button class="tab"        data-tab="sessions" onclick="setTab('sessions')">Sessions</button>
    <button class="tab"        data-tab="ratees"   onclick="setTab('ratees')">Questions ratées</button>
  </div>`

  /* ÉLÈVES */
  h += `<div class="section active" id="sec-eleves"><div class="card">
    <div class="card-title">Liste des élèves</div>
    <table class="tbl"><thead><tr>
      <th>Élève</th><th>Email parents</th><th>Sessions</th><th>Moyenne</th><th>Examen</th><th>Actions</th>
    </tr></thead><tbody>`
  ELEVES.forEach(e => {
    const p    = e.totalQ > 0 ? pct(e.totalScore, e.totalQ) : 0
    const exam = examMap[e.user_id]
    const examCell = exam
      ? `${mentionBadge(pct(exam.score, exam.total))} <span style="font-size:12px">${exam.score}/20</span>`
      : `<span style="color:#999;font-size:12px">—</span>`
    h += `<tr>
      <td><strong>${e.prenom} ${e.nom}</strong></td>
      <td style="color:#2563eb;font-size:12px">${e.email_parent}</td>
      <td>${e.sessions}</td>
      <td><strong style="color:${color(p)}">${p}%</strong></td>
      <td>${examCell}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn btn-sm btn-blue" onclick="openFiche('${e.user_id}')">Fiche</button>
        ${exam ? `<button class="btn btn-sm btn-red" onclick="debloquerExamen('${e.user_id}')">Débloquer</button>` : ''}
      </td>
    </tr>`
  })
  h += `</tbody></table></div></div>`

  /* EXAMENS */
  const examensValides = EXAMENS.filter(e => !e.abandonne)
  h += `<div class="section" id="sec-examens"><div class="card">
    <div class="card-title">Résultats Examens Blancs</div>`
  if (!examensValides.length) {
    h += `<p class="empty">Aucun examen passé.</p>`
  } else {
    h += `<table class="tbl"><thead><tr>
      <th>Élève</th><th>Score</th><th>Mention</th><th>Temps</th>
      <th>Nombres</th><th>Géométrie</th><th>Algèbre</th><th>Stats</th><th>Action</th>
    </tr></thead><tbody>`
    examensValides.forEach(e => {
      const p  = pct(e.score, e.total)
      const th = e.scores_themes || {}
      const sc = key => { const k = Object.keys(th).find(k=>k.toLowerCase().includes(key)); return k ? `${th[k].ok}/${th[k].total}` : '—' }
      const mins = Math.floor(e.temps_secondes/60), secs = e.temps_secondes%60
      const profil = PROFILS[e.user_id]
      const nom = profil ? `${profil.prenom_affiche} ${profil.nom_affiche}` : e.prenom||'—'
      h += `<tr>
        <td><strong>${nom}</strong></td>
        <td><strong>${e.score}/20</strong> <span style="font-size:11px;color:${p>=50?'#16a34a':'#dc2626'}">${p}%</span></td>
        <td>${mentionBadge(p)}</td>
        <td style="font-size:12px">${fmt(mins,secs)}</td>
        <td style="text-align:center;font-size:12px">${sc('nombre')}</td>
        <td style="text-align:center;font-size:12px">${sc('geom')}</td>
        <td style="text-align:center;font-size:12px">${sc('algebre')}</td>
        <td style="text-align:center;font-size:12px">${sc('stat')}</td>
        <td><button class="btn btn-sm btn-red" onclick="debloquerExamen('${e.user_id}')">Débloquer</button></td>
      </tr>`
    })
    h += `</tbody></table>`
  }
  h += `</div></div>`

  /* THÈMES */
  h += `<div class="section" id="sec-themes"><div class="card">
    <div class="card-title">Résultats par thème</div>
    <table class="tbl"><thead><tr><th>Thème</th><th>Sessions</th><th>Moyenne</th></tr></thead><tbody>`
  Object.entries(themeStats).forEach(([t,s]) => {
    const p = pct(s.ok, s.tot)
    h += `<tr><td>${t}</td><td>${s.n}</td><td><strong style="color:${color(p)}">${p}%</strong></td></tr>`
  })
  h += `</tbody></table></div></div>`

  /* SESSIONS */
  h += `<div class="section" id="sec-sessions"><div class="card">
    <div class="card-title">30 dernières sessions</div>
    <table class="tbl"><thead><tr>
      <th>Élève</th><th>Thème</th><th>Niveau</th><th>Score</th><th>Source</th><th>Date</th>
    </tr></thead><tbody>`
  ROWS.slice(0,30).forEach(r => {
    const profil = PROFILS[r.user_id]
    const nom    = profil ? `${profil.prenom_affiche} ${profil.nom_affiche}` : r.prenom||'—'
    const src    = (!r.source_questions||r.source_questions==='ia')
      ? '<span class="badge badge-ia">IA</span>'
      : '<span class="badge badge-banque">Banque</span>'
    const p = pct(r.score, r.total)
    h += `<tr>
      <td><strong>${nom}</strong></td>
      <td style="font-size:12px">${r.theme}</td>
      <td><span class="badge badge-blue">${r.difficulte}</span></td>
      <td><strong style="color:${color(p)}">${r.score}/${r.total}</strong></td>
      <td>${src}</td>
      <td style="font-size:12px;color:#999">${dateStr(r.created_at)}</td>
    </tr>`
  })
  h += `</tbody></table></div></div>`

  /* RATÉES */
  h += `<div class="section" id="sec-ratees"><div class="card">
    <div class="card-title">Questions les plus ratées</div>`
  if (topRatees.length) {
    topRatees.forEach(([q,n]) => {
      h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f3ef;font-size:13px">
        <span style="color:#444">${q}</span>
        <span style="color:#dc2626;font-weight:600;margin-left:12px;white-space:nowrap">${n}× raté</span>
      </div>`
    })
  } else {
    h += `<p class="empty">Pas encore de données.</p>`
  }
  h += `</div></div>`

  document.getElementById('root').innerHTML = h
}

/* ─── INIT ─── */
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { location.href = 'index.html'; return }

  const meta = session.user.user_metadata || {}
  if (meta.email_parent !== PROF) {
    const { data: p } = await sb.from('profils').select('email_parent').eq('user_id', session.user.id).single()
    if (!p || p.email_parent !== PROF) {
      document.getElementById('root').innerHTML = '<div class="denied">Accès réservé au professeur.</div>'
      return
    }
  }

  const [r1, r2, r3] = await Promise.all([
    sb.from('resultats').select('*').order('created_at', { ascending: false }),
    sb.from('examens_blancs').select('*').order('created_at', { ascending: false }),
    sb.from('profils').select('*')
  ])

  ROWS    = r1.data || []
  EXAMENS = r2.data || []
  const profils = r3.data || []

  PROFILS = {}
  profils.forEach(p => PROFILS[p.user_id] = p)

  ELEVES = profils.map(p => ({
    user_id:      p.user_id,
    prenom:       p.prenom_affiche || '—',
    nom:          p.nom_affiche    || '',
    email_parent: p.email_parent   || '—',
    sessions: 0, totalScore: 0, totalQ: 0
  }))
  ROWS.forEach(r => {
    const e = ELEVES.find(x => x.user_id === r.user_id)
    if (e) { e.sessions++; e.totalScore += r.score; e.totalQ += r.total }
  })

  render()
}

init()
</script>
