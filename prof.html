<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ACADEMIKA">
<title>Prof — ACADEMIKA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f5; --surface: #ffffff; --border: #e4e4df; --text: #111111; --muted: #888880;
  --green: #16a34a; --blue: #2563eb; --amber: #d97706; --red: #dc2626;
  --green-bg: #f0fdf4; --blue-bg: #eff6ff; --amber-bg: #fffbeb; --red-bg: #fef2f2;
  --radius: 10px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.wrap { max-width: 960px; margin: 0 auto; padding: 1.25rem 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: .08em; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap; }
.btn:hover { background: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.btn-red:hover { background: var(--red); color: white; }
.btn-blue { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
.btn-blue:hover { background: var(--blue); color: white; }
.btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.btn-green:hover { background: var(--green); color: white; }
.btn:disabled { opacity: .5; cursor: default; pointer-events: none; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 5px; }
.stat-green { border-color: #86efac; background: var(--green-bg); }
.stat-green .stat-val { color: var(--green); }
.stat-blue { border-color: #93c5fd; background: var(--blue-bg); }
.stat-blue .stat-val { color: var(--blue); }
.stat-amber { border-color: #fcd34d; background: var(--amber-bg); }
.stat-amber .stat-val { color: var(--amber); }
.tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab { padding: 7px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
.tab:hover { background: var(--bg); }
.tab.active { background: var(--text); color: white; border-color: var(--text); }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 7px 10px; font-size: 11px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
.tbl td { padding: 9px 10px; border-bottom: 1px solid #f3f3ef; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-ia { background: var(--green-bg); color: var(--green); }
.badge-banque { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-tb { background: var(--green-bg); color: var(--green); border: 1px solid #86efac; }
.badge-b { background: var(--blue-bg); color: var(--blue); border: 1px solid #93c5fd; }
.badge-ab { background: var(--amber-bg); color: var(--amber); border: 1px solid #fcd34d; }
.badge-admis { background: #f5f5f5; color: #555; border: 1px solid #ccc; }
.badge-insuf { background: var(--red-bg); color: var(--red); border: 1px solid #fca5a5; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-label { font-size: 12px; color: var(--muted); width: 115px; flex-shrink: 0; }
.bar-track { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }
.bar-pct { font-size: 12px; font-weight: 600; width: 36px; text-align: right; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
.overlay.active { display: flex; }
.modal { background: white; border-radius: 14px; padding: 1.75rem; max-width: 580px; width: 92%; max-height: 88vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-close:hover { color: var(--text); }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
.field input, .field textarea, .field select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: white; color: var(--text); transition: border-color .15s; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--blue); }
.field textarea { resize: vertical; min-height: 65px; }
.opt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.opt-row label { font-size: 12px; color: var(--muted); width: 18px; flex-shrink: 0; font-weight: 600; }
.opt-row input[type=text] { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; }
.opt-row input[type=text]:focus { outline: none; border-color: var(--blue); }
.opt-row .radio-label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; }
.opt-row input[type=radio] { cursor: pointer; }
.loader { text-align: center; color: var(--muted); padding: 4rem 1rem; font-size: 13px; }
.denied { text-align: center; color: var(--red); padding: 4rem 1rem; font-size: 14px; }
.empty { color: var(--muted); font-size: 13px; padding: .5rem 0; }
.dash-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.dash-table th { padding: 8px 6px; font-size: 10px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); text-align: center; }
.dash-table th:first-child { text-align: left; }
.dash-table td { padding: 8px 6px; border-bottom: 1px solid #f3f3ef; text-align: center; vertical-align: middle; }
.dash-table td:first-child { text-align: left; }
.dash-table tr:last-child td { border-bottom: none; }
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .tbl th:nth-child(n+5), .tbl td:nth-child(n+5) { display: none; }
}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="logo">ACADEMIKA — PROF</div>
    <button class="btn" onclick="logout()">Déconnexion</button>
  </nav>
  <div id="root"><div class="loader">Chargement…</div></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="fiche-titre"></div>
      <button class="modal-close" onclick="closeFiche()">✕</button>
    </div>
    <div id="fiche-body"></div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
let user=null, prenom='', nom='', emailParent=''
let questions=[], answers={}, saved=false
let chronoInterval=null, chronoSecondes=30*60
let examEnCours=false

window.addEventListener('beforeunload', function(e) {
  if(examEnCours&&!saved){e.preventDefault();e.returnValue='⚠️ Examen en cours !'}
})

function retourAccueil() {
  if(examEnCours&&!saved){
    const ok=confirm('⚠️ Examen en cours. Si tu quittes, tu perdras ta progression. Continuer quand même ?')
    if(!ok)return
  }
  window.location.href='quiz.html'
}

async function init() {
  const {data}=await sb.auth.getSession()
  if(!data.session){window.location.href='index.html';return}
  user=data.session.user
  prenom=user.user_metadata?.prenom||''
  nom=user.user_metadata?.nom||''
  emailParent=user.user_metadata?.email_parent||''

  // Toujours récupérer depuis la BDD pour être sûr
  const {data:profil}=await sb.from('profils').select('prenom_affiche,nom_affiche,email_parent').eq('user_id',user.id).limit(1)
  if(profil&&profil.length>0){
    prenom=prenom||profil[0].prenom_affiche||''
    nom=nom||profil[0].nom_affiche||''
    emailParent=emailParent||profil[0].email_parent||''
  }

  document.getElementById('user-email').textContent=prenom||user.email
  await renderIntro()
}

function getMention(pct){
  if(pct>=80)return{label:'🌟 Très Bien',cls:'mention-tb',officiel:'Mention Très Bien'}
  if(pct>=70)return{label:'👍 Bien',cls:'mention-b',officiel:'Mention Bien'}
  if(pct>=60)return{label:'✅ Assez Bien',cls:'mention-ab',officiel:'Mention Assez Bien'}
  if(pct>=50)return{label:'📋 Admis',cls:'mention-admis',officiel:'Admis'}
  return{label:'📚 À retravailler',cls:'mention-insuffisant',officiel:'Non admis'}
}

function formatTemps(s){
  const m=Math.floor(s/60)
  const sec=s%60
  return m+' min '+sec+' sec'
}

async function renderIntro() {
  const {data:historique}=await sb.from('examens_blancs')
    .select('*').eq('user_id',user.id).eq('abandonne',false)
    .order('created_at',{ascending:false}).limit(5)

  let historiqueHTML=''
  if(historique&&historique.length>0){
    let items=''
    historique.forEach(function(e){
      const pct=Math.round((e.score/e.total)*100)
      const mention=getMention(pct)
      const date=new Date(e.created_at).toLocaleDateString('fr-FR')
      items+='<div class="historique-item"><span>'+date+'</span><span><strong>'+e.score+'/20</strong> — '+pct+'%</span><span class="results-mention-officielle '+mention.cls+'" style="font-size:11px;padding:2px 8px">'+mention.officiel+'</span></div>'
    })
    historiqueHTML='<div style="margin-bottom:1.5rem;text-align:left"><p style="font-size:13px;font-weight:600;margin-bottom:8px;color:#1a1a1a">📊 Mes derniers examens :</p>'+items+'</div>'
  }

  document.getElementById('main-area').innerHTML=
    '<div class="intro-card">'+
    '<div class="intro-icon">📝</div>'+
    '<div class="intro-title">Examen Blanc Brevet</div>'+
    '<div class="intro-sub">Teste-toi dans les conditions du vrai brevet !<br>20 questions tirées aléatoirement sur tous les thèmes du programme.</div>'+
    '<div class="intro-deroulement"><p>📋 <strong>Déroulement :</strong> Tu vas répondre à 20 questions QCM réparties sur les 4 parties du programme. Tu as <strong>30 minutes</strong> pour tout répondre. La correction complète s\'affiche à la fin. Les questions changent à chaque passage !</p></div>'+
    '<div class="intro-rules">'+
    '<li>⏱️ <strong>30 minutes</strong> — chrono réaliste</li>'+
    '<li>📋 <strong>20 questions</strong> sur les 4 parties</li>'+
    '<li>🔀 <strong>Questions différentes</strong> à chaque passage</li>'+
    '<li>🔕 <strong>Pas de correction</strong> pendant l\'examen</li>'+
    '</div>'+
    historiqueHTML+
    '<button class="btn btn-primary btn-full" style="font-size:16px;padding:14px" onclick="demarrerExamen()">🚀 Commencer l\'examen</button>'+
    '</div>'
}

async function demarrerExamen() {
  document.getElementById('main-area').innerHTML='<div class="loader">⏳ Préparation de votre examen…</div>'
  try {
    const parties=[1,2,3,4]
    let toutesLesQuestions=[]
    for(let p=0;p<parties.length;p++){
      const partie=parties[p]
      const res=await sb.from('examen_questions').select('*').eq('partie',partie)
      if(res.error||!res.data||res.data.length===0) throw new Error('Questions partie '+partie+' introuvables')
      const total=res.data.length
      const tiers=Math.floor(total/3)
      const shuffled=res.data.sort(function(){return Math.random()-0.5})
      const acc=shuffled.slice(0,tiers).sort(function(){return Math.random()-0.5}).slice(0,2)
      const std=shuffled.slice(tiers,tiers*2).sort(function(){return Math.random()-0.5}).slice(0,2)
      const exp=shuffled.slice(tiers*2).sort(function(){return Math.random()-0.5}).slice(0,1)
      toutesLesQuestions=toutesLesQuestions.concat(acc).concat(std).concat(exp)
    }
    questions=toutesLesQuestions.sort(function(){return Math.random()-0.5}).map(function(q){
      return {
        q:q.question,
        opts:typeof q.opts==='string'?JSON.parse(q.opts):q.opts,
        answer:q.answer,
        explication:q.explication,
        theme:q.theme,
        chapitre:q.chapitre,
        partie:q.partie
      }
    })
    answers={};saved=false;examEnCours=true
    demarrerChrono()
    renderExamen()
  } catch(e){
    document.getElementById('main-area').innerHTML='<div class="loader">❌ '+e.message+'</div>'
  }
}

function demarrerChrono(){
  chronoSecondes=30*60
  document.getElementById('chrono').style.display='flex'
  document.getElementById('chrono').classList.remove('chrono-warning')
  chronoInterval=setInterval(function(){
    chronoSecondes--
    const m=Math.floor(chronoSecondes/60).toString().padStart(2,'0')
    const s=(chronoSecondes%60).toString().padStart(2,'0')
    document.getElementById('chrono-text').textContent=m+':'+s
    if(chronoSecondes<=300) document.getElementById('chrono').classList.add('chrono-warning')
    if(chronoSecondes<=0){clearInterval(chronoInterval);terminerExamen()}
  },1000)
}

function arreterChrono(){clearInterval(chronoInterval)}

function renderExamen(){
  const nbRepondues=Object.keys(answers).length
  const pct=Math.round((nbRepondues/questions.length)*100)
  const letters=['A','B','C','D']
  let html=''
  html+='<div class="progress-label"><span>'+nbRepondues+'/20 questions répondues</span><span>'+pct+'%</span></div>'
  html+='<div class="progress-bar-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div>'
  questions.forEach(function(q,i){
    const sel=answers[i]
    html+='<div class="card">'
    html+='<div class="q-meta"><span class="q-num">Question '+(i+1)+'/20</span><span class="badge-partie">Partie '+q.partie+'</span><span class="badge-theme">'+(q.chapitre||q.theme)+'</span></div>'
    html+='<p class="q-text">'+q.q+'</p>'
    q.opts.forEach(function(opt,j){
      const cls=j===sel?'option selected':'option'
      html+='<div class="'+cls+'" onclick="pick('+i+','+j+')"><span class="letter">'+letters[j]+'</span>'+opt+'</div>'
    })
    html+='</div>'
  })
  html+='<div class="sticky-btn">'
  html+='<button class="btn btn-green btn-full" onclick="terminerExamen()">✅ Terminer l\'examen ('+nbRepondues+'/20 répondues)</button>'
  if(nbRepondues<20) html+='<p style="text-align:center;font-size:12px;color:#999;margin-top:6px">Tu peux terminer même sans tout répondre</p>'
  html+='</div>'
  document.getElementById('main-area').innerHTML=html
}

function pick(qi,oi){
  answers[qi]=oi
  renderExamen()
  setTimeout(function(){
    const cards=document.querySelectorAll('.card')
    if(cards[qi+1]) cards[qi+1].scrollIntoView({behavior:'smooth',block:'start'})
  },200)
}

function terminerExamen(){
  arreterChrono();examEnCours=false
  document.getElementById('chrono').style.display='none'
  sauvegarder()
  renderResultats()
}

async function sauvegarder(){
  if(saved||!user)return

  // Toujours récupérer emailParent depuis la BDD
  if(!emailParent){
    const {data:profil}=await sb.from('profils').select('email_parent').eq('user_id',user.id).limit(1)
    if(profil&&profil.length>0) emailParent=profil[0].email_parent
  }

  const nbOk=questions.filter(function(q,i){return answers[i]===q.answer}).length
  const tempsSecondes=30*60-chronoSecondes
  const themes={}
  questions.forEach(function(q,i){
    const key=q.theme||'Partie '+q.partie
    if(!themes[key])themes[key]={ok:0,total:0}
    themes[key].total++
    if(answers[i]===q.answer)themes[key].ok++
  })
  const questionsRatees=questions
    .filter(function(q,i){return answers[i]!==undefined&&answers[i]!==q.answer})
    .map(function(q){return q.theme+' — '+(q.chapitre||'')})

  try{
    // 1. Sauvegarder dans Supabase EN PREMIER
    const {error}=await sb.from('examens_blancs').insert({
      user_id:user.id,
      email:user.email,
      prenom:prenom||'',
      email_parent:emailParent||'',
      score:nbOk,
      total:20,
      temps_secondes:tempsSecondes,
      scores_themes:themes,
      questions_ratees:questionsRatees,
      abandonne:false
    })

    if(error){
      console.error('Erreur sauvegarde Supabase:', error.message)
      return
    }

    saved=true
    console.log('✅ Examen sauvegardé dans Supabase')

    // 2. Envoyer email ENSUITE
    if(emailParent){
      try{
        await fetch('/api/email-brevet-blanc',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            emailParent:emailParent,
            prenom:prenom||'',
            nom:nom||'',
            score:nbOk,
            total:20,
            pct:Math.round((nbOk/20)*100),
            scoresThemes:themes,
            tempsSecondes:tempsSecondes
          })
        })
        console.log('✅ Email envoyé')
      }catch(emailErr){
        console.error('Erreur email:', emailErr.message)
      }
    }
  }catch(e){
    console.log('Erreur sauvegarde:',e.message)
  }
}

function renderResultats(){
  const nbOk=questions.filter(function(q,i){return answers[i]===q.answer}).length
  const pct=Math.round((nbOk/20)*100)
  const mention=getMention(pct)
  const tempsSecondes=30*60-chronoSecondes
  const themes={}
  questions.forEach(function(q,i){
    const key=q.theme||'Partie '+q.partie
    if(!themes[key])themes[key]={ok:0,total:0}
    themes[key].total++
    if(answers[i]===q.answer)themes[key].ok++
  })
  let html='<div class="results-screen">'
  html+='<div class="results-score-big">'+nbOk+'/20</div>'
  html+='<div class="results-pct" style="color:'+(pct>=50?'#16a34a':'#dc2626')+'">'+pct+'%</div>'
  html+='<div class="results-mention">'+mention.label+'</div>'
  html+='<div class="results-temps">⏱️ '+formatTemps(tempsSecondes)+'</div>'
  html+='<div class="results-mention-officielle '+mention.cls+'">'+mention.officiel+'</div>'
  html+='<div class="themes-recap">'
  Object.keys(themes).forEach(function(theme){
    const s=themes[theme]
    const tpct=Math.round((s.ok/s.total)*100)
    html+='<div class="theme-score"><div class="theme-score-num" style="color:'+(tpct>=50?'#16a34a':'#dc2626')+'">'+s.ok+'/'+s.total+'</div><div class="theme-score-label">'+theme.split(' ')[0]+'</div></div>'
  })
  html+='</div>'
  html+='<div style="font-size:12px;color:#16a34a;margin-bottom:1.5rem">✅ Résultats enregistrés</div>'
  html+='<div class="results-btns">'
  html+='<button class="btn btn-primary btn-full" onclick="voirCorrection()">📋 Voir la correction complète</button>'
  html+='<button class="btn btn-green btn-full" onclick="demarrerExamen()">🔄 Recommencer un nouvel examen</button>'
  html+='<a href="quiz.html" class="btn btn-outline btn-full">← Retour à l\'accueil</a>'
  html+='</div></div>'
  document.getElementById('main-area').innerHTML=html
  window.scrollTo({top:0,behavior:'smooth'})
}

function voirCorrection(){
  const letters=['A','B','C','D']
  let html='<div style="margin-bottom:1rem"><button class="btn btn-outline" onclick="renderResultats()">← Retour aux résultats</button></div>'
  questions.forEach(function(q,i){
    const sel=answers[i]
    const correct=sel===q.answer
    const couleur=correct?'#16a34a':'#dc2626'
    const titre=correct?'✓ Bravo !':'✗ Pas tout à fait.'
    const bonneRep=!correct?'<br><strong style="color:#16a34a">La bonne réponse est : '+q.opts[q.answer]+'</strong>':''
    html+='<div class="card">'
    html+='<div class="q-meta"><span class="q-num">Question '+(i+1)+'/20</span>'
    html+='<span class="badge" style="'+(correct?'background:#f0fdf4;color:#16a34a':'background:#fef2f2;color:#dc2626')+'">'+(correct?'✅ Correct':'❌ Raté')+'</span>'
    html+='<span class="badge-theme">'+(q.chapitre||q.theme)+'</span></div>'
    html+='<p class="q-text">'+q.q+'</p>'
    q.opts.forEach(function(opt,j){
      let cls='option'
      if(j===q.answer) cls+=' correct'
      else if(j===sel&&sel!==q.answer) cls+=' wrong'
      html+='<div class="'+cls+'" style="cursor:default"><span class="letter">'+letters[j]+'</span>'+opt+'</div>'
    })
    html+='<div class="explication"><strong style="color:'+couleur+'">'+titre+'</strong>'+bonneRep+'<br><br>'+q.explication+'</div>'
    html+='</div>'
  })
  html+='<a href="quiz.html" class="btn btn-outline btn-full" style="margin-bottom:2rem">← Retour à l\'accueil</a>'
  document.getElementById('main-area').innerHTML=html
  window.scrollTo({top:0,behavior:'smooth'})
}

async function logout(){
  if(examEnCours&&!saved){
    const ok=confirm('⚠️ Examen en cours. Tes résultats seront perdus. Continuer ?')
    if(!ok)return
  }
  await sb.auth.signOut()
  window.location.href='index.html'
}

init()
</script>
