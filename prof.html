<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f5; --surface: #ffffff; --border: #e4e4df; --text: #111111; --muted: #888880;
  --green: #16a34a; --blue: #2563eb; --amber: #d97706; --red: #dc2626;
  --green-bg: #f0fdf4; --blue-bg: #eff6ff; --amber-bg: #fffbeb; --red-bg: #fef2f2;
  --radius: 10px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.wrap { max-width: 960px; margin: 0 auto; padding: 1.25rem 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: .08em; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap; }
.btn:hover { background: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.btn-red:hover { background: var(--red); color: white; }
.btn-blue { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
.btn-blue:hover { background: var(--blue); color: white; }
.btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.btn-green:hover { background: var(--green); color: white; }
.btn-amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
.btn-amber:hover { background: var(--amber); color: white; }
.btn:disabled { opacity: .5; cursor: default; pointer-events: none; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 5px; }
.stat-green { border-color: #86efac; background: var(--green-bg); }
.stat-green .stat-val { color: var(--green); }
.stat-blue { border-color: #93c5fd; background: var(--blue-bg); }
.stat-blue .stat-val { color: var(--blue); }
.stat-amber { border-color: #fcd34d; background: var(--amber-bg); }
.stat-amber .stat-val { color: var(--amber); }
.tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab { padding: 7px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
.tab:hover { background: var(--bg); }
.tab.active { background: var(--text); color: white; border-color: var(--text); }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 7px 10px; font-size: 11px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
.tbl td { padding: 9px 10px; border-bottom: 1px solid #f3f3ef; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-ia { background: var(--green-bg); color: var(--green); }
.badge-banque { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-tb { background: var(--green-bg); color: var(--green); border: 1px solid #86efac; }
.badge-b { background: var(--blue-bg); color: var(--blue); border: 1px solid #93c5fd; }
.badge-ab { background: var(--amber-bg); color: var(--amber); border: 1px solid #fcd34d; }
.badge-admis { background: #f5f5f5; color: #555; border: 1px solid #ccc; }
.badge-insuf { background: var(--red-bg); color: var(--red); border: 1px solid #fca5a5; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
.overlay.active { display: flex; }
.modal { background: white; border-radius: 14px; padding: 1.75rem; max-width: 620px; width: 92%; max-height: 88vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-close:hover { color: var(--text); }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
.field input, .field textarea, .field select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: white; color: var(--text); transition: border-color .15s; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--blue); }
.field textarea { resize: vertical; min-height: 65px; }
.opt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.opt-row label { font-size: 12px; color: var(--muted); width: 18px; flex-shrink: 0; font-weight: 600; }
.opt-row input[type=text] { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; }
.opt-row input[type=text]:focus { outline: none; border-color: var(--blue); }
.opt-row .radio-label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; }
.opt-row input[type=radio] { cursor: pointer; }
.loader { text-align: center; color: var(--muted); padding: 4rem 1rem; font-size: 13px; }
.denied { text-align: center; color: var(--red); padding: 4rem 1rem; font-size: 14px; }
.empty { color: var(--muted); font-size: 13px; padding: .5rem 0; }
.dash-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.dash-table th { padding: 8px 6px; font-size: 10px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); text-align: center; }
.dash-table th:first-child { text-align: left; }
.dash-table td { padding: 8px 6px; border-bottom: 1px solid #f3f3ef; text-align: center; vertical-align: middle; }
.dash-table td:first-child { text-align: left; }
.dash-table tr:last-child td { border-bottom: none; }
.q-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.q-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.q-card-text { font-size: 13px; color: var(--text); line-height: 1.6; flex: 1; }
.q-card-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
.q-figure { margin: 8px 0; display: flex; justify-content: center; background: white; border-radius: 8px; padding: 10px; border: 1px solid var(--border); }
.q-figure svg { max-width: 200px; height: auto; }
.q-figure img { max-width: 200px; height: auto; border-radius: 6px; }
.q-tableau { border-collapse: collapse; margin: 8px 0; font-size: 12px; width: 100%; }
.q-tableau th { border: 1px solid #ccc; padding: 4px 10px; background: #f5f5f0; font-weight: 600; text-align: center; }
.q-tableau td { border: 1px solid #ccc; padding: 4px 10px; text-align: center; }
.banque-filters { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.banque-filters select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: white; }
.banque-filters input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; flex: 1; min-width: 160px; }
.pagination { display: flex; gap: 6px; align-items: center; margin-top: 1rem; justify-content: center; font-size: 12px; }
.inscrit-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.inscrit-card.confirme { border-color: #86efac; background: var(--green-bg); }
.inscrit-card.attente { border-color: #fcd34d; background: var(--amber-bg); }
.inscrit-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.inscrit-name { font-size: 15px; font-weight: 600; }
.inscrit-info { font-size: 12px; color: var(--muted); margin-top: 4px; }
.inscrit-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.places-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; margin-bottom: 4px; }
.places-bar-fill { height: 6px; border-radius: 4px; background: var(--green); transition: width 0.3s; }
.places-bar-fill.warn { background: var(--amber); }
.places-bar-fill.full { background: var(--red); }
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .tbl th:nth-child(n+5), .tbl td:nth-child(n+5) { display: none; }
}
</style>

<script>
const SB_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SB_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const PROF   = 'marcocampos2@gmail.com'
const sb     = supabase.createClient(SB_URL, SB_KEY)

const THEMES  = ['Nombres et calculs','Géométrie','Algèbre et équations','Statistiques et probabilités','Fonctions','Algorithmique']
const THEMES_SHORT = ['Nombres','Géométrie','Algèbre','Stats','Fonctions','Algo']
const MAX_PLACES = 5

let ROWS = [], EXAMENS = [], PROFILS = {}, ELEVES = []
let INSCRIPTIONS = []
let BANQUE_DATA = []
let banqueFiltre = { theme: '', diff: '', search: '', page: 0 }
const PER_PAGE = 20
let editCurrentId = null
let editCurrentTable = 'questions_banque'
let noteCurrentId = null
let adresseCurrentId = null

const pct      = (ok, tot) => tot ? Math.round(ok / tot * 100) : 0
const color    = p => p >= 70 ? '#16a34a' : p >= 50 ? '#d97706' : '#dc2626'
const emoji    = p => p >= 70 ? '🟢' : p >= 50 ? '🟡' : '🔴'
const fmt      = (m, s) => m+'min '+s+'s'
const fmtTemps = s => { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60); return h ? h+'h '+m+'min' : m+' min' }
const dateStr  = d => new Date(d).toLocaleDateString('fr-FR')

function getStatut(p) {
  if (p >= 70) return { label: 'Maîtrisé', emoji: '✅', color: '#16a34a' }
  if (p >= 50) return { label: 'En cours', emoji: '⚠️', color: '#d97706' }
  return { label: 'À retravailler', emoji: '❌', color: '#dc2626' }
}

function mentionBadge(p) {
  if (p >= 80) return '<span class="badge badge-tb">Très Bien</span>'
  if (p >= 70) return '<span class="badge badge-b">Bien</span>'
  if (p >= 60) return '<span class="badge badge-ab">Assez Bien</span>'
  if (p >= 50) return '<span class="badge badge-admis">Admis</span>'
  return '<span class="badge badge-insuf">Non admis</span>'
}

function mentionLabel(p) {
  if (p >= 80) return 'Très Bien'
  if (p >= 70) return 'Bien'
  if (p >= 60) return 'Assez Bien'
  if (p >= 50) return 'Admis'
  return 'Non admis'
}

function scoresExamen(th) {
  const sc = key => {
    const k = Object.keys(th).find(k => k.toLowerCase().includes(key))
    return k ? th[k].ok+'/'+th[k].total : '—'
  }
  return { nombres: sc('nombre'), geo: sc('espace')||sc('geom'), stats: sc('organisation')||sc('stat'), grandeurs: sc('grandeur')||sc('algo') }
}

async function logout() { await sb.auth.signOut(); location.href = 'index.html' }

function setTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id))
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-'+id))
  if (id === 'banque') { banqueFiltre = { theme: '', diff: '', search: '', page: 0 }; chargerBanque() }
  if (id === 'inscriptions') chargerInscriptions()
}

function miniStat(val, label, col) {
  return '<div style="background:#f7f7f5;border-radius:10px;padding:12px;text-align:center"><div style="font-size:26px;font-weight:700;color:'+col+'">'+val+'</div><div style="font-size:11px;color:#888;margin-top:4px">'+label+'</div></div>'
}

// ═══════════════════════════════════════════════════
// INSCRIPTIONS BREVET BLANC
// ═══════════════════════════════════════════════════
async function chargerInscriptions() {
  const el = document.getElementById('inscriptions-list')
  if (!el) return
  el.innerHTML = '<div class="loader">Chargement…</div>'

  const { data, error } = await sb.from('inscriptions_brevet').select('*').order('created_at', { ascending: true })
  if (error) { el.innerHTML = '<div class="empty">Erreur : '+error.message+'</div>'; return }

  INSCRIPTIONS = data || []

  const places = { '17 juin': 0, '24 juin': 0 }
  INSCRIPTIONS.forEach(i => {
    if (i.date_choisie === '17 juin') places['17 juin']++
    else if (i.date_choisie === '24 juin') places['24 juin']++
  })

  let html = ''

  const adresseActuelle = document.getElementById('adresse-lieu')?.value || '12 rue des Lilas, 77310 Ponthierry'
  html += '<div class="card" style="margin-bottom:1rem">'
  html += '<div style="font-size:12px;color:var(--muted);margin-bottom:4px">📍 Adresse du lieu d\'examen — incluse dans l\'email de confirmation</div>'
  html += '<textarea id="adresse-lieu" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:\'DM Sans\',sans-serif;font-size:13px;resize:vertical;min-height:52px;background:white;color:var(--text)">'+adresseActuelle+'</textarea>'
  html += '</div>'

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem">'
  ;['17 juin', '24 juin'].forEach(date => {
    const nb = places[date]
    const pctPlaces = Math.round(nb/MAX_PLACES*100)
    const fillClass = pctPlaces >= 100 ? 'full' : pctPlaces >= 60 ? 'warn' : ''
    html += '<div class="card" style="margin-bottom:0">'
    html += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">📅 '+date+' · 15h00</div>'
    html += '<div class="places-bar-wrap"><div class="places-bar-fill '+fillClass+'" style="width:'+Math.min(pctPlaces,100)+'%"></div></div>'
    html += '<div style="font-size:12px;color:var(--muted)">'+nb+' / '+MAX_PLACES+' places — '+(MAX_PLACES-nb)+' disponibles</div>'
    html += '</div>'
  })
  html += '</div>'

  if (!INSCRIPTIONS.length) {
    el.innerHTML = html + '<div class="empty">Aucune inscription pour le moment.</div>'
    return
  }

  ;['17 juin', '24 juin'].forEach(date => {
    const inscrits = INSCRIPTIONS.filter(i => i.date_choisie === date)
    if (!inscrits.length) return

    html += '<div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px;margin-top:8px">📅 '+date+' · 15h00</div>'

    inscrits.forEach(i => {
      const isConfirme = i.confirme
      const hasNote = i.note !== null
      const cardClass = isConfirme ? 'confirme' : 'attente'
      const dateInscription = dateStr(i.created_at)

      html += '<div class="inscrit-card '+cardClass+'">'
      html += '<div class="inscrit-header">'
      html += '<div>'
      html += '<div class="inscrit-name">'+i.prenom+' '+i.nom+'</div>'
      html += '<div class="inscrit-info">📧 '+i.email_parent+(i.telephone?' · 📞 '+i.telephone:'')+'</div>'
      html += '<div class="inscrit-info">Inscrit le '+dateInscription+'</div>'
      html += '</div>'
      html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
      if (isConfirme) html += '<span class="badge badge-tb">✅ Confirmé</span>'
      else html += '<span class="badge badge-ab">⏳ En attente</span>'
      if (hasNote) html += '<span class="badge badge-blue">📝 Note : '+i.note+'/20</span>'
      if (i.resultats_envoyes) html += '<span class="badge badge-tb">📤 Résultats envoyés</span>'
      html += '</div>'
      html += '</div>'

      html += '<div class="inscrit-actions">'
      if (!isConfirme) {
        html += '<button class="btn btn-sm btn-green" onclick="confirmerEtEnvoyerAdresse(\''+i.id+'\',\''+i.prenom+'\',\''+i.nom+'\',\''+i.email_parent+'\',\''+i.date_choisie+'\')">✅ Confirmer + adresse</button>'
        html += '<button class="btn btn-sm btn-red" onclick="refuserInscription(\''+i.id+'\',\''+i.prenom+'\',\''+i.nom+'\',\''+i.email_parent+'\',\''+i.date_choisie+'\')">❌ Refuser</button>'
      }
      if (isConfirme && !hasNote) {
        html += '<button class="btn btn-sm btn-amber" onclick="ouvrirNote(\''+i.id+'\',\''+i.prenom+' '+i.nom+'\')">📝 Saisir note</button>'
      }
      if (isConfirme && hasNote && !i.resultats_envoyes) {
        html += '<button class="btn btn-sm btn-green" onclick="envoyerResultats(\''+i.id+'\')">📤 Envoyer résultats</button>'
      }
      if (isConfirme) {
        html += '<button class="btn btn-sm btn-red" onclick="supprimerAvecEmail(\''+i.id+'\',\''+i.prenom+'\',\''+i.nom+'\',\''+i.email_parent+'\',\''+i.date_choisie+'\')">🗑 Annuler</button>'
      }
      html += '</div>'
      html += '</div>'
    })
  })

  el.innerHTML = html
}

async function confirmerEtEnvoyerAdresse(id, prenom, nom, emailParent, date) {
  const adresse = document.getElementById('adresse-lieu')?.value?.trim()
  if (!adresse) { alert('⚠️ Saisis l\'adresse du lieu avant de confirmer.'); return }
  if (!confirm('Confirmer l\'inscription de '+prenom+' et envoyer l\'adresse à '+emailParent+' ?')) return

  const { error } = await sb.from('inscriptions_brevet').update({ confirme: true, lieu_envoye: true }).eq('id', id)
  if (error) { alert('Erreur : '+error.message); return }

  try {
    await fetch('/api/email-adresse-brevet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emailParent, prenom, nom, date, adresse, type: 'confirmation' })
    })
  } catch(e) { console.log('Erreur email confirmation:', e.message) }

  chargerInscriptions()
}

async function refuserInscription(id, prenom, nom, emailParent, date) {
  if (!confirm('Refuser l\'inscription de '+prenom+' et envoyer un email à '+emailParent+' ?')) return

  try {
    await fetch('/api/email-adresse-brevet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emailParent, prenom, nom, date, type: 'refus' })
    })
  } catch(e) { console.log('Erreur email refus:', e.message) }

  const { error } = await sb.from('inscriptions_brevet').delete().eq('id', id)
  if (error) { alert('Erreur suppression : '+error.message); return }

  chargerInscriptions()
}

async function supprimerAvecEmail(id, prenom, nom, emailParent, date) {
  if (!confirm('Annuler l\'inscription confirmée de '+prenom+' et envoyer un email à '+emailParent+' ?')) return

  try {
    await fetch('/api/email-adresse-brevet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emailParent, prenom, nom, date, type: 'annulation' })
    })
  } catch(e) { console.log('Erreur email annulation:', e.message) }

  const { error } = await sb.from('inscriptions_brevet').delete().eq('id', id)

// ═══════════════════════════════════════════════════
// FIGURE SVG
// ═══════════════════════════════════════════════════
function renderFigureSVG(fig) {
  if (!fig || !fig.type) return ''
  var f = fig
  if (typeof f === 'string') { try { f = JSON.parse(f) } catch(e) { return '' } }
  if (!f || !f.type) return ''
  if (f.type === 'triangle_rect' && f.base === '?' && f.hauteur === '?') return ''
  const S = 180, P = 28
  const style = '<style>.fig-sh{fill:#eef2ff;stroke:#3730a3;stroke-width:1.5;stroke-linejoin:round}.fig-dm{fill:none;stroke:#3730a3;stroke-width:0.8;stroke-dasharray:3,2}.fig-lb{font-size:10px;fill:#3730a3;font-weight:600;font-family:sans-serif}.fig-rt{fill:none;stroke:#16a34a;stroke-width:1.3}.fig-dot{fill:#3730a3}.fig-dotg{fill:#16a34a}.fig-ln{stroke:#888;stroke-width:1;fill:none}.fig-lnb{stroke:#3730a3;stroke-width:1.3;fill:none}.fig-lng{stroke:#16a34a;stroke-width:1.3;fill:none}</style>'
  const open = '<svg width="180" height="180" viewBox="0 0 '+S+' '+S+'" xmlns="http://www.w3.org/2000/svg">'+style
  if (f.type === 'triangle_rect') {
    const u=f.unite||'cm'
    const baseVal=f.base==='?'?(Number(f.hauteur)||4):Number(f.base)
    const hautVal=f.hauteur==='?'?(Number(f.base)||4):Number(f.hauteur)
    const sc=Math.min((S-2*P)/baseVal,(S-2*P)/hautVal)*0.85
    const W=baseVal*sc,H=hautVal*sc,ox=P+8,oy=S-P,sq=9
    const bL=f.base==='?'?'?':f.base+' '+u
    const hL=f.hauteur==='?'?'?':f.hauteur+' '+u
    return open+'<polygon class="fig-sh" points="'+ox+','+oy+' '+(ox+W)+','+oy+' '+ox+','+(oy-H)+'"/><rect class="fig-rt" x="'+ox+'" y="'+(oy-sq)+'" width="'+sq+'" height="'+sq+'"/><text class="fig-lb" x="'+(ox+W/2)+'" y="'+(oy+14)+'" text-anchor="middle">'+bL+'</text><text class="fig-lb" x="'+(ox-7)+'" y="'+(oy-H/2+4)+'" text-anchor="end">'+hL+'</text></svg>'
  }
  if (f.type === 'rectangle') {
    const u=f.unite||'cm',sc=Math.min((S-2*P)/f.largeur,(S-2*P)/f.hauteur)*0.85
    const W=f.largeur*sc,H=f.hauteur*sc,ox=(S-W)/2,oy=(S-H)/2
    return open+'<rect class="fig-sh" x="'+ox+'" y="'+oy+'" width="'+W+'" height="'+H+'"/><text class="fig-lb" x="'+(ox+W/2)+'" y="'+(oy+H+14)+'" text-anchor="middle">'+f.largeur+' '+u+'</text><text class="fig-lb" x="'+(ox-7)+'" y="'+(oy+H/2+4)+'" text-anchor="end">'+f.hauteur+' '+u+'</text></svg>'
  }
  if (f.type === 'cercle') {
    const u=f.unite||'cm',R=(S-2*P)/2*0.82,cx=S/2,cy=S/2
    return open+'<circle class="fig-sh" cx="'+cx+'" cy="'+cy+'" r="'+R+'"/><line class="fig-dm" x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R)+'" y2="'+cy+'"/><circle class="fig-dot" cx="'+cx+'" cy="'+cy+'" r="2.5"/><text class="fig-lb" x="'+(cx+R/2)+'" y="'+(cy-7)+'" text-anchor="middle">r='+f.rayon+' '+u+'</text></svg>'
  }
  if (f.type === 'pythagore') {
    const u=f.unite||'cm'
    const aVal=(f.a&&f.a!=='?'&&f.a!==null)?Number(f.a):null
    const bVal=(f.b&&f.b!=='?'&&f.b!==null)?Number(f.b):null
    const refVal=aVal||bVal||4
    const sc2=Math.min((S-2*P)/(refVal+4),(S-2*P)/(refVal+4))*0.72
    const A=(aVal||refVal)*sc2,B=(bVal||refVal)*sc2,sq=9,ox=P+8,oy=S-P
    const aL=aVal?aVal+' '+u:'?',bL=bVal?bVal+' '+u:'?',cL=(f.c&&f.c!=='?')?f.c+' '+u:'?'
    return open+'<polygon class="fig-sh" points="'+ox+','+oy+' '+(ox+B)+','+oy+' '+ox+','+(oy-A)+'"/><rect class="fig-rt" x="'+ox+'" y="'+(oy-sq)+'" width="'+sq+'" height="'+sq+'"/><text class="fig-lb" x="'+(ox+B/2)+'" y="'+(oy+14)+'" text-anchor="middle">'+bL+'</text><text class="fig-lb" x="'+(ox-7)+'" y="'+(oy-A/2+4)+'" text-anchor="end">'+aL+'</text><text class="fig-lb" x="'+(ox+B/2+12)+'" y="'+(oy-A/2-5)+'" text-anchor="start">'+cL+'</text></svg>'
  }
  if (f.type === 'triangle') {
    const u=f.unite||'cm',sc=Math.min((S-2*P)/f.base,(S-2*P)/f.hauteur)*0.85
    const W=f.base*sc,H=f.hauteur*sc,ox=(S-W)/2,oy=S-P,ax=ox+W*0.38,ay=oy-H
    return open+'<polygon class="fig-sh" points="'+ox+','+oy+' '+(ox+W)+','+oy+' '+ax+','+ay+'"/><line class="fig-dm" x1="'+ax+'" y1="'+ay+'" x2="'+ax+'" y2="'+oy+'"/><text class="fig-lb" x="'+(S/2)+'" y="'+(oy+14)+'" text-anchor="middle">'+f.base+' '+u+'</text><text class="fig-lb" x="'+(ax+7)+'" y="'+((ay+oy)/2+4)+'" text-anchor="start">'+f.hauteur+' '+u+'</text></svg>'
  }
  if (f.type === 'trapeze') {
    const u=f.unite||'cm',sc=Math.min((S-2*P)/f.grande_base,(S-2*P)/f.hauteur)*0.82
    const GB=f.grande_base*sc,PB=f.petite_base*sc,H=f.hauteur*sc,ox=(S-GB)/2,oy=S-P,off=(GB-PB)/2
    return open+'<polygon class="fig-sh" points="'+ox+','+oy+' '+(ox+GB)+','+oy+' '+(ox+GB-off)+','+(oy-H)+' '+(ox+off)+','+(oy-H)+'"/><text class="fig-lb" x="'+(S/2)+'" y="'+(oy+14)+'" text-anchor="middle">'+f.grande_base+' '+u+'</text></svg>'
  }
  if (f.type === 'parallelogramme') {
    const u=f.unite||'cm',sc=Math.min((S-2*P)/f.base,(S-2*P)/f.hauteur)*0.78
    const W=f.base*sc,H=f.hauteur*sc,sh=H*0.5,ox=P,oy=S-P
    return open+'<polygon class="fig-sh" points="'+(ox+sh)+','+(oy-H)+' '+(ox+sh+W)+','+(oy-H)+' '+(ox+W)+','+oy+' '+ox+','+oy+'"/><text class="fig-lb" x="'+(ox+sh/2+W/2)+'" y="'+(oy+14)+'" text-anchor="middle">'+f.base+' '+u+'</text></svg>'
  }
  return ''
}

function renderTableauHTML(tableau) {
  if (!tableau) return ''
  var t = tableau
  if (typeof t === 'string') { try { t = JSON.parse(t) } catch(e) { return '' } }
  if (!t || !t.headers || !t.rows) return ''
  return '<table class="q-tableau"><tr>'+t.headers.map(h=>'<th>'+h+'</th>').join('')+'</tr>'+t.rows.map(row=>'<tr>'+row.map(cell=>'<td>'+cell+'</td>').join('')+'</tr>').join('')+'</table>'
}

// ═══════════════════════════════════════════════════
// BANQUE
// ═══════════════════════════════════════════════════
async function chargerBanque() {
  const el = document.getElementById('banque-list')
  if (!el) return
  el.innerHTML = '<div class="loader">Chargement…</div>'
  let query = sb.from('questions_banque').select('*').order('theme').order('difficulte')
  if (banqueFiltre.theme) query = query.eq('theme', banqueFiltre.theme)
  if (banqueFiltre.diff)  query = query.eq('difficulte', banqueFiltre.diff)
  const { data, error } = await query
  if (error) { el.innerHTML='<div class="empty">Erreur : '+error.message+'</div>'; return }
  let filtered = data || []
  if (banqueFiltre.search) {
    const s = banqueFiltre.search.toLowerCase()
    filtered = filtered.filter(q => q.question.toLowerCase().includes(s))
  }
  BANQUE_DATA = filtered
  const total = filtered.length
  const start = banqueFiltre.page * PER_PAGE
  const page  = filtered.slice(start, start + PER_PAGE)
  if (!page.length) { el.innerHTML='<div class="empty">Aucune question trouvée.</div>'; return }
  let html = ''
  page.forEach(q => {
    const opts = typeof q.opts === 'string' ? JSON.parse(q.opts) : (q.opts || [])
    const letters = ['A','B','C','D']
    const hasFigSVG = q.figure && q.figure.type
    const hasFigURL = q.figure_url
    const hasTab    = q.tableau
    html += '<div class="q-card" id="qcard-'+q.id+'">'
    html += '<div class="q-card-header"><div>'
    html += '<div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">'
    html += '<span class="badge badge-blue">'+q.theme+'</span>'
    html += '<span class="badge '+(q.difficulte==='facile'?'badge-tb':q.difficulte==='moyen'?'badge-ab':'badge-insuf')+'">'+q.difficulte+'</span>'
    if (hasFigSVG) html += '<span class="badge" style="background:#f0f0ff;color:#3730a3">🔷 Figure SVG</span>'
    if (hasFigURL) html += '<span class="badge" style="background:#fff0f0;color:#dc2626">🖼 Image</span>'
    if (hasTab)    html += '<span class="badge badge-banque">📊 Tableau</span>'
    html += '</div>'
    html += '<div class="q-card-text">'+q.question+'</div>'
    html += '</div>'
    html += '<div class="q-card-actions">'
    html += '<button class="btn btn-sm btn-blue" onclick="ouvrirEdit('+q.id+',\'questions_banque\')">✏️ Modifier</button>'
    html += '<label class="btn btn-sm btn-amber" style="cursor:pointer">🖼 Image<input type="file" accept="image/*" style="display:none" onchange="uploadFigure(event,'+q.id+',\'questions_banque\')"></label>'
    if (hasFigSVG || hasFigURL) html += '<button class="btn btn-sm btn-red" onclick="supprimerFigure('+q.id+',\'questions_banque\')">🗑 Figure</button>'
    html += '</div></div>'
    if (hasFigSVG) { const svg = renderFigureSVG(q.figure); if (svg) html += '<div class="q-figure">'+svg+'</div>' }
    if (hasFigURL) html += '<div class="q-figure"><img src="'+q.figure_url+'" alt="figure"></div>'
    if (hasTab)    html += renderTableauHTML(q.tableau)
    html += '<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px">'
    opts.forEach((opt, i) => {
      const correct = i === q.answer
      html += '<div style="font-size:11px;padding:4px 8px;border-radius:6px;background:'+(correct?'#f0fdf4':'#f7f7f5')+';color:'+(correct?'#16a34a':'#555')+';border:1px solid '+(correct?'#86efac':'#e8e8e4')+'">'
      html += '<strong>'+letters[i]+'.</strong> '+opt+(correct?' ✓':'')+'</div>'
    })
    html += '</div></div>'
  })
  const totalPages = Math.ceil(total / PER_PAGE)
  html += '<div class="pagination">'
  html += '<button class="btn btn-sm" onclick="banquePage(-1)" '+(banqueFiltre.page===0?'disabled':'')+'>← Préc</button>'
  html += '<span style="color:var(--muted)">Page '+(banqueFiltre.page+1)+' / '+totalPages+' ('+total+' questions)</span>'
  html += '<button class="btn btn-sm" onclick="banquePage(1)" '+(banqueFiltre.page>=totalPages-1?'disabled':'')+'>Suiv →</button>'
  html += '</div>'
  el.innerHTML = html
}

function banquePage(dir) { banqueFiltre.page += dir; chargerBanque() }

function filtrerBanque() {
  banqueFiltre.theme  = document.getElementById('filtre-theme').value
  banqueFiltre.diff   = document.getElementById('filtre-diff').value
  banqueFiltre.search = document.getElementById('filtre-search').value.trim()
  banqueFiltre.page   = 0
  chargerBanque()

async function uploadFigure(event, id, table) {
  const file = event.target.files[0]
  if (!file) return
  const ext = file.name.split('.').pop()
  const path = table+'/'+id+'.'+ext
  const { error: upErr } = await sb.storage.from('figures').upload(path, file, { upsert: true })
  if (upErr) { alert('Erreur upload : '+upErr.message); return }
  const { data: urlData } = sb.storage.from('figures').getPublicUrl(path)
  const url = urlData.publicUrl
  const { error: dbErr } = await sb.from(table).update({ figure_url: url }).eq('id', id)
  if (dbErr) { alert('Erreur sauvegarde : '+dbErr.message); return }
  alert('✅ Image uploadée !')
  chargerBanque()
}

async function supprimerFigure(id, table) {
  if (!confirm('⚠️ Supprimer UNIQUEMENT la figure (pas la question) ?')) return
  const { data, error } = await sb.from(table).update({ figure: null, figure_url: null }).eq('id', id).select('id, question')
  if (error) { alert('Erreur : '+error.message); return }
  if (!data || data.length === 0) { alert('⚠️ Mise à jour impossible — vérifier les permissions Supabase'); return }
  chargerBanque()
}

async function ouvrirEdit(id, table) {
  editCurrentId = id; editCurrentTable = table
  const { data, error } = await sb.from(table).select('*').eq('id', id).single()
  if (error || !data) { alert('Erreur chargement question'); return }
  const opts = typeof data.opts === 'string' ? JSON.parse(data.opts) : (data.opts || ['','','',''])
  const letters = ['A','B','C','D']
  let html = ''
  html += '<div class="field"><label>Question</label><textarea id="edit-question" style="min-height:80px">'+data.question+'</textarea></div>'
  html += '<div style="margin-bottom:12px">'
  letters.forEach((l,i) => {
    html += '<div class="opt-row"><label>'+l+'</label><input type="text" id="edit-opt'+l+'" value="'+(opts[i]||'')+'"><label class="radio-label"><input type="radio" name="edit-bonne" value="'+i+'" '+(data.answer===i?'checked':'')+'>  Bonne</label></div>'
  })
  html += '</div>'
  html += '<div class="field"><label>Explication</label><textarea id="edit-explication" style="min-height:80px">'+data.explication+'</textarea></div>'
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">'
  html += '<button class="btn btn-green" onclick="sauvegarderEdit()">💾 Sauvegarder</button>'
  html += '<button class="btn btn-red" onclick="supprimerQuestion()">🗑 Supprimer la question</button>'
  html += '<button class="btn" onclick="closeEdit()">Annuler</button>'
  html += '</div>'
  html += '<div id="edit-msg" style="margin-top:10px;font-size:13px"></div>'
  document.getElementById('edit-body').innerHTML = html
  document.getElementById('overlay-edit').classList.add('active')
}

function closeEdit() { document.getElementById('overlay-edit').classList.remove('active') }

async function sauvegarderEdit() {
  const question = document.getElementById('edit-question').value.trim()
  const explication = document.getElementById('edit-explication').value.trim()
  const bonneVal = document.querySelector('input[name="edit-bonne"]:checked')?.value
  const letters = ['A','B','C','D']
  const opts = letters.map(l => document.getElementById('edit-opt'+l).value.trim())
  const msg = document.getElementById('edit-msg')
  if (!question || opts.some(o=>!o) || bonneVal === undefined || !explication) {
    msg.innerHTML = '<span style="color:#dc2626">⚠ Remplis tous les champs.</span>'; return
  }
  msg.innerHTML = '<span style="color:#888">Sauvegarde…</span>'
  const { error } = await sb.from(editCurrentTable).update({ question, opts: JSON.stringify(opts), answer: parseInt(bonneVal), explication }).eq('id', editCurrentId)
  if (error) { msg.innerHTML = '<span style="color:#dc2626">Erreur : '+error.message+'</span>' }
  else { msg.innerHTML = '<span style="color:#16a34a">✓ Sauvegardé !</span>'; setTimeout(() => { closeEdit(); chargerBanque() }, 1000) }
}

async function supprimerQuestion() {
  if (!confirm('⚠️ Supprimer DÉFINITIVEMENT cette question ?')) return
  if (!confirm('Dernière confirmation — supprimer la question ID '+editCurrentId+' ?')) return
  const { error } = await sb.from(editCurrentTable).delete().eq('id', editCurrentId)
  if (error) { alert('Erreur : '+error.message); return }
  closeEdit(); chargerBanque()
}

// ═══════════════════════════════════════════════════
// FICHE ÉLÈVE
// ═══════════════════════════════════════════════════
function openFiche(userId) {
  const e = ELEVES.find(x => x.user_id === userId)
  if (!e) return
  const rows = ROWS.filter(r => r.user_id === userId)
  if (!rows.length) { alert('Pas encore de données pour cet élève.'); return }
  const moyPct = Math.round((rows.reduce((a,r) => a + r.score/r.total, 0)/rows.length)*100)
  const tempsTot = rows.reduce((a,r) => a + (r.temps_secondes||0), 0)
  const themes = {}
  rows.forEach(r => {
    if (!themes[r.theme]) themes[r.theme] = { ok:0, tot:0, n:0, niveaux: { facile:{ok:0,tot:0}, moyen:{ok:0,tot:0}, difficile:{ok:0,tot:0} } }
    themes[r.theme].ok += r.score; themes[r.theme].tot += r.total; themes[r.theme].n++
    if (r.difficulte && themes[r.theme].niveaux[r.difficulte]) { themes[r.theme].niveaux[r.difficulte].ok += r.score; themes[r.theme].niveaux[r.difficulte].tot += r.total }
  })
  const chapitresRates = {}
  rows.forEach(r => { (r.questions_ratees||[]).forEach(q => { if (!chapitresRates[r.theme]) chapitresRates[r.theme]={}; chapitresRates[r.theme][q]=(chapitresRates[r.theme][q]||0)+1 }) })
  const niveauEmoji = { facile: '😊 Facile', moyen: '😐 Moyen', difficile: '😤 Difficile' }
  document.getElementById('fiche-titre').textContent = e.prenom + ' ' + e.nom
  let body = ''
  body += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem">'
  body += miniStat(moyPct+'%', 'Moyenne quiz', color(moyPct))
  body += miniStat(rows.length, 'Sessions', '#111')
  body += miniStat(fmtTemps(tempsTot), 'Temps total', '#111')
  body += '</div>'
  const examMap = {}
  EXAMENS.filter(e=>!e.abandonne).forEach(e=>{ if(!examMap[e.user_id]) examMap[e.user_id]=e })
  const exam = examMap[userId]
  if (exam) {
    const ep = pct(exam.score, exam.total)
    body += '<div style="background:#eef2ff;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">'
    body += '<div style="font-size:13px;font-weight:700;color:#3730a3">📝 Dernier examen blanc</div>'
    body += '<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:'+color(ep)+'">'+exam.score+'/20</div>'
    body += '<div style="font-size:11px;color:'+color(ep)+';font-weight:600">'+mentionLabel(ep)+'</div></div></div>'
  }
  THEMES.forEach(t => {
    const s = themes[t]; if (!s) return
    const p = pct(s.ok, s.tot), statut = getStatut(p)
    body += '<div style="background:#f7f7f5;border-radius:10px;padding:12px 14px;margin-bottom:10px">'
    body += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    body += '<div style="font-size:13px;font-weight:700;color:#111">'+t+'</div>'
    body += '<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:'+statut.color+'">'+s.ok+'/'+s.tot+' bonnes réponses</div>'
    body += '<div style="font-size:11px;color:'+statut.color+';font-weight:600">'+statut.emoji+' '+statut.label+'</div></div></div>'
    ;['facile','moyen','difficile'].forEach(niv => {
      const n = s.niveaux[niv]; if (n.tot === 0) return
      const np = pct(n.ok, n.tot), ns = getStatut(np)
      body += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0 5px 12px;font-size:12px;border-top:1px solid #e8e8e4">'
      body += '<span style="color:#666">'+niveauEmoji[niv]+'</span>'
      body += '<span style="color:'+ns.color+';font-weight:600">'+ns.emoji+' '+ns.label+' — '+n.ok+'/'+n.tot+'</span></div>'
    })
    const chaps = chapitresRates[t]
    if (chaps && Object.keys(chaps).length > 0) {
      const topChaps = Object.entries(chaps).sort((a,b) => b[1]-a[1]).slice(0,3)
      body += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #e8e8e4">'
      body += '<div style="font-size:11px;color:#dc2626;font-weight:600;margin-bottom:4px">Chapitres ratés :</div>'
      topChaps.forEach(([chap, nb]) => { body += '<div style="font-size:11px;color:#666;padding:2px 0">• '+chap.replace(t+' — ','')+' <span style="color:#dc2626;font-weight:600">('+nb+'×)</span></div>' })
      body += '</div>'
    }
    body += '</div>'
  })
  body += '<div style="margin-top:1.5rem;display:flex;gap:8px;flex-wrap:wrap">'
  body += '<button class="btn btn-green" id="btn-bilan" onclick="envoyerBilan(\''+userId+'\')">Envoyer bilan parents</button>'
  body += '<button class="btn" onclick="closeFiche()">Fermer</button>'
  body += '</div>'
  document.getElementById('fiche-body').innerHTML = body

}

function closeFiche() { document.getElementById('overlay').classList.remove('active') }

async function envoyerBilan(userId) {
  const e = ELEVES.find(x => x.user_id === userId)
  if (!e?.email_parent || e.email_parent === '—') { alert("Pas d'email parent pour cet élève."); return }
  const btn = document.getElementById('btn-bilan')
  btn.disabled = true; btn.textContent = 'Envoi…'
  const rows = ROWS.filter(r => r.user_id === userId)
  const moyGlobale = Math.round((rows.reduce((a,r)=>a+r.score/r.total,0)/rows.length)*100)
  const themes = {}
  rows.forEach(r => { if (!themes[r.theme]) themes[r.theme]={ok:0,tot:0,n:0}; themes[r.theme].ok+=r.score; themes[r.theme].tot+=r.total; themes[r.theme].n++ })
  const rateeMap = {}
  rows.flatMap(r=>r.questions_ratees||[]).forEach(q=>rateeMap[q]=(rateeMap[q]||0)+1)
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
  try {
    const res = await fetch('/api/email-bilan', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ emailParent:e.email_parent, prenom:e.prenom, nom:e.nom, moyGlobale, totalSessions:rows.length, tempsTotal:rows.reduce((a,r)=>a+(r.temps_secondes||0),0), themes, topRatees }) })
    const data = await res.json()
    if (data.success) { btn.textContent='Envoyé ✓'; setTimeout(()=>{ btn.disabled=false; btn.textContent='Envoyer bilan parents' },3000) }
    else throw new Error(data.error)
  } catch(err) { alert('Erreur : '+err.message); btn.disabled=false; btn.textContent='Envoyer bilan parents' }
}

async function ajouterQuestion() {
  const theme=document.getElementById('bq-theme').value, difficulte=document.getElementById('bq-diff').value
  const question=document.getElementById('bq-question').value.trim()
  const optA=document.getElementById('bq-optA').value.trim(), optB=document.getElementById('bq-optB').value.trim()
  const optC=document.getElementById('bq-optC').value.trim(), optD=document.getElementById('bq-optD').value.trim()
  const bonne=document.querySelector('input[name="bq-bonne"]:checked')?.value
  const explication=document.getElementById('bq-explication').value.trim()
  const msg=document.getElementById('bq-msg')
  if (!question||!optA||!optB||!optC||!optD||!bonne||!explication) { msg.innerHTML='<span style="color:#dc2626">⚠ Remplis tous les champs.</span>'; return }
  const opts=[optA,optB,optC,optD], answer=['A','B','C','D'].indexOf(bonne)
  msg.innerHTML='<span style="color:#888">Enregistrement…</span>'
  const { error } = await sb.from('questions_banque').insert({ theme, difficulte, question, opts: JSON.stringify(opts), answer, explication, tableau: null, figure: null })
  if (error) { msg.innerHTML='<span style="color:#dc2626">Erreur : '+error.message+'</span>' }
  else {
    msg.innerHTML='<span style="color:#16a34a">✓ Question ajoutée !</span>'
    ;['question','optA','optB','optC','optD','explication'].forEach(id => { document.getElementById('bq-'+id).value='' })
    document.querySelectorAll('input[name="bq-bonne"]').forEach(r=>r.checked=false)
    setTimeout(()=>msg.innerHTML='',3000)
  }
}

// INIT

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { location.href='index.html'; return }
  const meta = session.user.user_metadata || {}
  if (meta.email_parent !== PROF) {
    const { data: p } = await sb.from('profils').select('email_parent').eq('user_id',session.user.id).single()
    if (!p || p.email_parent !== PROF) { document.getElementById('root').innerHTML='<div class="denied">Accès réservé au professeur.</div>'; return }
  }
  const [r1,r2,r3,r4] = await Promise.all([
    sb.from('resultats').select('*').order('created_at',{ascending:false}),
    sb.from('examens_blancs').select('*').order('created_at',{ascending:false}),
    sb.from('profils').select('*'),
    sb.from('inscriptions_brevet').select('*').order('created_at',{ascending:true})
  ])
  ROWS=r1.data||[]; EXAMENS=r2.data||[]
  const profils=r3.data||[]
  PROFILS={}; profils.forEach(p=>PROFILS[p.user_id]=p)
  ELEVES=profils.map(p=>({user_id:p.user_id,prenom:p.prenom_affiche||'—',nom:p.nom_affiche||'',email_parent:p.email_parent||'—',sessions:0,totalScore:0,totalQ:0}))
  ROWS.forEach(r=>{ const e=ELEVES.find(x=>x.user_id===r.user_id); if(e){ e.sessions++; e.totalScore+=r.score; e.totalQ+=r.total } })
  INSCRIPTIONS=r4.data||[]
  render()
}
