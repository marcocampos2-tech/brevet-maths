<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ACADEMIKA">
<title>Tableau de bord Prof — ACADEMIKA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; }
.btn:hover { background: #f5f5f0; }
.btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.btn-red { background: #fef2f2; color: #dc2626; border-color: #dc2626; font-size: 12px; padding: 5px 10px; }
.btn-red:hover { background: #dc2626; color: white; }
.btn-blue { background: #eef2ff; color: #3730a3; border-color: #3730a3; font-size: 12px; padding: 5px 10px; }
.btn-blue:hover { background: #3730a3; color: white; }
.btn-green { background: #f0fdf4; color: #16a34a; border-color: #16a34a; font-size: 12px; padding: 5px 10px; }
.btn-green:hover { background: #16a34a; color: white; }
.card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1rem; }
.stat { background: white; border-radius: 10px; border: 1px solid #e8e8e4; padding: 1rem; text-align: center; }
.stat-val { font-size: 26px; font-weight: 600; }
.stat-label { font-size: 12px; color: #666; margin-top: 4px; }
.stat-ia { background: #f0fdf4; border-color: #16a34a; }
.stat-ia .stat-val { color: #16a34a; }
.stat-banque { background: #fffbeb; border-color: #f59e0b; }
.stat-banque .stat-val { color: #f59e0b; }
.stat-examen { background: #eef2ff; border-color: #3730a3; }
.stat-examen .stat-val { color: #3730a3; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; font-size: 11px; color: #666; font-weight: 500; border-bottom: 1px solid #e8e8e4; }
td { padding: 9px 10px; border-bottom: 1px solid #f0f0ec; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #eef2ff; color: #3730a3; }
.badge-ia { background: #f0fdf4; color: #16a34a; }
.badge-banque { background: #fffbeb; color: #92400e; }
.badge-tb { background: #f0fdf4; color: #16a34a; border: 1px solid #16a34a; }
.badge-b { background: #eef2ff; color: #3730a3; border: 1px solid #3730a3; }
.badge-ab { background: #fffbeb; color: #92400e; border: 1px solid #f59e0b; }
.badge-admis { background: #f5f5f0; color: #555; border: 1px solid #ccc; }
.badge-insuf { background: #fef2f2; color: #dc2626; border: 1px solid #dc2626; }
.ratee-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0ec; font-size: 13px; }
.ratee-count { color: #dc2626; font-weight: 600; white-space: nowrap; margin-left: 12px; }
.loader { text-align: center; color: #666; padding: 3rem; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.tab.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.section { display: none; }
.section.active { display: block; }
.progress-bar { height: 8px; background: #e0e0d8; border-radius: 4px; overflow: hidden; margin-top: 6px; }
.progress-ia { height: 100%; background: #16a34a; border-radius: 4px; }
.mention-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; }
.theme-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.theme-bar-label { font-size: 12px; width: 120px; color: #555; }
.theme-bar-track { flex: 1; height: 8px; background: #e0e0d8; border-radius: 4px; overflow: hidden; }
.theme-bar-fill { height: 100%; border-radius: 4px; }
.theme-bar-pct { font-size: 12px; font-weight: 600; width: 40px; text-align: right; }
.fiche-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.fiche-overlay.active { display: flex; }
.fiche-modal { background: white; border-radius: 16px; padding: 2rem; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; }
.fiche-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.fiche-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="btn" style="font-size:14px; font-weight:600; cursor: default;">∑ ACADEMIKA — Tableau de bord</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="logout()">Déconnexion</button>
    </div>
  </nav>
  <div id="content"><div class="loader">Chargement…</div></div>
</div>

<div class="fiche-overlay" id="fiche-overlay">
  <div class="fiche-modal">
    <div class="fiche-header">
      <h2 id="fiche-titre">Fiche élève</h2>
      <button class="fiche-close" onclick="fermerFiche()">✕</button>
    </div>
    <div id="fiche-content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const PROF_EMAIL = 'marcocampos2@gmail.com'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
let allRows = []
let elevesData = {}

async function logout() { await sb.auth.signOut(); window.location.href = 'index.html' }

function setTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
  document.getElementById('tab-' + tab).classList.add('active')
  document.getElementById('section-' + tab).classList.add('active')
}

function getMentionBadge(pct) {
  if (pct >= 80) return `<span class="mention-badge badge-tb">Très Bien</span>`
  if (pct >= 70) return `<span class="mention-badge badge-b">Bien</span>`
  if (pct >= 60) return `<span class="mention-badge badge-ab">Assez Bien</span>`
  if (pct >= 50) return `<span class="mention-badge badge-admis">Admis</span>`
  return `<span class="mention-badge badge-insuf">Non admis</span>`
}

function getCouleur(pct) {
  if (pct >= 80) return '#16a34a'
  if (pct >= 60) return '#3730a3'
  if (pct >= 40) return '#f59e0b'
  return '#dc2626'
}

async function debloquerExamen(userId) {
  const e = elevesData[userId]
  const prenom = e ? e.prenom : 'cet élève'
  if (!confirm(`Débloquer l'examen blanc pour ${prenom} ? Il pourra le repasser.`)) return
  const { error } = await sb.from('examens_blancs').delete().eq('user_id', userId)
  if (error) { alert('Erreur : ' + error.message); return }
  alert(`✅ Examen débloqué pour ${prenom} !`)
  init()
}

function ouvrirFicheById(userId) {
  const e = elevesData[userId]
  if (!e) return
  ouvrirFiche(userId, e.prenom, e.nom, e.email_parent)
}

function ouvrirFiche(userId, prenom, nom, emailParent) {
  const rows = allRows.filter(r => r.user_id === userId)
  if (rows.length === 0) { alert('Pas encore de données pour cet élève.'); return }

  const totalSessions = rows.length
  const moyGlobale = Math.round((rows.reduce((a,r) => a+r.score/r.total,0)/rows.length)*100)
  const tempsTotal = rows.reduce((a,r) => a+(r.temps_secondes||0), 0)
  const h = Math.floor(tempsTotal/3600), m = Math.floor((tempsTotal%3600)/60)
  const tempsFormat = h > 0 ? `${h}h ${m}min` : `${m} min`

  const themes = rows.reduce((acc,r) => {
    if (!acc[r.theme]) acc[r.theme] = { ok:0, tot:0, n:0 }
    acc[r.theme].ok += r.score
    acc[r.theme].tot += r.total
    acc[r.theme].n++
    return acc
  }, {})

  const rateeMap = rows.flatMap(r => r.questions_ratees||[])
    .reduce((acc,q) => { acc[q]=(acc[q]||0)+1; return acc }, {})
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,3)

  document.getElementById('fiche-titre').textContent = `📊 ${prenom} ${nom||''}`
  document.getElementById('fiche-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1.5rem">
      <div style="background:#f5f5f0;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:${getCouleur(moyGlobale)}">${moyGlobale}%</div>
        <div style="font-size:11px;color:#666;margin-top:4px">Moyenne globale</div>
      </div>
      <div style="background:#f5f5f0;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#1a1a1a">${totalSessions}</div>
        <div style="font-size:11px;color:#666;margin-top:4px">Sessions</div>
      </div>
      <div style="background:#f5f5f0;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:#1a1a1a">${tempsFormat}</div>
        <div style="font-size:11px;color:#666;margin-top:4px">Temps total</div>
      </div>
    </div>

    <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">📚 Résultats par thème</h3>
    ${Object.entries(themes).map(([theme, s]) => {
      const pct = Math.round((s.ok/s.tot)*100)
      return `<div class="theme-bar">
        <div class="theme-bar-label">${theme.split(' ')[0]}</div>
        <div class="theme-bar-track"><div class="theme-bar-fill" style="width:${pct}%;background:${getCouleur(pct)}"></div></div>
        <div class="theme-bar-pct" style="color:${getCouleur(pct)}">${pct}%</div>
        <div style="font-size:11px;color:#999;margin-left:4px">(${s.n})</div>
      </div>`
    }).join('')}

    ${topRatees.length > 0 ? `
    <h3 style="font-size:14px;font-weight:600;margin:1.2rem 0 12px">❌ Questions les plus ratées</h3>
    ${topRatees.map(([q,n]) => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0ec;font-size:12px">
        <span style="color:#555">${q.substring(0,60)}${q.length>60?'...':''}</span>
        <span style="color:#dc2626;font-weight:600;margin-left:8px">${n}×</span>
      </div>`).join('')}` : ''}

    <div style="margin-top:1.5rem;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-green" id="btn-bilan-${userId}" onclick="envoyerBilan('${userId}')">
        📧 Envoyer bilan aux parents
      </button>
      <button class="btn" onclick="fermerFiche()">Fermer</button>
    </div>`

  document.getElementById('fiche-overlay').classList.add('active')
}

function fermerFiche() {
  document.getElementById('fiche-overlay').classList.remove('active')
}

async function envoyerBilan(userId) {
  const e = elevesData[userId]
  if (!e || !e.email_parent || e.email_parent === '—') {
    alert('Pas d\'email parent pour cet élève.')
    return
  }

  const btn = document.getElementById('btn-bilan-' + userId)
  btn.disabled = true
  btn.textContent = '⏳ Envoi...'

  const rows = allRows.filter(r => r.user_id === userId)
  const moyGlobale = Math.round((rows.reduce((a,r) => a+r.score/r.total,0)/rows.length)*100)
  const totalSessions = rows.length
  const tempsTotal = rows.reduce((a,r) => a+(r.temps_secondes||0), 0)

  const themes = rows.reduce((acc,r) => {
    if (!acc[r.theme]) acc[r.theme] = { ok:0, tot:0, n:0 }
    acc[r.theme].ok += r.score
    acc[r.theme].tot += r.total
    acc[r.theme].n++
    return acc
  }, {})

  const rateeMap = rows.flatMap(r => r.questions_ratees||[])
    .reduce((acc,q) => { acc[q]=(acc[q]||0)+1; return acc }, {})
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)

  try {
    const res = await fetch('/api/email-bilan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        emailParent: e.email_parent,
        prenom: e.prenom,
        nom: e.nom,
        moyGlobale,
        totalSessions,
        tempsTotal,
        themes,
        topRatees
      })
    })
    const data = await res.json()
    if (data.success) {
      btn.textContent = '✅ Envoyé !'
      setTimeout(() => { btn.disabled = false; btn.textContent = '📧 Envoyer bilan aux parents' }, 3000)
    } else {
      throw new Error(data.error)
    }
  } catch(e) {
    alert('Erreur : ' + e.message)
    btn.disabled = false
    btn.textContent = '📧 Envoyer bilan aux parents'
  }
}

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href = 'index.html'; return }
  if (data.session.user.user_metadata?.email_parent !== PROF_EMAIL) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;color:#dc2626;padding:3rem">⛔ Accès réservé au professeur.</div>'
    return
  }

  const [{ data: rows }, { data: examens }, { data: profils }] = await Promise.all([
    sb.from('resultats').select('*').order('created_at', { ascending: false }),
    sb.from('examens_blancs').select('*').order('created_at', { ascending: false }),
    sb.from('profils').select('*')
  ])

  if (!rows) return
  allRows = rows

  const profilsMap = (profils||[]).reduce((acc,p) => { acc[p.user_id] = p; return acc }, {})

  const nbEleves = [...new Set(rows.map(r => r.user_id))].length
  const moy = rows.length ? Math.round((rows.reduce((a,r) => a+r.score/r.total,0)/rows.length)*100) : 0
  const nbIA = rows.filter(r => !r.source_questions || r.source_questions === 'ia').length
  const nbBanque = rows.filter(r => r.source_questions === 'banque').length
  const pctIA = rows.length ? Math.round((nbIA/rows.length)*100) : 0
  const nbExamens = examens ? examens.filter(e => !e.abandonne).length : 0

  const themeStats = rows.reduce((acc,r) => {
    if (!acc[r.theme]) acc[r.theme] = { ok:0, tot:0, n:0 }
    acc[r.theme].ok += r.score; acc[r.theme].tot += r.total; acc[r.theme].n++
    return acc
  }, {})

  const rateeMap = rows.flatMap(r => r.questions_ratees||[])
    .reduce((acc,q) => { acc[q]=(acc[q]||0)+1; return acc }, {})
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)

  const elevesUniques = Object.values(rows.reduce((acc, r) => {
    if (!acc[r.user_id]) {
      const profil = profilsMap[r.user_id]
      acc[r.user_id] = {
        user_id: r.user_id,
        prenom: profil?.prenom_affiche || r.prenom || '—',
        nom: profil?.nom_affiche || '',
        email_parent: profil?.email_parent || r.email_parent || '—',
        sessions: 0, totalScore: 0, totalQ: 0
      }
    }
    acc[r.user_id].sessions++
    acc[r.user_id].totalScore += r.score
    acc[r.user_id].totalQ += r.total
    return acc
  }, {}))

  // Stocker dans elevesData pour accès sans paramètres inline
  elevesUniques.forEach(e => { elevesData[e.user_id] = e })

  const examensMap = (examens || []).reduce((acc, e) => {
    if (!e.abandonne) acc[e.user_id] = e
    return acc
  }, {})

  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat"><div class="stat-val">${nbEleves}</div><div class="stat-label">Élèves actifs</div></div>
      <div class="stat"><div class="stat-val">${rows.length}</div><div class="stat-label">Sessions quiz</div></div>
      <div class="stat"><div class="stat-val">${moy}%</div><div class="stat-label">Moyenne générale</div></div>
      <div class="stat stat-examen"><div class="stat-val">📝 ${nbExamens}</div><div class="stat-label">Examens blancs</div></div>
      <div class="stat stat-ia"><div class="stat-val">✨ ${nbIA}</div><div class="stat-label">Sessions IA (${pctIA}%)</div><div class="progress-bar"><div class="progress-ia" style="width:${pctIA}%"></div></div></div>
      <div class="stat stat-banque"><div class="stat-val">⚡ ${nbBanque}</div><div class="stat-label">Sessions banque (${100-pctIA}%)</div><div class="progress-bar"><div class="progress-ia" style="width:${100-pctIA}%;background:#f59e0b"></div></div></div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-eleves" onclick="setTab('eleves')">👥 Élèves</button>
      <button class="tab" id="tab-examens" onclick="setTab('examens')">📝 Examens Blancs</button>
      <button class="tab" id="tab-themes" onclick="setTab('themes')">📊 Thèmes</button>
      <button class="tab" id="tab-sessions" onclick="setTab('sessions')">📋 Sessions</button>
      <button class="tab" id="tab-ratees" onclick="setTab('ratees')">❌ Questions ratées</button>
    </div>

    <div class="section active" id="section-eleves">
      <div class="card"><h2>Liste des élèves</h2>
        <table><thead><tr><th>Élève</th><th>Email parents</th><th>Sessions</th><th>Moyenne</th><th>Examen Blanc</th><th>Actions</th></tr></thead>
        <tbody>${elevesUniques.map(e => {
          const examen = examensMap[e.user_id]
          const pctMoy = e.totalQ > 0 ? Math.round((e.totalScore/e.totalQ)*100) : 0
          const examCell = examen
            ? `<div>${getMentionBadge(Math.round((examen.score/examen.total)*100))} ${examen.score}/20</div>`
            : `<span style="color:#999;font-size:12px">Pas encore passé</span>`
          return `<tr>
            <td><strong>${e.prenom} ${e.nom}</strong></td>
            <td style="color:#3730a3;font-size:12px">${e.email_parent}</td>
            <td>${e.sessions}</td>
            <td><strong style="color:${getCouleur(pctMoy)}">${pctMoy}%</strong></td>
            <td>${examCell}</td>
            <td style="display:flex;gap:4px;flex-wrap:wrap">
              <button class="btn btn-blue" onclick="ouvrirFicheById('${e.user_id}')">📊 Fiche</button>
              ${examen ? `<button class="btn btn-red" onclick="debloquerExamen('${e.user_id}')">🔓</button>` : ''}
            </td></tr>`
        }).join('')}</tbody></table>
      </div>
    </div>

    <div class="section" id="section-examens">
      <div class="card"><h2>Résultats Examens Blancs</h2>
        ${nbExamens === 0 ? '<p style="color:#666;font-size:13px">Aucun examen passé pour l\'instant.</p>' : `
        <table><thead><tr><th>Élève</th><th>Score</th><th>Mention</th><th>Temps</th><th>Nombres</th><th>Géométrie</th><th>Algèbre</th><th>Stats</th><th>Fonctions</th><th>Action</th></tr></thead>
        <tbody>${(examens||[]).filter(e=>!e.abandonne).map(e => {
          const pct = Math.round((e.score/e.total)*100)
          const th = e.scores_themes || {}
          const score = (key) => { const k = Object.keys(th).find(k => k.toLowerCase().includes(key)); return k ? th[k].ok+'/'+th[k].total : '—' }
          const m = Math.floor(e.temps_secondes/60), s = e.temps_secondes%60
          const profil = profilsMap[e.user_id]
          const nom = profil ? `${profil.prenom_affiche} ${profil.nom_affiche}` : e.prenom || '—'
          return `<tr>
            <td><strong>${nom}</strong></td>
            <td><strong>${e.score}/20</strong><br><span style="font-size:11px;color:${pct>=50?'#16a34a':'#dc2626'}">${pct}%</span></td>
            <td>${getMentionBadge(pct)}</td>
            <td style="font-size:12px">${m}min ${s}s</td>
            <td style="text-align:center;font-size:12px">${score('nombre')}</td>
            <td style="text-align:center;font-size:12px">${score('géom')}</td>
            <td style="text-align:center;font-size:12px">${score('algèbre')}</td>
            <td style="text-align:center;font-size:12px">${score('stat')}</td>
            <td style="text-align:center;font-size:12px">${score('fonction')}</td>
            <td><button class="btn btn-red" onclick="debloquerExamen('${e.user_id}')">🔓 Débloquer</button></td>
          </tr>`
        }).join('')}</tbody></table>`}
      </div>
    </div>

    <div class="section" id="section-themes">
      <div class="card"><h2>Résultats par thème</h2>
        <table><thead><tr><th>Thème</th><th>Sessions</th><th>Moyenne</th></tr></thead>
        <tbody>${Object.entries(themeStats).map(([t,s])=>`<tr><td>${t}</td><td>${s.n}</td><td><strong style="color:${getCouleur(Math.round((s.ok/s.tot)*100))}">${Math.round((s.ok/s.tot)*100)}%</strong></td></tr>`).join('')}</tbody>
      </div>
    </div>

    <div class="section" id="section-sessions">
      <div class="card"><h2>Dernières sessions</h2>
        <table><thead><tr><th>Élève</th><th>Thème</th><th>Niveau</th><th>Score</th><th>Source</th><th>Date</th></tr></thead>
        <tbody>${rows.slice(0,30).map(r=>{
          const profil = profilsMap[r.user_id]
          const nom = profil ? `${profil.prenom_affiche} ${profil.nom_affiche}` : r.prenom || '—'
          return `<tr>
            <td><strong>${nom}</strong></td>
            <td style="font-size:12px">${r.theme}</td>
            <td><span class="badge">${r.difficulte}</span></td>
            <td><strong style="color:${getCouleur(Math.round(r.score/r.total*100))}">${r.score}/${r.total}</strong></td>
            <td>${!r.source_questions||r.source_questions==='ia'?'<span class="badge badge-ia">✨ IA</span>':'<span class="badge badge-banque">⚡ Banque</span>'}</td>
            <td style="font-size:12px;color:#999">${new Date(r.created_at).toLocaleDateString('fr-FR')}</td>
          </tr>`
        }).join('')}</tbody></table>
      </div>
    </div>

    <div class="section" id="section-ratees">
      <div class="card"><h2>Questions les plus ratées</h2>
        ${topRatees.length ? topRatees.map(([q,n])=>`<div class="ratee-item"><span style="font-size:12px">${q}</span><span class="ratee-count">${n}× ratée</span></div>`).join('') : '<p style="color:#666;font-size:13px">Pas encore de données.</p>'}
      </div>
    </div>`
}
init()
</script>
</body>
</html>
