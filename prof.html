<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord Prof — Brevet Maths</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.container { max-width: 780px; margin: 0 auto; padding: 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: #f5f5f0; }
.card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
h1 { font-size: 20px; font-weight: 600; }
h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 1rem; }
.stat { background: white; border-radius: 10px; border: 1px solid #e8e8e4; padding: 1rem; text-align: center; }
.stat-val { font-size: 28px; font-weight: 600; }
.stat-label { font-size: 12px; color: #666; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; font-size: 11px; color: #666; font-weight: 500; border-bottom: 1px solid #e8e8e4; }
td { padding: 9px 10px; border-bottom: 1px solid #f0f0ec; }
tr:last-child td { border-bottom: none; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #eef2ff; color: #3730a3; }
.ratee-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0ec; font-size: 13px; }
.ratee-count { color: #dc2626; font-weight: 600; white-space: nowrap; margin-left: 12px; }
.loader { text-align: center; color: #666; padding: 3rem; }
.access-denied { text-align: center; color: #dc2626; padding: 3rem; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <div style="font-size:18px;font-weight:600">🎓 Tableau de bord professeur</div>
    <button class="btn" onclick="logout()">Déconnexion</button>
  </nav>
  <div id="content"><div class="loader">Chargement…</div></div>
</div>

<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const PROF_EMAIL = 'REMPLACE_PAR_TON_EMAIL'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function logout() { await sb.auth.signOut(); window.location.href = 'index.html' }

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href = 'index.html'; return }
  if (data.session.user.email !== PROF_EMAIL) {
    document.getElementById('content').innerHTML = '<div class="access-denied">⛔ Accès réservé au professeur.</div>'
    return
  }
  const { data: rows } = await sb.from('resultats').select('*').order('created_at', { ascending: false })
  if (!rows) return
  const eleves = [...new Set(rows.map(r => r.email))].length
  const moy = rows.length ? Math.round((rows.reduce((a,r) => a+r.score/r.total,0)/rows.length)*100) : 0

  const themeStats = rows.reduce((acc,r) => {
    if (!acc[r.theme]) acc[r.theme] = { ok:0, tot:0, n:0 }
    acc[r.theme].ok += r.score; acc[r.theme].tot += r.total; acc[r.theme].n++
    return acc
  }, {})

  const rateeMap = rows.flatMap(r => r.questions_ratees||[])
    .reduce((acc,q) => { acc[q]=(acc[q]||0)+1; return acc }, {})
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)

  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat"><div class="stat-val">${eleves}</div><div class="stat-label">Élèves actifs</div></div>
      <div class="stat"><div class="stat-val">${rows.length}</div><div class="stat-label">Sessions totales</div></div>
      <div class="stat"><div class="stat-val">${moy}%</div><div class="stat-label">Moyenne générale</div></div>
    </div>

    <div class="card">
      <h2>Résultats par thème</h2>
      <table>
        <thead><tr><th>Thème</th><th>Sessions</th><th>Moyenne</th></tr></thead>
        <tbody>${Object.entries(themeStats).map(([t,s])=>`
          <tr><td>${t}</td><td>${s.n}</td><td><strong>${Math.round((s.ok/s.tot)*100)}%</strong></td></tr>
        `).join('')}</tbody>
      </table>
    </div>

    ${topRatees.length ? `
    <div class="card">
      <h2>Questions les plus ratées</h2>
      ${topRatees.map(([q,n])=>`
        <div class="ratee-item"><span>${q}</span><span class="ratee-count">${n}× ratée</span></div>
      `).join('')}
    </div>` : ''}

    <div class="card">
      <h2>Dernières sessions</h2>
      <table>
        <thead><tr><th>Élève</th><th>Thème</th><th>Niveau</th><th>Score</th><th>Date</th></tr></thead>
        <tbody>${rows.slice(0,30).map(r=>`
          <tr>
            <td>${r.email}</td>
            <td style="font-size:12px">${r.theme}</td>
            <td><span class="badge">${r.difficulte}</span></td>
            <td><strong>${r.score}/${r.total}</strong></td>
            <td style="font-size:12px;color:#999">${new Date(r.created_at).toLocaleDateString('fr-FR')}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>`
}
init()
</script>
</body>
</html>
