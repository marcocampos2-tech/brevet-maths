<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ACADEMIKA">
<title>Prof — ACADEMIKA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f5; --surface: #ffffff; --border: #e4e4df; --text: #111111; --muted: #888880;
  --green: #16a34a; --blue: #2563eb; --amber: #d97706; --red: #dc2626;
  --green-bg: #f0fdf4; --blue-bg: #eff6ff; --amber-bg: #fffbeb; --red-bg: #fef2f2;
  --radius: 10px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.wrap { max-width: 960px; margin: 0 auto; padding: 1.25rem 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: .08em; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap; }
.btn:hover { background: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.btn-red:hover { background: var(--red); color: white; }
.btn-blue { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
.btn-blue:hover { background: var(--blue); color: white; }
.btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.btn-green:hover { background: var(--green); color: white; }
.btn:disabled { opacity: .5; cursor: default; pointer-events: none; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 5px; }
.stat-green { border-color: #86efac; background: var(--green-bg); }
.stat-green .stat-val { color: var(--green); }
.stat-blue { border-color: #93c5fd; background: var(--blue-bg); }
.stat-blue .stat-val { color: var(--blue); }
.stat-amber { border-color: #fcd34d; background: var(--amber-bg); }
.stat-amber .stat-val { color: var(--amber); }
.tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab { padding: 7px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
.tab:hover { background: var(--bg); }
.tab.active { background: var(--text); color: white; border-color: var(--text); }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 7px 10px; font-size: 11px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
.tbl td { padding: 9px 10px; border-bottom: 1px solid #f3f3ef; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-ia { background: var(--green-bg); color: var(--green); }
.badge-banque { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-tb { background: var(--green-bg); color: var(--green); border: 1px solid #86efac; }
.badge-b { background: var(--blue-bg); color: var(--blue); border: 1px solid #93c5fd; }
.badge-ab { background: var(--amber-bg); color: var(--amber); border: 1px solid #fcd34d; }
.badge-admis { background: #f5f5f5; color: #555; border: 1px solid #ccc; }
.badge-insuf { background: var(--red-bg); color: var(--red); border: 1px solid #fca5a5; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-label { font-size: 12px; color: var(--muted); width: 115px; flex-shrink: 0; }
.bar-track { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }
.bar-pct { font-size: 12px; font-weight: 600; width: 36px; text-align: right; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
.overlay.active { display: flex; }
.modal { background: white; border-radius: 14px; padding: 1.75rem; max-width: 580px; width: 92%; max-height: 88vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-close:hover { color: var(--text); }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
.field input, .field textarea, .field select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: white; color: var(--text); transition: border-color .15s; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--blue); }
.field textarea { resize: vertical; min-height: 65px; }
.opt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.opt-row label { font-size: 12px; color: var(--muted); width: 18px; flex-shrink: 0; font-weight: 600; }
.opt-row input[type=text] { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; }
.opt-row input[type=text]:focus { outline: none; border-color: var(--blue); }
.opt-row .radio-label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; }
.opt-row input[type=radio] { cursor: pointer; }
.loader { text-align: center; color: var(--muted); padding: 4rem 1rem; font-size: 13px; }
.denied { text-align: center; color: var(--red); padding: 4rem 1rem; font-size: 14px; }
.empty { color: var(--muted); font-size: 13px; padding: .5rem 0; }
.dash-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.dash-table th { padding: 8px 6px; font-size: 10px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); text-align: center; }
.dash-table th:first-child { text-align: left; }
.dash-table td { padding: 8px 6px; border-bottom: 1px solid #f3f3ef; text-align: center; vertical-align: middle; }
.dash-table td:first-child { text-align: left; }
.dash-table tr:last-child td { border-bottom: none; }
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .tbl th:nth-child(n+5), .tbl td:nth-child(n+5) { display: none; }
}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="logo">ACADEMIKA — PROF</div>
    <button class="btn" onclick="logout()">Déconnexion</button>
  </nav>
  <div id="root"><div class="loader">Chargement…</div></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="fiche-titre"></div>
      <button class="modal-close" onclick="closeFiche()">✕</button>
    </div>
    <div id="fiche-body"></div>
  </div>
</div>
<script>
const SB_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SB_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const PROF   = 'marcocampos2@gmail.com'
const sb     = supabase.createClient(SB_URL, SB_KEY)

const THEMES  = ['Nombres et calculs','Géométrie','Algèbre et équations','Statistiques et probabilités','Fonctions','Algorithmique']
const THEMES_SHORT = ['Nombres','Géométrie','Algèbre','Stats','Fonctions','Algo']

let ROWS = [], EXAMENS = [], PROFILS = {}, ELEVES = []

const pct      = (ok, tot) => tot ? Math.round(ok / tot * 100) : 0
const color    = p => p >= 70 ? '#16a34a' : p >= 50 ? '#d97706' : '#dc2626'
const emoji    = p => p >= 70 ? '🟢' : p >= 50 ? '🟡' : '🔴'
const fmt      = (m, s) => m+'min '+s+'s'
const fmtTemps = s => { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60); return h ? h+'h '+m+'min' : m+' min' }
const dateStr  = d => new Date(d).toLocaleDateString('fr-FR')

function getStatut(p) {
  if (p >= 70) return { label: 'Maîtrisé', emoji: '✅', color: '#16a34a' }
  if (p >= 50) return { label: 'En cours', emoji: '⚠️', color: '#d97706' }
  return { label: 'À retravailler', emoji: '❌', color: '#dc2626' }
}

function mentionBadge(p) {
  if (p >= 80) return '<span class="badge badge-tb">Très Bien</span>'
  if (p >= 70) return '<span class="badge badge-b">Bien</span>'
  if (p >= 60) return '<span class="badge badge-ab">Assez Bien</span>'
  if (p >= 50) return '<span class="badge badge-admis">Admis</span>'
  return '<span class="badge badge-insuf">Non admis</span>'
}

function mentionLabel(p) {
  if (p >= 80) return 'Très Bien'
  if (p >= 70) return 'Bien'
  if (p >= 60) return 'Assez Bien'
  if (p >= 50) return 'Admis'
  return 'Non admis'
}

function scoresExamen(th) {
  const sc = key => {
    const k = Object.keys(th).find(k => k.toLowerCase().includes(key))
    return k ? th[k].ok+'/'+th[k].total : '—'
  }
  return {
    nombres:   sc('nombre'),
    geo:       sc('espace') || sc('geom'),
    stats:     sc('organisation') || sc('stat'),
    grandeurs: sc('grandeur') || sc('algo')
  }
}

async function logout() { await sb.auth.signOut(); location.href = 'index.html' }

function setTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id))
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-'+id))
  if (id === 'banque') chargerStatsBanque()
}

function miniStat(val, label, col) {
  return '<div style="background:#f7f7f5;border-radius:10px;padding:12px;text-align:center">' +
    '<div style="font-size:26px;font-weight:700;color:'+col+'">'+val+'</div>' +
    '<div style="font-size:11px;color:#888;margin-top:4px">'+label+'</div>' +
    '</div>'
}

function openFiche(userId) {
  const e = ELEVES.find(x => x.user_id === userId)
  if (!e) return
  const rows = ROWS.filter(r => r.user_id === userId)
  if (!rows.length) { alert('Pas encore de données pour cet élève.'); return }

  const moyPct   = Math.round((rows.reduce((a,r) => a + r.score/r.total, 0)/rows.length)*100)
  const tempsTot = rows.reduce((a,r) => a + (r.temps_secondes||0), 0)

  const themes = {}
  rows.forEach(r => {
    if (!themes[r.theme]) themes[r.theme] = {
      ok:0, tot:0, n:0,
      niveaux: { facile:{ok:0,tot:0}, moyen:{ok:0,tot:0}, difficile:{ok:0,tot:0} }
    }
    themes[r.theme].ok  += r.score
    themes[r.theme].tot += r.total
    themes[r.theme].n++
    if (r.difficulte && themes[r.theme].niveaux[r.difficulte]) {
      themes[r.theme].niveaux[r.difficulte].ok  += r.score
      themes[r.theme].niveaux[r.difficulte].tot += r.total
    }
  })

  const chapitresRates = {}
  rows.forEach(r => {
    ;(r.questions_ratees||[]).forEach(q => {
      const theme = r.theme
      if (!chapitresRates[theme]) chapitresRates[theme] = {}
      chapitresRates[theme][q] = (chapitresRates[theme][q]||0) + 1
    })
  })

  const niveauEmoji = { facile: '😊 Facile', moyen: '😐 Moyen', difficile: '😤 Difficile' }
  document.getElementById('fiche-titre').textContent = e.prenom + ' ' + e.nom

  let body = ''
  body += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem">'
  body += miniStat(moyPct+'%', 'Moyenne quiz', color(moyPct))
  body += miniStat(rows.length, 'Sessions', '#111')
  body += miniStat(fmtTemps(tempsTot), 'Temps total', '#111')
  body += '</div>'

  const exam = EXAMENS.filter(ex => !ex.abandonne).find(ex => ex.user_id === userId)
  if (exam) {
    const ep = pct(exam.score, exam.total)
    body += '<div style="background:#eef2ff;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">'
    body += '<div style="font-size:13px;font-weight:700;color:#3730a3">📝 Dernier examen blanc</div>'
    body += '<div style="text-align:right">'
    body += '<div style="font-size:16px;font-weight:700;color:'+color(ep)+'">'+exam.score+'/20</div>'
    body += '<div style="font-size:11px;color:'+color(ep)+';font-weight:600">'+mentionLabel(ep)+'</div>'
    body += '</div></div>'
  }

  THEMES.forEach(t => {
    const s = themes[t]
    if (!s) return
    const p = pct(s.ok, s.tot)
    const statut = getStatut(p)
    body += '<div style="background:#f7f7f5;border-radius:10px;padding:12px 14px;margin-bottom:10px">'
    body += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    body += '<div style="font-size:13px;font-weight:700;color:#111">'+t+'</div>'
    body += '<div style="text-align:right">'
    body += '<div style="font-size:14px;font-weight:700;color:'+statut.color+'">'+s.ok+'/'+s.tot+' bonnes réponses</div>'
    body += '<div style="font-size:11px;color:'+statut.color+';font-weight:600">'+statut.emoji+' '+statut.label+'</div>'
    body += '</div></div>'
    ;['facile','moyen','difficile'].forEach(niv => {
      const n = s.niveaux[niv]
      if (n.tot === 0) return
      const np = pct(n.ok, n.tot)
      const ns = getStatut(np)
      body += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0 5px 12px;font-size:12px;border-top:1px solid #e8e8e4">'
      body += '<span style="color:#666">'+niveauEmoji[niv]+'</span>'
      body += '<span style="color:'+ns.color+';font-weight:600">'+ns.emoji+' '+ns.label+' — '+n.ok+'/'+n.tot+'</span>'
      body += '</div>'
    })
    const chaps = chapitresRates[t]
    if (chaps && Object.keys(chaps).length > 0) {
      const topChaps = Object.entries(chaps).sort((a,b) => b[1]-a[1]).slice(0,3)
      body += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #e8e8e4">'
      body += '<div style="font-size:11px;color:#dc2626;font-weight:600;margin-bottom:4px">Chapitres ratés :</div>'
      topChaps.forEach(([chap, nb]) => {
        body += '<div style="font-size:11px;color:#666;padding:2px 0">• '+chap.replace(t+' — ','')+' <span style="color:#dc2626;font-weight:600">('+nb+'×)</span></div>'
      })
      body += '</div>'
    }
    body += '</div>'
  })

  body += '<div style="margin-top:1.5rem;display:flex;gap:8px;flex-wrap:wrap">'
  body += '<button class="btn btn-green" id="btn-bilan" onclick="envoyerBilan(\''+userId+'\')">Envoyer bilan parents</button>'
  body += '<button class="btn" onclick="closeFiche()">Fermer</button>'
  body += '</div>'

  document.getElementById('fiche-body').innerHTML = body
  document.getElementById('overlay').classList.add('active')
}

function closeFiche() { document.getElementById('overlay').classList.remove('active') }

async function envoyerBilan(userId) {
  const e = ELEVES.find(x => x.user_id === userId)
  if (!e?.email_parent || e.email_parent === '—') { alert("Pas d'email parent pour cet élève."); return }
  const btn = document.getElementById('btn-bilan')
  btn.disabled = true; btn.textContent = 'Envoi…'
  const rows = ROWS.filter(r => r.user_id === userId)
  const moyGlobale = Math.round((rows.reduce((a,r)=>a+r.score/r.total,0)/rows.length)*100)
  const themes = {}
  rows.forEach(r => {
    if (!themes[r.theme]) themes[r.theme] = { ok:0, tot:0, n:0 }
    themes[r.theme].ok += r.score; themes[r.theme].tot += r.total; themes[r.theme].n++
  })
  const rateeMap = {}
  rows.flatMap(r=>r.questions_ratees||[]).forEach(q=>rateeMap[q]=(rateeMap[q]||0)+1)
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
  try {
    const res = await fetch('/api/email-bilan', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ emailParent:e.email_parent, prenom:e.prenom, nom:e.nom,
        moyGlobale, totalSessions:rows.length,
        tempsTotal:rows.reduce((a,r)=>a+(r.temps_secondes||0),0), themes, topRatees })
    })
    const data = await res.json()
    if (data.success) {
      btn.textContent = 'Envoyé ✓'
      setTimeout(()=>{ btn.disabled=false; btn.textContent='Envoyer bilan parents' },3000)
    } else throw new Error(data.error)
  } catch(err) {
    alert('Erreur : '+err.message)
    btn.disabled=false; btn.textContent='Envoyer bilan parents'
  }
}

async function ajouterQuestion() {
  const theme       = document.getElementById('bq-theme').value
  const difficulte  = document.getElementById('bq-diff').value
  const question    = document.getElementById('bq-question').value.trim()
  const optA        = document.getElementById('bq-optA').value.trim()
  const optB        = document.getElementById('bq-optB').value.trim()
  const optC        = document.getElementById('bq-optC').value.trim()
  const optD        = document.getElementById('bq-optD').value.trim()
  const bonne       = document.querySelector('input[name="bq-bonne"]:checked')?.value
  const explication = document.getElementById('bq-explication').value.trim()
  const msg         = document.getElementById('bq-msg')
  if (!question||!optA||!optB||!optC||!optD||!bonne||!explication) {
    msg.innerHTML='<span style="color:#dc2626">⚠ Remplis tous les champs.</span>'; return
  }
  const opts   = [optA, optB, optC, optD]
  const answer = ['A','B','C','D'].indexOf(bonne)
  msg.innerHTML='<span style="color:#888">Enregistrement…</span>'
  const { error } = await sb.from('questions_banque').insert({
    theme, difficulte, question, opts: JSON.stringify(opts), answer, explication, tableau: null, figure: null
  })
  if (error) {
    msg.innerHTML='<span style="color:#dc2626">Erreur : '+error.message+'</span>'
  } else {
    msg.innerHTML='<span style="color:#16a34a">✓ Question ajoutée !</span>'
    document.getElementById('bq-question').value=''
    document.getElementById('bq-optA').value=''
    document.getElementById('bq-optB').value=''
    document.getElementById('bq-optC').value=''
    document.getElementById('bq-optD').value=''
    document.getElementById('bq-explication').value=''
    document.querySelectorAll('input[name="bq-bonne"]').forEach(r=>r.checked=false)
    chargerStatsBanque()
    setTimeout(()=>msg.innerHTML='',3000)
  }
}

async function chargerStatsBanque() {
  const el = document.getElementById('bq-stats')
  if (!el) return
  el.innerHTML='<span style="color:#888;font-size:13px">Chargement…</span>'
  const { data } = await sb.from('questions_banque').select('theme, difficulte')
  if (!data) return
  const stats = {}
  THEMES.forEach(t => { stats[t] = { facile:0, moyen:0, difficile:0 } })
  data.forEach(r => { if (stats[r.theme]) stats[r.theme][r.difficulte]++ })
  const cell = (n) => '<td style="text-align:center"><span style="font-weight:600;color:'+(n>=50?'#16a34a':n>=20?'#d97706':'#dc2626')+'">'+n+(n>=50?' ✓':'')+'</span></td>'
  el.innerHTML = '<table class="tbl"><thead><tr><th>Thème</th><th style="text-align:center">Facile</th><th style="text-align:center">Moyen</th><th style="text-align:center">Difficile</th><th style="text-align:center">Total</th></tr></thead><tbody>' +
    THEMES.map(t => {
      const s = stats[t]
      const tot = s.facile + s.moyen + s.difficile
      return '<tr><td style="font-size:12px">'+t+'</td>'+cell(s.facile)+cell(s.moyen)+cell(s.difficile)+'<td style="text-align:center;font-weight:600">'+tot+'</td></tr>'
    }).join('') + '</tbody></table><p style="font-size:11px;color:#888;margin-top:10px">✓ vert ≥50 → objectif atteint</p>'
}

function render() {
  const nbEleves  = [...new Set(ROWS.map(r=>r.user_id))].length
  const moyGlo    = ROWS.length ? Math.round((ROWS.reduce((a,r)=>a+r.score/r.total,0)/ROWS.length)*100) : 0
  const nbIA      = ROWS.filter(r=>!r.source_questions||r.source_questions==='ia').length
  const nbBanque  = ROWS.filter(r=>r.source_questions==='banque').length
  const nbExamens = EXAMENS.filter(e=>!e.abandonne).length
  const pctIA     = ROWS.length ? Math.round(nbIA/ROWS.length*100) : 0
  const themeStats = {}
  ROWS.forEach(r=>{ if (!themeStats[r.theme]) themeStats[r.theme]={ok:0,tot:0,n:0}; themeStats[r.theme].ok+=r.score; themeStats[r.theme].tot+=r.total; themeStats[r.theme].n++ })
  const rateeMap = {}
  ROWS.forEach(r=>(r.questions_ratees||[]).forEach(q=>rateeMap[q]=(rateeMap[q]||0)+1))
  const topRatees = Object.entries(rateeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
  const examMap = {}
  EXAMENS.filter(e=>!e.abandonne).forEach(e=>{ if(!examMap[e.user_id]) examMap[e.user_id]=e })

  let h = ''
  h += '<div class="stats">'
  h += '<div class="stat"><div class="stat-val">'+nbEleves+'</div><div class="stat-label">Élèves actifs</div></div>'
  h += '<div class="stat"><div class="stat-val">'+ROWS.length+'</div><div class="stat-label">Sessions quiz</div></div>'
  h += '<div class="stat"><div class="stat-val">'+moyGlo+'%</div><div class="stat-label">Moyenne générale</div></div>'
  h += '<div class="stat stat-blue"><div class="stat-val">'+nbExamens+'</div><div class="stat-label">Examens blancs</div></div>'
  h += '<div class="stat stat-green"><div class="stat-val">'+nbIA+'</div><div class="stat-label">Sessions IA ('+pctIA+'%)</div></div>'
  h += '<div class="stat stat-amber"><div class="stat-val">'+nbBanque+'</div><div class="stat-label">Sessions banque ('+(100-pctIA)+'%)</div></div>'
  h += '</div>'

  h += '<div class="tabs">'
  h += '<button class="tab active" data-tab="dashboard" onclick="setTab(\'dashboard\')">📊 Dashboard</button>'
  h += '<button class="tab" data-tab="eleves" onclick="setTab(\'eleves\')">Élèves</button>'
  h += '<button class="tab" data-tab="examens" onclick="setTab(\'examens\')">Examens blancs</button>'
  h += '<button class="tab" data-tab="themes" onclick="setTab(\'themes\')">Thèmes</button>'
  h += '<button class="tab" data-tab="sessions" onclick="setTab(\'sessions\')">Sessions</button>'
  h += '<button class="tab" data-tab="ratees" onclick="setTab(\'ratees\')">Questions ratées</button>'
  h += '<button class="tab" data-tab="banque" onclick="setTab(\'banque\')">+ Banque</button>'
  h += '</div>'

  h += '<div class="section active" id="sec-dashboard"><div class="card">'
  h += '<div class="card-title">📊 Tableau comparatif — tous les élèves</div>'
  h += '<div style="overflow-x:auto">'
  h += '<table class="dash-table"><thead><tr><th>Élève</th><th>Global</th>'
  THEMES_SHORT.forEach(t => { h += '<th>'+t+'</th>' })
  h += '<th>Examen blanc</th></tr></thead><tbody>'

  ELEVES.forEach(e => {
    const rows = ROWS.filter(r => r.user_id === e.user_id)
    const exam = examMap[e.user_id]
    const examCell = !exam
      ? '<td style="color:#999;font-size:11px">—</td>'
      : (()=>{ const ep=pct(exam.score,exam.total); return '<td><span style="color:'+color(ep)+';font-weight:700">'+exam.score+'/20</span><br><span style="font-size:10px;color:'+color(ep)+'">'+mentionLabel(ep)+'</span></td>' })()

    if (rows.length === 0) {
      h += '<tr><td><button class="btn btn-sm btn-blue" onclick="openFiche(\''+e.user_id+'\')">'+e.prenom+'</button></td><td style="color:#999">—</td>'
      THEMES.forEach(() => { h += '<td style="color:#999">—</td>' })
      h += examCell + '</tr>'; return
    }
    const globalScore = rows.reduce((a,r)=>a+r.score,0)
    const globalTot   = rows.reduce((a,r)=>a+r.total,0)
    const globalPct   = pct(globalScore, globalTot)
    h += '<tr>'
    h += '<td><button class="btn btn-sm btn-blue" onclick="openFiche(\''+e.user_id+'\')">'+e.prenom+'</button></td>'
    h += '<td><strong style="color:'+color(globalPct)+'">'+globalPct+'%</strong></td>'
    THEMES.forEach(t => {
      const tr = rows.filter(r => r.theme === t)
      if (tr.length === 0) { h += '<td style="color:#999;font-size:11px">—</td>'; return }
      const ok  = tr.reduce((a,r)=>a+r.score,0)
      const tot = tr.reduce((a,r)=>a+r.total,0)
      const p   = pct(ok, tot)
      h += '<td><span style="color:'+color(p)+';font-weight:600">'+emoji(p)+' '+p+'%</span></td>'
    })
    h += examCell + '</tr>'
  })

  h += '</tbody></table></div>'
  h += '<p style="font-size:11px;color:#888;margin-top:10px">🟢 ≥70% Maîtrisé | 🟡 50-69% En cours | 🔴 &lt;50% À retravailler — Cliquer sur le prénom pour la fiche</p>'
  h += '</div></div>'

  h += '<div class="section" id="sec-eleves"><div class="card">'
  h += '<div class="card-title">Liste des élèves</div>'
  h += '<table class="tbl"><thead><tr><th>Élève</th><th>Email parents</th><th>Sessions</th><th>Moyenne</th><th>Examen</th><th>Actions</th></tr></thead><tbody>'
  ELEVES.forEach(e=>{
    const p = e.totalQ>0 ? pct(e.totalScore,e.totalQ) : 0
    const exam = examMap[e.user_id]
    const examCell = exam ? mentionBadge(pct(exam.score,exam.total))+' <span style="font-size:12px">'+exam.score+'/20</span>' : '<span style="color:#999;font-size:12px">—</span>'
    h += '<tr><td><strong>'+e.prenom+' '+e.nom+'</strong></td><td style="color:#2563eb;font-size:12px">'+e.email_parent+'</td><td>'+e.sessions+'</td><td><strong style="color:'+color(p)+'">'+p+'%</strong></td><td>'+examCell+'</td>'
    h += '<td><button class="btn btn-sm btn-blue" onclick="openFiche(\''+e.user_id+'\')">Fiche</button></td></tr>'
  })
  h += '</tbody></table></div></div>'

  const examensValides = EXAMENS.filter(e=>!e.abandonne)
  h += '<div class="section" id="sec-examens"><div class="card"><div class="card-title">Résultats Examens Blancs</div>'
  if (!examensValides.length) {
    h += '<p class="empty">Aucun examen passé.</p>'
  } else {
    h += '<table class="tbl"><thead><tr><th>Élève</th><th>Score</th><th>Mention</th><th>Temps</th><th>Nombres</th><th>Organisation</th><th>Géométrie</th><th>Grandeurs</th></tr></thead><tbody>'
    examensValides.forEach(e=>{
      const p = pct(e.score,e.total)
      const th = e.scores_themes||{}
      const sc = scoresExamen(th)
      const mins=Math.floor(e.temps_secondes/60), secs=e.temps_secondes%60
      const profil=PROFILS[e.user_id]
      const nom=profil?profil.prenom_affiche+' '+profil.nom_affiche:e.prenom||'—'
      h += '<tr><td><strong>'+nom+'</strong></td>'
      h += '<td><strong>'+e.score+'/20</strong> <span style="font-size:11px;color:'+(p>=50?'#16a34a':'#dc2626')+'">'+p+'%</span></td>'
      h += '<td>'+mentionBadge(p)+'</td>'
      h += '<td style="font-size:12px">'+fmt(mins,secs)+'</td>'
      h += '<td style="text-align:center;font-size:12px">'+sc.nombres+'</td>'
      h += '<td style="text-align:center;font-size:12px">'+sc.stats+'</td>'
      h += '<td style="text-align:center;font-size:12px">'+sc.geo+'</td>'
      h += '<td style="text-align:center;font-size:12px">'+sc.grandeurs+'</td>'
      h += '</tr>'
    })
    h += '</tbody></table>'
  }
  h += '</div></div>'

  h += '<div class="section" id="sec-themes"><div class="card"><div class="card-title">Résultats par thème</div>'
  h += '<table class="tbl"><thead><tr><th>Thème</th><th>Sessions</th><th>Moyenne</th></tr></thead><tbody>'
  Object.entries(themeStats).forEach(([t,s])=>{ const p=pct(s.ok,s.tot); h+='<tr><td>'+t+'</td><td>'+s.n+'</td><td><strong style="color:'+color(p)+'">'+p+'%</strong></td></tr>' })
  h += '</tbody></table></div></div>'

  h += '<div class="section" id="sec-sessions"><div class="card"><div class="card-title">30 dernières activités</div>'
  h += '<table class="tbl"><thead><tr><th>Élève</th><th>Type</th><th>Détail</th><th>Score</th><th>Date</th></tr></thead><tbody>'

  const toutesActivites = [
    ...ROWS.map(r => ({
      user_id: r.user_id,
      type: 'quiz',
      detail: r.theme + ' — ' + r.difficulte,
      score: r.score,
      total: r.total,
      created_at: r.created_at
    })),
    ...EXAMENS.filter(e => !e.abandonne).map(e => ({
      user_id: e.user_id,
      type: 'examen',
      detail: 'Examen blanc',
      score: e.score,
      total: e.total,
      created_at: e.created_at
    }))
  ]

  toutesActivites
    .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 30)
    .forEach(r => {
      const profil = PROFILS[r.user_id]
      const nom = profil ? profil.prenom_affiche + ' ' + profil.nom_affiche : '—'
      const p = pct(r.score, r.total)
      const typeBadge = r.type === 'examen'
        ? '<span class="badge badge-blue">📝 Examen blanc</span>'
        : '<span class="badge badge-banque">🎲 Quiz</span>'
      h += '<tr>'
      h += '<td><strong>' + nom + '</strong></td>'
      h += '<td>' + typeBadge + '</td>'
      h += '<td style="font-size:12px;color:#555">' + r.detail + '</td>'
      h += '<td><strong style="color:' + color(p) + '">' + r.score + '/' + r.total + '</strong></td>'
      h += '<td style="font-size:12px;color:#999">' + dateStr(r.created_at) + '</td>'
      h += '</tr>'
    })

  h += '</tbody></table></div></div>'

  h += '<div class="section" id="sec-ratees"><div class="card"><div class="card-title">Questions les plus ratées</div>'
  if (topRatees.length) {
    topRatees.forEach(([q,n])=>{ h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f3ef;font-size:13px"><span style="color:#444">'+q+'</span><span style="color:#dc2626;font-weight:600;margin-left:12px;white-space:nowrap">'+n+'× raté</span></div>' })
  } else { h += '<p class="empty">Pas encore de données.</p>' }
  h += '</div></div>'

  h += '<div class="section" id="sec-banque">'
  h += '<div class="card"><div class="card-title">Ajouter une question</div>'
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
  h += '<div class="field"><label>Thème</label><select id="bq-theme">'+THEMES.map(t=>'<option>'+t+'</option>').join('')+'</select></div>'
  h += '<div class="field"><label>Difficulté</label><select id="bq-diff"><option value="facile">Facile</option><option value="moyen" selected>Moyen</option><option value="difficile">Difficile</option></select></div>'
  h += '</div>'
  h += '<div class="field"><label>Question</label><textarea id="bq-question" placeholder="Énoncé complet de la question…"></textarea></div>'
  h += ['A','B','C','D'].map(l=>'<div class="opt-row"><label>'+l+'</label><input type="text" id="bq-opt'+l+'" placeholder="Option '+l+'"><label class="radio-label"><input type="radio" name="bq-bonne" value="'+l+'"> Bonne réponse</label></div>').join('')
  h += '<div class="field" style="margin-top:10px"><label>Explication</label><textarea id="bq-explication" placeholder="Correction étape par étape…"></textarea></div>'
  h += '<button class="btn btn-green" onclick="ajouterQuestion()">Ajouter la question</button>'
  h += '<div id="bq-msg" style="margin-top:10px;font-size:13px"></div></div>'
  h += '<div class="card"><div class="card-title">État de la banque</div><div id="bq-stats"><span style="color:#888;font-size:13px">Cliquez sur l\'onglet Banque pour charger…</span></div></div>'
  h += '</div>'

  document.getElementById('root').innerHTML = h
}

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { location.href='index.html'; return }
  const meta = session.user.user_metadata || {}
  if (meta.email_parent !== PROF) {
    const { data: p } = await sb.from('profils').select('email_parent').eq('user_id',session.user.id).single()
    if (!p || p.email_parent !== PROF) {
      document.getElementById('root').innerHTML='<div class="denied">Accès réservé au professeur.</div>'
      return
    }
  }
  const [r1,r2,r3] = await Promise.all([
    sb.from('resultats').select('*').order('created_at',{ascending:false}),
    sb.from('examens_blancs').select('*').order('created_at',{ascending:false}),
    sb.from('profils').select('*')
  ])
  ROWS    = r1.data||[]
  EXAMENS = r2.data||[]
  const profils = r3.data||[]
  PROFILS = {}
  profils.forEach(p=>PROFILS[p.user_id]=p)
  ELEVES = profils.map(p=>({ user_id:p.user_id, prenom:p.prenom_affiche||'—', nom:p.nom_affiche||'', email_parent:p.email_parent||'—', sessions:0, totalScore:0, totalQ:0 }))
  ROWS.forEach(r=>{ const e=ELEVES.find(x=>x.user_id===r.user_id); if(e){ e.sessions++; e.totalScore+=r.score; e.totalQ+=r.total } })
  render()
}

init()
</script>
</body>
</html>
