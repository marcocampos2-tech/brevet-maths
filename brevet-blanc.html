<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Brevet Maths">
<title>Brevet Blanc — Brevet Maths</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.container { max-width: 780px; margin: 0 auto; padding: 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.nav-title { font-size: 18px; font-weight: 600; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; }
.btn:hover { background: #f5f5f0; }
.btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn-full { width: 100%; justify-content: center; font-size: 15px; padding: 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: #1a1a1a; }
h3 { font-size: 14px; font-weight: 600; margin-bottom: 0.5rem; color: #1a1a1a; }
label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; margin-top: 12px; }
input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #d0d0c8; border-radius: 8px; font-size: 14px; background: white; color: #1a1a1a; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #1a1a1a; }
.badge { display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
.badge-blue { background: #eef2ff; color: #3730a3; }
.badge-green { background: #f0fdf4; color: #16a34a; }
.badge-orange { background: #fffbeb; color: #92400e; }
.session-card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
.session-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.session-title { font-size: 15px; font-weight: 600; }
.session-info { font-size: 12px; color: #666; margin-top: 4px; }
.eleve-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0ec; flex-wrap: wrap; gap: 8px; }
.eleve-row:last-child { border-bottom: none; }
.eleve-nom { font-size: 14px; font-weight: 500; }
.eleve-email { font-size: 12px; color: #666; }
.note-input { width: 80px; padding: 6px 10px; border: 1px solid #d0d0c8; border-radius: 6px; font-size: 14px; text-align: center; }
.note-display { font-size: 20px; font-weight: 700; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.tab.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.section { display: none; }
.section.active { display: block; }
.format-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1rem; }
.format-card { border: 1px solid #e8e8e4; border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.15s; }
.format-card:hover { border-color: #999; }
.format-card.active { border: 2px solid #1a1a1a; background: #f5f5f0; }
.format-icon { font-size: 28px; margin-bottom: 6px; }
.format-label { font-size: 13px; font-weight: 500; }
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 1rem; }
.stat { background: #f5f5f0; border-radius: 10px; padding: 14px; text-align: center; }
.stat-val { font-size: 26px; font-weight: 700; }
.stat-label { font-size: 12px; color: #666; margin-top: 4px; }
.msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; display: none; }
.msg.error { background: #fef2f2; color: #dc2626; display: block; }
.msg.success { background: #f0fdf4; color: #16a34a; display: block; }
.loader { text-align: center; padding: 3rem; color: #666; font-size: 14px; }
.annee-link { display: block; padding: 10px 14px; background: #f5f5f0; border-radius: 8px; margin-bottom: 8px; font-size: 13px; color: #3730a3; text-decoration: none; border: 1px solid #e8e8e4; }
.annee-link:hover { background: #eef2ff; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="nav-title">📝 Brevet Blanc</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a href="prof.html" class="btn">← Tableau de bord</a>
      <button class="btn" onclick="logout()">Déconnexion</button>
    </div>
  </nav>
  <div id="content"><div class="loader">Chargement…</div></div>
</div>

<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const PROF_EMAIL = 'marcocampos2@gmail.com'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let user = null
let eleves = []
let sessions = []
let format = 'visio_individuel'

async function logout() { await sb.auth.signOut(); window.location.href = 'index.html' }

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href = 'index.html'; return }
  if (data.session.user.email !== PROF_EMAIL) { window.location.href = 'quiz.html'; return }
  user = data.session.user

  const [{ data: elevesData }, { data: sessionsData }] = await Promise.all([
    sb.from('resultats').select('user_id, email, prenom').order('prenom'),
    sb.from('brevets_blancs').select('*, resultats_brevet_blanc(*)').order('date_session', { ascending: false })
  ])

  const seen = new Set()
  eleves = (elevesData || []).filter(e => {
    if (seen.has(e.user_id)) return false
    seen.add(e.user_id)
    return true
  })
  sessions = sessionsData || []
  render()
}

function setTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
  document.getElementById('tab-' + tab).classList.add('active')
  document.getElementById('section-' + tab).classList.add('active')
}

function setFormat(f) {
  format = f
  document.querySelectorAll('.format-card').forEach(c => c.classList.remove('active'))
  document.getElementById('format-' + f).classList.add('active')
  document.getElementById('lien-visio-group').style.display = f === 'presentiel' ? 'none' : 'block'
}

function getMention(note, max) {
  const pct = (note / max) * 100
  if (pct >= 80) return { label: '🌟 Très Bien', color: '#16a34a' }
  if (pct >= 70) return { label: '👍 Bien', color: '#3730a3' }
  if (pct >= 60) return { label: '✅ Assez Bien', color: '#0891b2' }
  if (pct >= 50) return { label: '📚 Admis', color: '#f59e0b' }
  return { label: '💪 À retravailler', color: '#dc2626' }
}

async function creerSession() {
  const titre = document.getElementById('titre').value.trim()
  const date = document.getElementById('date-session').value
  const lienVisio = document.getElementById('lien-visio').value.trim()
  const elevesSelectionnes = [...document.querySelectorAll('.eleve-check:checked')].map(c => c.value)

  if (!titre) { afficherMsg('form-msg', 'Entre un titre pour la session.', 'error'); return }
  if (!date) { afficherMsg('form-msg', 'Choisis une date.', 'error'); return }
  if (elevesSelectionnes.length === 0) { afficherMsg('form-msg', 'Sélectionne au moins un élève.', 'error'); return }

  const btn = document.getElementById('btn-creer')
  btn.disabled = true
  btn.textContent = 'Création...'

  const { error } = await sb.from('brevets_blancs').insert({
    titre, date_session: new Date(date).toISOString(),
    format, lien_visio: lienVisio || null,
    eleves: elevesSelectionnes
  })

  if (error) {
    afficherMsg('form-msg', 'Erreur : ' + error.message, 'error')
  } else {
    afficherMsg('form-msg', '✅ Session créée !', 'success')
    await init()
    setTab('sessions')
  }
  btn.disabled = false
  btn.textContent = '📝 Créer la session'
}

async function enregistrerNote(bbId, userId, prenom, email) {
  const note = parseFloat(document.getElementById('note-' + userId).value)
  const commentaire = document.getElementById('comment-' + userId)?.value?.trim() || ''

  if (isNaN(note) || note < 0 || note > 40) { alert('Entre une note entre 0 et 40.'); return }

  const { data: qcmData } = await sb.from('resultats')
    .select('score, total')
    .eq('user_id', userId)
    .order('created_at', { ascending: false })
    .limit(10)

  const qcmMoy = qcmData && qcmData.length > 0
    ? Math.round((qcmData.reduce((a, r) => a + r.score/r.total, 0) / qcmData.length) * 100)
    : null

  const { error } = await sb.from('resultats_brevet_blanc').upsert({
    brevet_blanc_id: bbId, user_id: userId,
    email, prenom, note, note_max: 40, commentaire
  }, { onConflict: 'brevet_blanc_id,user_id' })

  if (!error) {
    await fetch('/api/email-brevet-blanc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        emailParent: email, prenom, email,
        note, noteMax: 40, commentaire, qcmMoyenne: qcmMoy
      })
    })
    await init()
    setTab('sessions')
  }
}

function afficherMsg(id, texte, type) {
  const el = document.getElementById(id)
  if (el) { el.textContent = texte; el.className = 'msg ' + type }
}

function render() {
  const totalSessions = sessions.length
  const totalNotes = sessions.flatMap(s => s.resultats_brevet_blanc || [])
  const moyenneGlobale = totalNotes.length
    ? Math.round((totalNotes.reduce((a, r) => a + (r.note/r.note_max)*100, 0) / totalNotes.length))
    : 0

  document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="stat-val">${totalSessions}</div><div class="stat-label">Sessions créées</div></div>
      <div class="stat"><div class="stat-val">${totalNotes.length}</div><div class="stat-label">Notes enregistrées</div></div>
      <div class="stat"><div class="stat-val">${moyenneGlobale}%</div><div class="stat-label">Moyenne générale</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-sessions" onclick="setTab('sessions')">📋 Sessions</button>
      <button class="tab" id="tab-nouvelle" onclick="setTab('nouvelle')">➕ Nouvelle session</button>
      <button class="tab" id="tab-annales" onclick="setTab('annales')">📄 Annales Eduscol</button>
    </div>

    <div class="section active" id="section-sessions">
      ${sessions.length === 0 ? '<div class="loader">Aucune session. Crée-en une !</div>' :
        sessions.map(s => {
          const resultats = s.resultats_brevet_blanc || []
          const elevesSession = s.eleves || []
          const dateStr = new Date(s.date_session).toLocaleDateString('fr-FR', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
          })
          const formatLabel = s.format === 'presentiel' ? '🏫 Présentiel' :
            s.format === 'visio_individuel' ? '💻 Visio individuelle' : '👥 Visio groupe'

          return `<div class="session-card">
            <div class="session-header">
              <div>
                <div class="session-title">${s.titre}</div>
                <div class="session-info">${dateStr} · ${formatLabel}</div>
                ${s.lien_visio ? `<a href="${s.lien_visio}" target="_blank" style="font-size:12px;color:#3730a3">🔗 Lien visio</a>` : ''}
              </div>
              <span class="badge badge-blue">${resultats.length}/${elevesSession.length} noté(s)</span>
            </div>
            ${eleves.filter(e => elevesSession.includes(e.user_id)).map(e => {
              const resultat = resultats.find(r => r.user_id === e.user_id)
              const mention = resultat ? getMention(resultat.note, resultat.note_max) : null
              return `<div class="eleve-row">
                <div>
                  <div class="eleve-nom">${e.prenom || '—'}</div>
                  <div class="eleve-email">${e.email}</div>
                </div>
                ${resultat ? `
                  <div style="text-align:right">
                    <div class="note-display" style="color:${mention.color}">${resultat.note}/40</div>
                    <div style="font-size:11px;color:${mention.color}">${mention.label}</div>
                    ${resultat.commentaire ? `<div style="font-size:11px;color:#666">${resultat.commentaire}</div>` : ''}
                  </div>
                ` : `
                  <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
                    <div>
                      <div style="font-size:11px;color:#666;margin-bottom:2px">Note /40</div>
                      <input type="number" class="note-input" id="note-${e.user_id}" min="0" max="40" step="0.5" placeholder="ex: 28">
                    </div>
                    <div style="flex:1;min-width:120px">
                      <div style="font-size:11px;color:#666;margin-bottom:2px">Commentaire</div>
                      <input type="text" id="comment-${e.user_id}" placeholder="Bon travail..." style="padding:6px 10px;font-size:13px">
                    </div>
                    <button class="btn btn-primary" onclick="enregistrerNote('${s.id}','${e.user_id}','${e.prenom}','${e.email}')">
                      💾 Enregistrer
                    </button>
                  </div>
                `}
              </div>`
            }).join('')}
          </div>`
        }).join('')}
    </div>

    <div class="section" id="section-nouvelle">
      <div class="card">
        <h2>Créer une nouvelle session</h2>
        <label>Titre de la session</label>
        <input type="text" id="titre" placeholder="Ex: Brevet Blanc #1 — Juin 2026">
        <label>Date et heure</label>
        <input type="datetime-local" id="date-session">
        <label style="margin-top:16px">Format</label>
        <div class="format-grid">
          <div class="format-card active" id="format-visio_individuel" onclick="setFormat('visio_individuel')">
            <div class="format-icon">💻</div><div class="format-label">Visio individuelle</div>
          </div>
          <div class="format-card" id="format-visio_groupe" onclick="setFormat('visio_groupe')">
            <div class="format-icon">👥</div><div class="format-label">Visio groupe</div>
          </div>
          <div class="format-card" id="format-presentiel" onclick="setFormat('presentiel')">
            <div class="format-icon">🏫</div><div class="format-label">Présentiel</div>
          </div>
        </div>
        <div id="lien-visio-group">
          <label>Lien Google Meet / Zoom</label>
          <input type="url" id="lien-visio" placeholder="https://meet.google.com/...">
        </div>
        <label style="margin-top:16px">Élèves participants</label>
        <div style="background:#f5f5f0;border-radius:8px;padding:12px;margin-top:4px">
          ${eleves.length === 0 ? '<p style="font-size:13px;color:#666">Aucun élève inscrit.</p>' :
            eleves.map(e => `
              <label style="display:flex;align-items:center;gap:8px;margin-top:8px;cursor:pointer">
                <input type="checkbox" class="eleve-check" value="${e.user_id}" style="width:auto;padding:0">
                <span style="font-size:14px"><strong>${e.prenom || '—'}</strong> <span style="color:#666;font-size:12px">(${e.email})</span></span>
              </label>`).join('')}
        </div>
        <button class="btn btn-primary btn-full" id="btn-creer" onclick="creerSession()" style="margin-top:1rem">
          📝 Créer la session
        </button>
        <div class="msg" id="form-msg"></div>
      </div>
    </div>

    <div class="section" id="section-annales">
      <div class="card">
        <h2>📄 Annales officielles Eduscol</h2>
        <p style="font-size:13px;color:#666;margin-bottom:1rem">Télécharge les vrais sujets du Brevet depuis le site officiel et envoie-les à tes élèves avant chaque session.</p>
        <a href="https://eduscol.education.fr/2221/sujets-du-brevet" target="_blank" class="annee-link">🔗 Tous les sujets officiels — eduscol.education.fr</a>
        <a href="https://www.education.gouv.fr/le-diplome-national-du-brevet-1929" target="_blank" class="annee-link">🔗 Diplôme National du Brevet — education.gouv.fr</a>
        <div style="margin-top:1rem;background:#fffbeb;border:1px solid #f59e0b;border-radius:8px;padding:12px;font-size:13px;color:#92400e">
          <strong>💡 Conseil :</strong> Télécharge le sujet PDF → envoie-le via WhatsApp 30 min avant → l'élève travaille sur papier ou écran.
        </div>
        <div style="margin-top:1rem;background:#f0fdf4;border:1px solid #16a34a;border-radius:8px;padding:12px;font-size:13px;color:#15803d">
          <strong>📋 Format officiel :</strong><br>
          • Durée : 2h00 · Note sur 40 points<br>
          • 3 exercices : Nombres, Géométrie, Fonctions/Stats<br>
          • Calculatrice autorisée
        </div>
      </div>
    </div>
  `
}

init()
</script>
</body>
</html>
