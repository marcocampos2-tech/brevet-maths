<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes résultats — Brevet Maths</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.5rem; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; }
.btn:hover { background: #f5f5f0; }
.card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
h1 { font-size: 20px; font-weight: 600; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #eef2ff; color: #3730a3; margin-left: 8px; }
.score { font-size: 22px; font-weight: 600; }
.date { font-size: 12px; color: #999; margin-top: 4px; }
.ratee { font-size: 12px; color: #666; padding: 4px 0; border-top: 1px solid #f0f0ec; }
.ratee-label { font-size: 12px; color: #dc2626; margin: 8px 0 4px; }
.empty { text-align: center; color: #666; padding: 3rem; }
.loader { text-align: center; color: #666; padding: 3rem; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="quiz.html" class="btn">← Retour au quiz</a>
    <h1>Mes résultats</h1>
  </nav>
  <div id="content"><div class="loader">Chargement…</div></div>
</div>

<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href = 'index.html'; return }
  const { data: rows } = await sb.from('resultats').select('*')
    .eq('user_id', data.session.user.id).order('created_at', { ascending: false })
  const content = document.getElementById('content')
  if (!rows || rows.length === 0) {
    content.innerHTML = '<div class="empty">Pas encore de résultats.<br>Lance ton premier quiz !</div>'
    return
  }
  content.innerHTML = rows.map(r => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong>${r.theme}</strong>
          <span class="badge">${r.difficulte}</span>
          <div class="date">${new Date(r.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="score">${r.score}/${r.total}</div>
      </div>
      ${r.questions_ratees?.length ? `
        <div class="ratee-label">Questions ratées :</div>
        ${r.questions_ratees.map(q=>`<div class="ratee">• ${q}</div>`).join('')}
      ` : ''}
    </div>`).join('')
}
init()
</script>
</body>
</html>
