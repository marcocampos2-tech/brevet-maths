<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Brevet Maths">
<title>Brevet Maths — Quiz</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 1rem; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.nav-left { font-size: 18px; font-weight: 600; }
.nav-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.nav-email { font-size: 12px; color: #666; }
.card { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 1rem; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid #d0d0c8; background: white; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; }
.btn:hover { background: #f5f5f0; }
.btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn-green { background: #16a34a; color: white; border-color: #16a34a; font-size: 16px; padding: 16px; }
.btn-green:hover { background: #15803d; }
.btn-outline { background: white; color: #666; border: 1px solid #d0d0c8; font-size: 14px; padding: 12px; }
.btn-outline:hover { background: #f5f5f0; }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
#btn-prof { background: #fbbf24; border-color: #f59e0b; color: #1a1a1a; }
#btn-prof:hover { background: #f59e0b; }
h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.theme-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 1rem; }
.theme-card { border: 1px solid #e8e8e4; border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.15s; background: white; }
.theme-card:hover { border-color: #999; }
.theme-card.active { border: 2px solid #1a1a1a; background: #f5f5f0; }
.theme-icon { font-size: 22px; margin-bottom: 4px; }
.theme-label { font-size: 12px; font-weight: 500; }
.diff-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.diff-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #d0d0c8; background: white; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.diff-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.option { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1px solid #e8e8e4; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.15s; margin-bottom: 8px; }
.option:hover { border-color: #999; background: #f9f9f7; }
.option.selected { border-color: #3730a3; background: #eef2ff; }
.option.correct { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
.option.wrong { border-color: #dc2626; background: #fef2f2; color: #dc2626; }
.option.aucune-selected { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
.option.aucune { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
.letter { font-size: 12px; font-weight: 600; color: #999; min-width: 18px; }
.option.correct .letter, .option.wrong .letter, .option.aucune .letter { color: inherit; }
.explication { margin-top: 10px; padding: 10px 14px; background: #f5f5f0; border-radius: 8px; font-size: 13px; color: #555; border-left: 3px solid #3730a3; line-height: 1.6; }
.explication-aucune { margin-top: 10px; padding: 10px 14px; background: #fffbeb; border-radius: 8px; font-size: 13px; color: #92400e; border-left: 3px solid #f59e0b; line-height: 1.6; }
.quiz-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
.progress-steps { display: flex; gap: 4px; flex: 1; }
.progress-step { height: 6px; flex: 1; border-radius: 3px; background: #e0e0d8; }
.progress-step.done { background: #3730a3; }
.progress-step.current { background: #3730a3; opacity: 0.4; }
.progress-label { font-size: 12px; color: #666; white-space: nowrap; }
.results-screen { background: white; border-radius: 16px; border: 1px solid #e8e8e4; padding: 2rem 1.5rem; margin-bottom: 1rem; text-align: center; }
.results-score-big { font-size: 72px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.results-pct { font-size: 28px; font-weight: 600; margin: 10px 0 6px; }
.results-mention { font-size: 18px; margin-bottom: 1rem; }
.results-temps { font-size: 12px; color: #999; margin-bottom: 2rem; }
.results-btns { display: flex; flex-direction: column; gap: 10px; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #eef2ff; color: #3730a3; }
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.q-num { font-size: 12px; color: #999; }
.q-text { font-size: 15px; line-height: 1.8; margin-bottom: 10px; color: #1a1a1a; }
.q-tableau { border-collapse: collapse; margin: 10px 0 14px 0; font-size: 14px; }
.q-tableau th { border: 1px solid #ccc; padding: 6px 14px; background: #f5f5f0; font-weight: 600; text-align: center; }
.q-tableau td { border: 1px solid #ccc; padding: 6px 14px; text-align: center; }
.loader { text-align: center; padding: 3rem; color: #666; font-size: 14px; }
.chrono { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid #e8e8e4; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 500; color: #1a1a1a; }
.chrono-dot { width: 8px; height: 8px; background: #16a34a; border-radius: 50%; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.badge-source-banque { font-size: 11px; color: #f59e0b; background: #fffbeb; border: 1px solid #f59e0b; border-radius: 20px; padding: 2px 10px; }
.badge-source-ia { font-size: 11px; color: #16a34a; background: #f0fdf4; border: 1px solid #16a34a; border-radius: 20px; padding: 2px 10px; }
.saving-msg { text-align: center; color: #666; font-size: 13px; padding: 8px; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="nav-left">📐 Brevet Maths</div>
    <div class="nav-right">
      <span class="nav-email" id="user-email"></span>
      <div class="chrono" id="chrono" style="display:none">
        <div class="chrono-dot"></div>
        <span id="chrono-text">00:00</span>
      </div>
      <a href="prof.html" class="btn" id="btn-prof" style="display:none">🎓 Prof</a>
      <a href="resultats.html" class="btn">Mes résultats</a>
      <button class="btn" onclick="logout()">Déconnexion</button>
    </div>
  </nav>

  <div class="card" id="config">
    <h2>Choisis un thème</h2>
    <div class="theme-grid" id="theme-grid"></div>
    <h2 style="margin-top:1rem">Niveau</h2>
    <div class="diff-row">
      <button class="diff-btn" onclick="setDiff(this,'facile')">Facile</button>
      <button class="diff-btn active" onclick="setDiff(this,'moyen')">Moyen</button>
      <button class="diff-btn" onclick="setDiff(this,'difficile')">Difficile</button>
    </div>
    <button class="btn btn-primary btn-full" id="gen-btn" onclick="generer()" style="margin-top:0.5rem">🎲 Générer 5 questions</button>
  </div>

  <div id="quiz-area"></div>
</div>

<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const PROF_EMAIL = 'marcocampos2@gmail.com'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const THEMES = [
  { label: 'Nombres & calculs', value: 'Nombres et calculs', icon: '🔢' },
  { label: 'Géométrie', value: 'Géométrie', icon: '📐' },
  { label: 'Algèbre', value: 'Algèbre et équations', icon: '🔣' },
  { label: 'Stats & probas', value: 'Statistiques et probabilités', icon: '📊' },
  { label: 'Fonctions', value: 'Fonctions', icon: '📈' },
  { label: 'Tout mélanger', value: 'Mélange de tous les thèmes', icon: '✨' },
]

let user = null, prenom = '', emailParent = ''
let theme = 'Nombres et calculs', diff = 'moyen'
let questions = [], answers = {}, submitted = {}, saved = false
let chronoInterval = null, chronoSecondes = 0, sourceQuestions = 'ia'

async function init() {
  const { data } = await sb.auth.getSession()
  if (!data.session) { window.location.href = 'index.html'; return }
  user = data.session.user
  prenom = user.user_metadata?.prenom || ''
  emailParent = user.user_metadata?.email_parent || ''

  if (!prenom || !emailParent) {
    const { data: derniere } = await sb.from('resultats')
      .select('prenom, email_parent')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .limit(1)
    if (derniere && derniere.length > 0) {
      prenom = prenom || derniere[0].prenom || ''
      emailParent = emailParent || derniere[0].email_parent || ''
    }
  }

  document.getElementById('user-email').textContent = prenom || user.email
  if (user.email === PROF_EMAIL) {
    document.getElementById('btn-prof').style.display = 'inline-flex'
  }
  renderThemes()
}

function renderThemes() {
  document.getElementById('theme-grid').innerHTML = THEMES.map((t,i) => `
    <div class="theme-card ${i===0?'active':''}" onclick="setTheme(this,'${t.value}')">
      <div class="theme-icon">${t.icon}</div>
      <div class="theme-label">${t.label}</div>
    </div>`).join('')
}

function setTheme(el, val) {
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'))
  el.classList.add('active'); theme = val
}

function setDiff(el, val) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'))
  el.classList.add('active'); diff = val
}

async function logout() { await sb.auth.signOut(); window.location.href = 'index.html' }

function demarrerChrono() {
  chronoSecondes = 0
  document.getElementById('chrono').style.display = 'flex'
  chronoInterval = setInterval(() => {
    chronoSecondes++
    const m = Math.floor(chronoSecondes / 60).toString().padStart(2, '0')
    const s = (chronoSecondes % 60).toString().padStart(2, '0')
    document.getElementById('chrono-text').textContent = `${m}:${s}`
  }, 1000)
}

function arreterChrono() { clearInterval(chronoInterval) }

function formatTemps(secondes) {
  const m = Math.floor(secondes / 60)
  const s = secondes % 60
  if (m === 0) return `${s} sec`
  return `${m} min ${s} sec`
}

async function generer() {
  const btn = document.getElementById('gen-btn')
  btn.disabled = true
  btn.textContent = '⏳ Génération en cours...'
  questions = []; answers = {}; submitted = {}; saved = false
  arreterChrono()
  document.getElementById('chrono').style.display = 'none'
  document.getElementById('quiz-area').innerHTML = '<div class="loader">🔍 Claude génère et vérifie les questions… (~15 secondes)</div>'

  try {
    const res = await fetch('/api/generer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ theme, difficulte: diff })
    })
    const data = await res.json()
    if (data.error) throw new Error(data.error)
    questions = data.questions
    sourceQuestions = data.source || 'ia'
    demarrerChrono()
    renderQuiz()
  } catch(e) {
    document.getElementById('quiz-area').innerHTML = '<div class="loader">❌ ' + e.message + '</div>'
  }
  btn.disabled = false
  btn.textContent = '🎲 Générer 5 questions'
}

function renderTableau(tableau) {
  if (!tableau || !tableau.headers) return ''
  return `<table class="q-tableau">
    <tr>${tableau.headers.map(h => `<th>${h}</th>`).join('')}</tr>
    ${tableau.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}
  </table>`
}

function renderQuiz() {
  const area = document.getElementById('quiz-area')
  const nbDone = Object.keys(submitted).length
  const toutFini = nbDone === questions.length && questions.length > 0

  if (toutFini) { arreterChrono(); renderResultats(); return }

  let html = ''
  if (sourceQuestions === 'banque') {
    html += `<div style="text-align:center;margin-bottom:1rem"><span class="badge-source-banque">⚡ Questions depuis la banque locale</span></div>`
  } else {
    html += `<div style="text-align:center;margin-bottom:1rem"><span class="badge-source-ia">✨ Questions générées par IA</span></div>`
  }

  html += `<div class="quiz-progress">
    <div class="progress-steps">${questions.map((_,i) => {
      let cls = 'progress-step'
      if (submitted[i] !== undefined) cls += ' done'
      else if (i === nbDone) cls += ' current'
      return `<div class="${cls}"></div>`
    }).join('')}</div>
    <span class="progress-label">Question ${Math.min(nbDone+1, questions.length)}/${questions.length}</span>
  </div>`

  const letters = ['A','B','C','D']
  questions.forEach((q,i) => {
    const sel = answers[i]
    const done = submitted[i] !== undefined
    const estAucune = submitted[i] === 'aucune'

    html += `<div class="card">
      <div class="q-meta">
        <span class="q-num">Question ${i+1}/${questions.length}</span>
        <span class="badge">${diff}</span>
      </div>
      <p class="q-text">${q.q}</p>
      ${renderTableau(q.tableau)}`

    q.opts.forEach((opt,j) => {
      let cls = 'option'
      if (done) {
        if (j === q.answer) cls += ' correct'
        else if (j === sel && sel !== 'aucune') cls += ' wrong'
      } else if (j === sel) cls += ' selected'
      html += `<div class="${cls}" ${done?'style="cursor:default"':`onclick="pick(${i},${j})"`}>
        <span class="letter">${letters[j]}</span>${opt}</div>`
    })

    if (!done) {
      const aucuneSel = sel === 'aucune'
      html += `<div class="option ${aucuneSel?'aucune-selected':''}" onclick="pick(${i},'aucune')" style="margin-top:4px;border-style:dashed">
        <span class="letter">😅</span>Aucune idée !</div>`
      html += `<button class="btn btn-primary btn-full" style="margin-top:8px" onclick="valider(${i})" ${sel===undefined?'disabled':''}>Valider</button>`
    } else if (estAucune) {
      html += `<div class="option aucune" style="cursor:default;margin-top:4px;border-style:dashed">
        <span class="letter">😅</span>Aucune idée !</div>`
      html += `<div class="explication-aucune"><strong>💡 Pas de panique !</strong> La bonne réponse est : <strong>${q.opts[q.answer]}</strong><br><br>${q.explication}</div>`
    } else {
      html += `<div class="explication"><strong>${submitted[i]==='correct'?'✓ Bravo !':'✗ Pas tout à fait.'}</strong><br><br>${q.explication}</div>`
    }
    html += '</div>'
  })

  area.innerHTML = html
}

function renderResultats() {
  const area = document.getElementById('quiz-area')
  const nbOk = Object.values(submitted).filter(v => v === 'correct').length
  const pct = Math.round((nbOk / questions.length) * 100)

  let mention = '', couleur = ''
  if (pct >= 80) { mention = '🌟 Excellent !'; couleur = '#16a34a' }
  else if (pct >= 60) { mention = '👍 Bien !'; couleur = '#3730a3' }
  else if (pct >= 40) { mention = '💪 Continue !'; couleur = '#f59e0b' }
  else { mention = '📚 À retravailler'; couleur = '#dc2626' }

  let html = `<div class="results-screen">
    <div style="margin-bottom:1.2rem">
      ${sourceQuestions==='banque'
        ? '<span class="badge-source-banque">⚡ Banque locale</span>'
        : '<span class="badge-source-ia">✨ IA</span>'}
    </div>
    <div class="results-score-big">${nbOk}/${questions.length}</div>
    <div class="results-pct" style="color:${couleur}">${pct}%</div>
    <div class="results-mention">${mention}</div>
    <div class="results-temps">⏱️ ${formatTemps(chronoSecondes)} · ${theme} · ${diff}</div>
    <div class="results-btns">
      <button class="btn btn-green btn-full" id="btn-nouvelle" onclick="nouvelleRonde()">
        🔄 Nouvelle ronde
      </button>
      <button class="btn btn-outline btn-full" id="btn-terminer" onclick="terminer()">
        🚪 Terminer et se déconnecter
      </button>
      <div class="saving-msg" id="saving-msg" style="display:none">⏳ Enregistrement en cours…</div>
    </div>
  </div>

  <div style="margin-bottom:0.5rem;font-size:14px;font-weight:600;color:#1a1a1a;padding:0 4px">
    📋 Récapitulatif
  </div>`

  const letters = ['A','B','C','D']
  questions.forEach((q,i) => {
    const estAucune = submitted[i] === 'aucune'
    html += `<div class="card">
      <div class="q-meta">
        <span class="q-num">Question ${i+1}/${questions.length}</span>
        <span class="badge" style="${submitted[i]==='correct'?'background:#f0fdf4;color:#16a34a':'background:#fef2f2;color:#dc2626'}">${submitted[i]==='correct'?'✅ Correct':'❌ Raté'}</span>
      </div>
      <p class="q-text">${q.q}</p>
      ${renderTableau(q.tableau)}`

    q.opts.forEach((opt,j) => {
      let cls = 'option'
      if (j === q.answer) cls += ' correct'
      else if (j === answers[i] && answers[i] !== 'aucune') cls += ' wrong'
      html += `<div class="${cls}" style="cursor:default"><span class="letter">${letters[j]}</span>${opt}</div>`
    })

    if (estAucune) {
      html += `<div class="option aucune" style="cursor:default;margin-top:4px;border-style:dashed">
        <span class="letter">😅</span>Aucune idée !</div>`
      html += `<div class="explication-aucune"><strong>💡 La bonne réponse :</strong> ${q.opts[q.answer]}<br><br>${q.explication}</div>`
    } else {
      html += `<div class="explication"><strong>${submitted[i]==='correct'?'✓ Bravo !':'✗ Pas tout à fait.'}</strong><br><br>${q.explication}</div>`
    }
    html += '</div>'
  })

  area.innerHTML = html
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

async function sauvegarder() {
  if (saved) return true
  const nbOk = Object.values(submitted).filter(v => v === 'correct').length
  const nbAucune = Object.values(submitted).filter(v => v === 'aucune').length
  const ratees = questions.filter((_,i) => submitted[i] === 'wrong').map(q => q.q)
  const inconnues = questions.filter((_,i) => submitted[i] === 'aucune').map(q => q.q)

  try {
    await sb.from('resultats').insert({
      user_id: user.id,
      email: user.email,
      prenom: prenom || '',
      email_parent: emailParent || '',
      theme, difficulte: diff,
      score: nbOk,
      total: questions.length,
      questions_ratees: [...ratees, ...inconnues.map(q => `[Aucune idée] ${q}`)],
      temps_secondes: chronoSecondes,
      aucune_idee: nbAucune,
      source_questions: sourceQuestions
    })
    if (emailParent) {
      fetch('/api/email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          emailParent, emailEleve: user.email,
          prenom: prenom || user.email,
          theme, difficulte: diff,
          score: nbOk, total: questions.length,
          questionsRatees: ratees, questionsInconnues: inconnues,
          tempsSecondes: chronoSecondes, aucuneIdee: nbAucune
        })
      }).catch(e => console.log('Erreur email:', e.message))
    }
    saved = true
    return true
  } catch(e) {
    console.log('Erreur sauvegarde:', e.message)
    return false
  }
}

async function nouvelleRonde() {
  document.getElementById('btn-nouvelle').disabled = true
  document.getElementById('btn-terminer').disabled = true
  const msg = document.getElementById('saving-msg')
  if (msg) msg.style.display = 'block'
  await sauvegarder()
  questions = []; answers = {}; submitted = {}; saved = false
  arreterChrono()
  document.getElementById('chrono').style.display = 'none'
  document.getElementById('quiz-area').innerHTML = ''
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

async function terminer() {
  const btnT = document.getElementById('btn-terminer')
  const btnN = document.getElementById('btn-nouvelle')
  if (btnT) btnT.disabled = true
  if (btnN) btnN.disabled = true
  const msg = document.getElementById('saving-msg')
  if (msg) msg.style.display = 'block'
  await sauvegarder()
  await sb.auth.signOut()
  window.location.href = 'index.html'
}

function pick(qi, oi) {
  if (submitted[qi] !== undefined) return
  answers[qi] = oi
  renderQuiz()
}

function valider(qi) {
  if (answers[qi] === undefined) return
  const sel = answers[qi]
  submitted[qi] = sel === 'aucune' ? 'aucune' : (sel === questions[qi].answer ? 'correct' : 'wrong')
  const toutFini = Object.keys(submitted).length === questions.length
  if (toutFini) {
    arreterChrono()
    renderResultats()
  } else {
    renderQuiz()
    setTimeout(() => {
      const cards = document.querySelectorAll('.card')
      const nextCard = cards[qi + 1]
      if (nextCard) nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' })
    }, 300)
  }
}

init()
</script>
</body>
</html>
