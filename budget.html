<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget — Marco</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #dbeafe;
    --surface: #ffffff;
    --border: #bfdbfe;
    --text: #1e3a5f;
    --muted: #5b7fa6;
    --green: #16a34a;
    --orange: #d97706;
    --red: #dc2626;
    --accent: #f59e0b;
    --card-radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  header {
    max-width: 720px;
    margin: 0 auto 40px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header span {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .grid {
    max-width: 720px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 24px;
  }

  .card.full { grid-column: 1 / -1; }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .big-amount {
    font-family: 'DM Mono', monospace;
    font-size: 38px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 18px;
  }

  /* Barre de progression */
  .bar-track {
    height: 6px;
    background: #93c5fd;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .6s ease;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Alerte */
  .alert {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 14px;
    border: 1px solid transparent;
  }

  .alert.ok    { background: #dcfce7; border-color: #86efac; color: #16a34a; }
  .alert.warn  { background: #fef3c7; border-color: #fcd34d; color: #d97706; }
  .alert.danger{ background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

  .alert-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ok .alert-dot    { background: var(--green); }
  .warn .alert-dot  { background: var(--orange); }
  .danger .alert-dot{ background: var(--red); }

  /* Historique */
  .tx-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

  .tx {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    gap: 12px;
    transition: background .15s;
  }
  .tx:hover { background: #93c5fd; }

  .tx-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #93c5fd;
    display: grid;
    place-items: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-date { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .tx-amount {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Seuils */
  .thresholds {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }

  .threshold-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }

  .threshold-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: #93c5fd;
    color: #1e3a5f;
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    max-width: 720px;
    margin: 32px auto 12px;
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate" style="position:fixed;inset:0;background:#dbeafe;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border:1px solid #bfdbfe;border-radius:16px;padding:40px 32px;text-align:center;width:300px;">
    <div style="font-family:DM Mono,monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#5b7fa6;margin-bottom:16px;">Budget</div>
    <input id="pwd-input" type="password" placeholder="Mot de passe" style="width:100%;padding:10px 14px;border:1px solid #bfdbfe;border-radius:8px;font-size:15px;outline:none;margin-bottom:12px;color:#1e3a5f;" />
    <button onclick="checkPwd()" style="width:100%;padding:10px;background:#f59e0b;border:none;border-radius:8px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;">Accéder</button>
    <div id="pwd-error" style="color:#dc2626;font-size:13px;margin-top:10px;display:none;">Mot de passe incorrect</div>
  </div>
</div>

<script>
  function checkPwd() {
    if (document.getElementById("pwd-input").value === "budget2026") {
      document.getElementById("gate").style.display = "none";
    } else {
      document.getElementById("pwd-error").style.display = "block";
    }
  }
  document.getElementById("pwd-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkPwd();
  });
</script>

<header>
  <h1>Budget</h1>
  <span id="current-date"></span>
</header>

<!-- Semaine + Mois -->
<div class="grid">

  <!-- Semaine -->
  <div class="card" id="card-week">
    <div class="card-label">Cette semaine</div>
    <div class="big-amount" id="week-amount">—</div>
    <div class="sub" id="week-sub">sur 250 €</div>
    <div class="bar-track"><div class="bar-fill" id="week-bar" style="width:0%"></div></div>
    <div class="bar-labels">
      <span>0 €</span><span>250 €</span>
    </div>
    <div class="alert ok" id="week-alert">
      <div class="alert-dot"></div>
      <span id="week-alert-text">—</span>
    </div>
  </div>

  <!-- Mois -->
  <div class="card" id="card-month">
    <div class="card-label">Ce mois</div>
    <div class="big-amount" id="month-amount">—</div>
    <div class="sub" id="month-sub">sur 1 000 € objectif</div>
    <div class="bar-track"><div class="bar-fill" id="month-bar" style="width:0%"></div></div>
    <div class="bar-labels">
      <span>0 €</span><span>1 200 €</span>
    </div>
    <div class="alert ok" id="month-alert">
      <div class="alert-dot"></div>
      <span id="month-alert-text">—</span>
    </div>
  </div>

</div>

<!-- Seuils -->
<div class="section-title">Seuils d'alerte</div>
<div class="grid">
  <div class="card full">
    <div class="thresholds">
      <div class="threshold-row">
        <span>Objectif mensuel</span>
        <span class="threshold-badge">1 000 €</span>
      </div>
      <div class="threshold-row">
        <span>Limite absolue mensuelle</span>
        <span class="threshold-badge">1 200 €</span>
      </div>
      <div class="threshold-row">
        <span>Budget hebdomadaire</span>
        <span class="threshold-badge">250 €</span>
      </div>
    </div>
  </div>
</div>

<!-- Historique -->
<div class="section-title">Dernières dépenses</div>
<div class="grid">
  <div class="card full">
    <ul class="tx-list" id="tx-list"></ul>
  </div>
</div>

<script>
  // ─── Config Supabase ───────────────────────────────────────────────
  const SUPABASE_URL = 'https://vempopaetcoqepabzkts.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_5AWpLJ4KZNBC_2YoWwawyQ_lbyrSl3h';

  const BUDGET_WEEK  = 250;
  const BUDGET_OBJ   = 1000;
  const BUDGET_LIMIT = 1200;

  // ─── Date courante ─────────────────────────────────────────────────
  const now = new Date();
  document.getElementById('current-date').textContent =
    now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // ─── Utilitaires date ──────────────────────────────────────────────
  function getWeekStart(d) {
    const day = d.getDay() || 7;
    const start = new Date(d);
    start.setDate(d.getDate() - day + 1);
    start.setHours(0,0,0,0);
    return start;
  }

  function getMonthStart(d) {
    return new Date(d.getFullYear(), d.getMonth(), 1);
  }

  function toISO(d) { return d.toISOString().split('T')[0]; }

  // ─── Fetch Supabase ────────────────────────────────────────────────
  async function fetchDepenses() {
    const monthStart = toISO(getMonthStart(now));
    const url = `${SUPABASE_URL}/rest/v1/depenses?date_achat=gte.${monthStart}&order=date_achat.desc&limit=50`;
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    if (!res.ok) throw new Error('Erreur Supabase');
    return await res.json();
  }

  // ─── Barre de progression ──────────────────────────────────────────
  function renderBar(fillEl, alertEl, alertTextEl, amountEl, total, objective, limit) {
    amountEl.textContent = total.toFixed(2).replace('.', ',') + ' €';

    const pct = Math.min(total / limit * 100, 100);
    fillEl.style.width = pct + '%';

    let color, alertClass, alertMsg;

    if (total <= objective * 0.8) {
      color = '#4ade80'; alertClass = 'ok';
      const reste = objective - total;
      alertMsg = `Il reste ${reste.toFixed(0)} € sur l'objectif`;
    } else if (total <= objective) {
      color = '#fb923c'; alertClass = 'warn';
      alertMsg = `Proche de l'objectif (${objective.toLocaleString('fr-FR')} €)`;
    } else if (total <= limit) {
      color = '#fb923c'; alertClass = 'warn';
      alertMsg = `Objectif dépassé — limite à ${limit.toLocaleString('fr-FR')} €`;
    } else {
      color = '#f87171'; alertClass = 'danger';
      alertMsg = `Limite absolue dépassée !`;
    }

    fillEl.style.background = color;
    alertEl.className = 'alert ' + alertClass;
    alertEl.querySelector('.alert-dot').style.background = color;
    alertTextEl.textContent = alertMsg;
  }

  // ─── Icône marchand ────────────────────────────────────────────────
  function getIcon(marchand) {
    const m = marchand.toLowerCase();
    if (m.includes('carrefour') || m.includes('monoprix') || m.includes('leclerc') || m.includes('lidl') || m.includes('aldi')) return '🛒';
    if (m.includes('sncf') || m.includes('ratp') || m.includes('train') || m.includes('metro')) return '🚆';
    if (m.includes('amazon') || m.includes('colis') || m.includes('fnac') || m.includes('darty')) return '📦';
    if (m.includes('pharmacie') || m.includes('pharma')) return '💊';
    if (m.includes('decathlon') || m.includes('sport')) return '🏃';
    if (m.includes('restaurant') || m.includes('brasserie') || m.includes('cafe') || m.includes('mcdonald') || m.includes('burger')) return '🍽️';
    if (m.includes('shell') || m.includes('total') || m.includes('bp') || m.includes('essence')) return '⛽';
    if (m.includes('edf') || m.includes('engie') || m.includes('électric')) return '⚡';
    if (m.includes('apple') || m.includes('orange') || m.includes('sfr') || m.includes('free')) return '📱';
    return '💳';
  }

  // ─── Rendu principal ───────────────────────────────────────────────
  async function init() {
    try {
      const transactions = await fetchDepenses();

      const weekStart  = getWeekStart(now);
      const monthStart = getMonthStart(now);

      let totalWeek  = 0;
      let totalMonth = 0;

      transactions.forEach(tx => {
        const d = new Date(tx.date_achat);
        if (d >= weekStart)  totalWeek  += parseFloat(tx.montant);
        if (d >= monthStart) totalMonth += parseFloat(tx.montant);
      });

      // Barres
      renderBar(
        document.getElementById('week-bar'),
        document.getElementById('week-alert'),
        document.getElementById('week-alert-text'),
        document.getElementById('week-amount'),
        totalWeek, BUDGET_WEEK, BUDGET_WEEK
      );

      renderBar(
        document.getElementById('month-bar'),
        document.getElementById('month-alert'),
        document.getElementById('month-alert-text'),
        document.getElementById('month-amount'),
        totalMonth, BUDGET_OBJ, BUDGET_LIMIT
      );

      // Historique
      const list = document.getElementById('tx-list');
      list.innerHTML = '';

      if (transactions.length === 0) {
        list.innerHTML = '<li style="padding:16px;color:var(--muted);font-size:13px;">Aucune dépense ce mois-ci.</li>';
        return;
      }

      transactions.slice(0, 10).forEach(tx => {
        const d = new Date(tx.date_achat);
        const label = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
        const li = document.createElement('li');
        li.className = 'tx';
        li.innerHTML = `
          <div class="tx-icon">${getIcon(tx.marchand)}</div>
          <div class="tx-info">
            <div class="tx-name">${tx.marchand}</div>
            <div class="tx-date">${label}</div>
          </div>
          <div class="tx-amount">${parseFloat(tx.montant).toFixed(2).replace('.', ',')} €</div>
        `;
        list.appendChild(li);
      });

    } catch (err) {
      console.error(err);
      document.getElementById('tx-list').innerHTML =
        '<li style="padding:16px;color:var(--red);font-size:13px;">Erreur de connexion à Supabase.</li>';
    }
  }

  init();
</script>
</body>
</html>
