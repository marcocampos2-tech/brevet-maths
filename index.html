<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brevet Maths</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: white; border-radius: 16px; border: 1px solid #e8e8e4; padding: 2rem; width: 100%; max-width: 400px; margin: 1rem; }
.logo { text-align: center; margin-bottom: 2rem; }
.logo div { font-size: 48px; margin-bottom: 8px; }
.logo h1 { font-size: 22px; font-weight: 600; }
.logo p { color: #666; font-size: 14px; margin-top: 4px; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #e0e0d8; background: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.tab.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; margin-top: 12px; }
input { width: 100%; padding: 10px 14px; border: 1px solid #d0d0c8; border-radius: 8px; font-size: 14px; }
input:focus { outline: none; border-color: #1a1a1a; }
.btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1a1a1a; color: white; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 16px; transition: background 0.15s; }
.btn:hover { background: #333; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; display: none; }
.msg.error { background: #fef2f2; color: #dc2626; display: block; }
.msg.success { background: #f0fdf4; color: #16a34a; display: block; }
.forgot { text-align: right; margin-top: 6px; }
.forgot a { font-size: 12px; color: #666; text-decoration: none; }
.forgot a:hover { color: #1a1a1a; text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div>📐</div>
    <h1>Brevet Maths</h1>
    <p>Prépare ton brevet avec des QCM IA</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setMode('login')">Se connecter</button>
    <button class="tab" onclick="setMode('register')">Créer un compte</button>
  </div>

  <label>Email</label>
  <input type="email" id="email" placeholder="ton@email.com">

  <label>Mot de passe</label>
  <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') soumettre()">

  <div class="forgot">
    <a href="#" onclick="resetPassword()">Mot de passe oublié ?</a>
  </div>

  <button class="btn" id="btn" onclick="soumettre()">Se connecter</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://vkkgadwqumqqwpaayjac.supabase.co'
const SUPABASE_KEY = 'sb_publishable_3nwxCHSPliLzSB6B7BZYhw__sp7ToXI'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let mode = 'login'

async function init() {
  const { data } = await sb.auth.getSession()
  if (data.session) window.location.href = 'quiz.html'
}
init()

function setMode(m) {
  mode = m
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&m==='login')||(i===1&&m==='register')))
  document.getElementById('btn').textContent = m === 'login' ? 'Se connecter' : 'Créer mon compte'
  document.getElementById('msg').className = 'msg'
}

async function soumettre() {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('btn')
  if (!email || !password) { afficherMsg('Remplis tous les champs', 'error'); return }
  btn.disabled = true
  btn.textContent = 'Chargement...'
  if (mode === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password })
    if (error) afficherMsg('Email ou mot de passe incorrect. Réessaie.', 'error')
    else window.location.href = 'quiz.html'
  } else {
    const { error } = await sb.auth.signUp({ email, password })
    if (error) afficherMsg('Erreur lors de la création : ' + error.message, 'error')
    else afficherMsg('✅ Compte créé ! Tu peux maintenant te connecter.', 'success')
  }
  btn.disabled = false
  btn.textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte'
}

async function resetPassword() {
  const email = document.getElementById('email').value.trim()
  if (!email) { afficherMsg('Entre ton adresse email pour recevoir le lien de réinitialisation.', 'error'); return }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/index.html'
  })
  if (error) afficherMsg('Erreur : ' + error.message, 'error')
  else afficherMsg('📧 Email envoyé ! Vérifie ta boîte mail pour réinitialiser ton mot de passe.', 'success')
}

function afficherMsg(texte, type) {
  const msg = document.getElementById('msg')
  msg.textContent = texte
  msg.className = 'msg ' + type
}
</script>
</body>
</html>
